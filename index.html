    notes:sampleW<1?`Regressed ${Math.round((1-sampleW)*100)}% toward 50 (${pa} PA)`:null
  };
}

// === BATTER TOTAL BASES GRADE (0-100) ===
// TB blends hit probability with power — at 1.5 line you need either frequent singles or occasional XBH
// Weights sit between Hit and HR models
function batterTBGrade(p,pHand,park,wx,venue){
  if(!p||!p.overall.pa)return null;
  const L=STATE.leagueAvg;
  const ov=p.prev?.isPrevSeason?p.prev.overall:p.overall;
  const sp=batterSplit(p.prev?.isPrevSeason?p.prev:p,pHand);
  
  const xSLG=blendStat(sp,ov,'xSLG',60)??ov.xSLG;
  const slg=blendStat(sp,ov,'slg',60)??ov.slg;
  const xBA=blendStat(sp,ov,'xBA',60)??ov.xBA;
  const avg=blendStat(sp,ov,'avg',80)??ov.avg;
  const iso=blendStat(sp,ov,'iso',60)??ov.iso;
  const xwOBA=blendStat(sp,ov,'xwOBA',60)??ov.xwOBA;
  const kr=blendStat(sp,ov,'k_rate',100)??ov.k_rate;
  const hardHit=ov.hardHit;
  const rec=p.recent||{};
  const recSLG=rec.slg;
  
  // TB per PA ≈ SLG × AB/PA ≈ SLG × 0.9. Elite is ~0.55 TB/PA (Judge-tier)
  const comps=[
    {label:'xSLG (expected SLG)',raw:xSLG,avg:L.b_xSLG,elite:L.b_xSLG*1.32,weight:0.25,good:'high',fmt:'3'},
    {label:'SLG blended',raw:slg,avg:L.b_slg,elite:L.b_slg*1.32,weight:0.15,good:'high',fmt:'3'},
    {label:'xBA (hit probability)',raw:xBA,avg:L.b_xBA,elite:L.b_xBA*1.22,weight:0.15,good:'high',fmt:'3'},
    {label:'AVG blended',raw:avg,avg:L.b_avg,elite:L.b_avg*1.22,weight:0.08,good:'high',fmt:'3'},
    {label:'ISO (XBH rate)',raw:iso,avg:L.b_iso,elite:L.b_iso*1.5,weight:0.12,good:'high',fmt:'3'},
    {label:'xwOBA',raw:xwOBA,avg:L.b_xwOBA,elite:L.b_xwOBA*1.22,weight:0.08,good:'high',fmt:'3'},
    {label:'K% (inverse)',raw:kr,avg:L.b_k,elite:L.b_k*1.4,weight:0.05,good:'low',fmt:'%'},
    {label:'Hard Hit%',raw:hardHit,avg:L.b_hardHit||38,elite:(L.b_hardHit||38)*1.3,weight:0.07,good:'high',fmt:'1%'},
    {label:`Last 15G SLG`,raw:recSLG,avg:L.b_slg,elite:L.b_slg*1.25,weight:0.05,good:'high',fmt:'3',note:rec.pa?rec.pa+' PA':'—'}
  ];
  
  let rawTotal=0;
  comps.forEach(c=>{
    if(c.raw==null){c.scaled=50;c.contribution=50*c.weight;rawTotal+=c.contribution;return;}
    let s=scale(c.raw,c.avg,c.elite);
    if(c.good==='low')s=100-s;
    c.scaled=s;
    c.contribution=s*c.weight;
    rawTotal+=c.contribution;
  });
  
  const pa=ov.pa||0;
  const sampleW=clamp(pa/90,0.4,1);
  let grade=50+(rawTotal-50)*sampleW;
  
  // Park + weather lite (TB still benefits from HR factor but less than pure HR prop)
  const factors=[];
  if(park&&park.hr){
    // Blend park HR and park H factors
    const parkCombined=(park.hr*0.6+park.h*0.4);
    const parkAdj=(parkCombined-1)*50*0.3;
    grade+=parkAdj;
    factors.push({label:`Park (HR × hits)`,value:parkCombined.toFixed(2),adj:parkAdj,note:parkCombined>1?'hitter-friendly':'pitcher-friendly'});
  }
  if(wx&&!DOMED.has(venue)){
    const windF=windHRFactor(venue,wx);
    const tempF=tempHRFactor(wx.temp);
    const wxAdj=((windF*tempF)-1)*50*0.3;
    grade+=wxAdj;
    factors.push({label:`Wind→HR`,value:windF.toFixed(2),adj:(windF-1)*15,note:`${Math.round(wx.windSpeed||0)}mph`});
    factors.push({label:`Temp carry`,value:tempF.toFixed(2),adj:(tempF-1)*15,note:`${Math.round(wx.temp||0)}°F`});
  }else if(DOMED.has(venue)){
    factors.push({label:`Dome`,value:'—',adj:0,note:'weather neutral'});
  }
  
  return {
    grade:Math.round(clamp(grade,0,100)*10)/10,
    rawTotal:Math.round(rawTotal*10)/10,
    sampleW:Math.round(sampleW*100)/100,
    components:comps,
    factors,
    notes:sampleW<1?`Regressed ${Math.round((1-sampleW)*100)}% toward 50 (${pa} PA)`:null
  };
}

// Expected total bases per game for a batter facing a pitcher.
// TB ≈ AB × SLG. AB ≈ PA × (1 - BB% - HBP%) ≈ PA × 0.91. Use blended xSLG vs hand.
// Apply park HR + park hits factors at reduced weight (TB benefits from both).
function batterExpectedTB(p,pHand,batterHand,order,park,wx,venue){
  if(!p||!p.overall.pa)return null;
  const ov=p.prev?.isPrevSeason?p.prev.overall:p.overall;
  const sp=batterSplit(p.prev?.isPrevSeason?p.prev:p,pHand,batterHand);
  
  // Blended xSLG (better predictor than actual SLG)
  const xSLG=blendStat(sp,ov,'xSLG',60)??ov.xSLG??ov.slg??0.400;
  // BB rate to estimate AB-per-PA: AB = PA × (1 - BB% - HBP%). HBP ≈ 1%.
  const bbR=blendStat(sp,ov,'bb_rate',100)??ov.bb_rate??0.085;
  const abPerPA=Math.max(0.78,Math.min(0.95,1-bbR-0.012));
  
  // PA per game by lineup spot: leadoff ~4.6, middle ~4.2, bottom ~3.7
  const o=parseInt(order)||5;
  const expectedPA=o<=2?4.55:o<=5?4.20:o<=7?3.85:3.55;
  const expectedAB=expectedPA*abPerPA;
  
  // Base TB = AB × xSLG
  let xTB=expectedAB*xSLG;
  
  // Park: blend HR factor (60%) + hits factor (40%) since TB is mostly singles + extra-base
  if(park){
    const parkCombined=(park.hr*0.55+park.h*0.45);
    xTB*=parkCombined;
  }
  // Weather: applies modestly (HR-suppressing wind hurts TB ~30% of HR effect)
  if(wx&&!DOMED.has(venue)){
    const windF=windHRFactor(venue,wx);
    const tempF=tempHRFactor(wx.temp);
    xTB*=(1+((windF*tempF)-1)*0.3);
  }
  return Math.round(xTB*100)/100;
}

// Expected walks per game for a batter facing a pitcher.
// BB ≈ PA × BB_rate. Blend batter BB% and pitcher BB%-allowed using log5.
function batterExpectedBB(p,pHand,batterHand,order,sp_pitcher){
  if(!p||!p.overall.pa)return null;
  const L=STATE.leagueAvg;
  const ov=p.prev?.isPrevSeason?p.prev.overall:p.overall;
  const bSp=batterSplit(p.prev?.isPrevSeason?p.prev:p,pHand,batterHand);
  
  // Batter BB% (blended vs hand)
  const bBBR=blendStat(bSp,ov,'bb_rate',80)??ov.bb_rate??L.b_bb??0.085;
  
  // Pitcher BB% allowed (blended). Default to league avg if no pitcher data.
  let pBBR=L.p_bb??0.085;
  if(sp_pitcher){
    const pOv=sp_pitcher.prev?.isPrevSeason?sp_pitcher.prev.overall:sp_pitcher.overall;
    const pSp=pitcherSplit(sp_pitcher,batterHand);
    pBBR=blendStat(pSp,pOv,'bb_rate',150)??pOv.bb_rate??L.p_bb??0.085;
  }
  
  // log5 combine batter & pitcher BB rate vs league baseline
  const combinedBBR=combineRates(pBBR,bBBR,L.p_bb??0.085);
  
  // PA per game by lineup spot
  const o=parseInt(order)||5;
  const expectedPA=o<=2?4.55:o<=5?4.20:o<=7?3.85:3.55;
  const xBB=expectedPA*combinedBBR;
  
  return Math.round(xBB*100)/100;
}

// Expected strikeouts for a batter facing a pitcher.
// K ≈ PA × log5(batter K%, pitcher K%-allowed, league K%).
function batterExpectedK(p,pHand,batterHand,order,sp_pitcher){
  if(!p||!p.overall.pa)return null;
  const L=STATE.leagueAvg;
  const ov=p.prev?.isPrevSeason?p.prev.overall:p.overall;
  const bSp=batterSplit(p.prev?.isPrevSeason?p.prev:p,pHand,batterHand);
  const bKR=blendStat(bSp,ov,'k_rate',80)??ov.k_rate??L.b_k??0.225;
  let pKR=L.p_k??0.225;
  if(sp_pitcher){
    const pOv=sp_pitcher.prev?.isPrevSeason?sp_pitcher.prev.overall:sp_pitcher.overall;
    const pSp=pitcherSplit(sp_pitcher,batterHand);
    pKR=blendStat(pSp,pOv,'k_rate',150)??pOv.k_rate??L.p_k??0.225;
  }
  const combined=combineRates(pKR,bKR,L.p_k??0.225);
  const o=parseInt(order)||5;
  const expectedPA=o<=2?4.55:o<=5?4.20:o<=7?3.85:3.55;
  return Math.round(expectedPA*combined*100)/100;
}

// Score a batter for likelihood to strike out. Higher = more likely.
function computeBatterKScore(p,pitcher,pHand,batterHand,xK){
  if(!p||!p.overall.pa)return null;
  const L=STATE.leagueAvg;
  const ov=p.prev?.isPrevSeason?p.prev.overall:p.overall;
  const bSp=batterSplit(p.prev?.isPrevSeason?p.prev:p,pHand,batterHand);
  const seasonK=ov.k_rate??L.b_k??0.225;
  const splitK=blendStat(bSp,ov,'k_rate',80)??seasonK;
  const recK=p.recent?.pa>=30?p.recent.k_rate:null;
  const effBatterK=recK!=null?splitK*0.55+seasonK*0.30+recK*0.15:splitK*0.65+seasonK*0.35;
  const batterCompG=scale(effBatterK,L.b_k*0.6,L.b_k*1.5);
  let pitcherCompG=50;
  if(pitcher){
    const pOv=pitcher.prev?.isPrevSeason?pitcher.prev.overall:pitcher.overall;
    const pSp=pitcherSplit(pitcher,batterHand);
    const pK=blendStat(pSp,pOv,'k_rate',150)??pOv.k_rate??L.p_k;
    pitcherCompG=scale(pK,L.p_k*0.6,L.p_k*1.5);
  }
  let raw=batterCompG*0.55+pitcherCompG*0.45;
  if(raw>=LOCKS.bbat&&xK!=null&&roundConservative(xK)<1)raw=LOCKS.bbat-0.5;
  return Math.round(raw*10)/10;
}

// Walk score for a batter vs pitcher matchup.
// Combines batter BB% (vs hand), pitcher BB%-allowed (vs hand), and recent BB% trend.
// CRITICAL: A score >= 72 (lock) requires xBB >= 0.7 (which rounds conservatively to 1).
// This prevents the model from labeling a 0.5 xBB play as a "lock" — locks must project to ≥1 walk.
function computeBBScore(p,pitcher,pHand,batterHand,xBB){
  if(!p||!p.overall.pa)return null;
  const L=STATE.leagueAvg;
  const ov=p.prev?.isPrevSeason?p.prev.overall:p.overall;
  const bSp=batterSplit(p.prev?.isPrevSeason?p.prev:p,pHand,batterHand);
  const rec=p.recent||{};
  
  // ── Batter side ─────────────────────────────────────────────
  // Season BB% (overall)
  const seasonBB=ov.bb_rate??L.b_bb??0.085;
  // Split BB% vs pitcher hand (blended with season for sample size)
  const splitBB=blendStat(bSp,ov,'bb_rate',80)??seasonBB;
  // Recent BB% (last 15G) — meaningful for hot/cold streaks
  const recBB=rec.pa>=30?(rec.bb_rate??null):null;
  // Effective batter BB%: split-vs-hand at 60%, season at 25%, recent at 15% if available
  const effBatterBB=recBB!=null
    ? splitBB*0.60+seasonBB*0.25+recBB*0.15
    : splitBB*0.70+seasonBB*0.30;
  
  // Batter component score: scaled vs league baseline. Elite walker (12%+) → 90+
  const batterCompG=scale(effBatterBB,L.b_bb*0.6,L.b_bb*1.7);
  
  // ── Pitcher side ─────────────────────────────────────────────
  // Pitcher BB% allowed (vs batter hand, blended)
  let pitcherCompG=50;
  if(pitcher){
    const pOv=pitcher.prev?.isPrevSeason?pitcher.prev.overall:pitcher.overall;
    const pSp=pitcherSplit(pitcher,batterHand);
    const pBB=blendStat(pSp,pOv,'bb_rate',150)??pOv.bb_rate??L.p_bb??0.085;
    // Higher pitcher BB% → higher grade (more walks expected for the batter)
    pitcherCompG=scale(pBB,L.p_bb*0.5,L.p_bb*1.8);
  }
  
  // Combined score: batter discipline 65%, pitcher wildness 35%.
  // (Batter discipline is more predictive than pitcher wildness for individual walk events.)
  let rawScore=batterCompG*0.65+pitcherCompG*0.35;
  
  // ── LOCK FLOOR ENFORCEMENT ──────────────────────────────────
  // If raw score qualifies as a lock (≥72) but xBB rounds to 0, demote to 71 (Strong, not Lock).
  // This guarantees a "lock" walk pick projects to at least 1 walk after conservative rounding.
  if(rawScore>=LOCKS.bb&&xBB!=null&&roundConservative(xBB)<1){
    rawScore=71.5; // just below lock threshold — still "Strong"
  }
  
  return Math.round(rawScore*10)/10;
}


// === PITCHER K GRADE for a specific pitcher vs lineup ===
// Returns expected Ks and a 0-100 grade vs typical total
// === PITCHER BB GRADE for a specific pitcher vs lineup ===
// Returns expected walks allowed and a 0-100 grade.
function pitcherBBExpectation(pitcher,oppLineup,pHand){
  if(!pitcher||!pitcher.overall.ip)return null;
  const L=STATE.leagueAvg;
  const ov=pitcher.prev?.isPrevSeason?pitcher.prev.overall:pitcher.overall;
  
  // Expected IP from season avg (no opp/park adjustment for walks — less material)
  const expectedIP=clamp(ov.avgIP||L.p_avgIP,3.5,7.5);
  const totalBF=expectedIP*4.2;
  
  // Sum expected BB across the lineup
  let totalBB=0;
  oppLineup.forEach(b=>{
    const bObj=STATE.players[b.id];
    const paF=paFactor(b.order);
    
    // Pitcher BB% vs batter hand
    const pSp=pitcherSplit(pitcher,b.bats);
    const pBBR=blendStat(pSp,ov,'bb_rate',150)??ov.bb_rate??L.p_bb;
    
    // Batter BB% vs pitcher hand
    let bBBR=L.b_bb??0.085;
    if(bObj){
      const bOv=bObj.prev?.isPrevSeason?bObj.prev.overall:bObj.overall;
      const bSp=batterSplit(bObj.prev?.isPrevSeason?bObj.prev:bObj,pHand,b.bats);
      bBBR=blendStat(bSp,bOv,'bb_rate',80)??bOv.bb_rate??L.b_bb??0.085;
    }
    
    // log5 combine
    const combined=combineRates(pBBR,bBBR,L.p_bb??0.085);
    const pa=totalBF/9*paF;
    totalBB+=combined*pa;
  });
  
  // Grade: lower BB = better pitcher. Invert scale so higher grade = fewer walks issued.
  // But for prop betting (over/under walks), the score should reflect the prediction itself.
  // We'll use grade = scale where higher grade = MORE walks expected (pro-bettor view).
  const avgBaseline=expectedIP*L.p_bb*4.2;  // typical walk count
  const grade=scale(totalBB,avgBaseline*0.5,avgBaseline*1.6);
  
  return {
    expectedBB:Math.round(totalBB*10)/10,
    expectedIP:Math.round(expectedIP*10)/10,
    grade:Math.round(grade*10)/10,
    bbRate:ov.bb_rate,
    avgBaseline:Math.round(avgBaseline*10)/10
  };
}

function pitcherKExpectation(pitcher,oppLineup,pHand,park,wx){
  if(!pitcher||!pitcher.overall.ip)return null;
  const L=STATE.leagueAvg;
  const ov=pitcher.prev?.isPrevSeason?pitcher.prev.overall:pitcher.overall;
  const rec=pitcher.recent||{};
  
  // ── 1. RECENT FORM BLEND ──────────────────────────────────────────────
  // Recent K% gets 35% weight when we have ≥3 starts and ≥10 IP
  let effectiveKRate=ov.k_rate;
  let recentKRate=null,recentBlendUsed=0;
  if(rec.g>=3&&rec.ip>=10&&rec.k!=null){
    // K rate from recent = strikeouts / (IP × ~4.2 batters/inning approximation)
    // More accurate: recent K / (IP × 4.2). But better still — use BF if we had it.
    // Using IP as a proxy: 1 inning ≈ 4.3 PAs faced
    const recentBFEst=rec.ip*4.3;
    recentKRate=recentBFEst>0?rec.k/recentBFEst:null;
    if(recentKRate!=null){
      // Cap recent at +/- 35% from season K to limit volatility from a single dominant start
      const capped=clamp(recentKRate,ov.k_rate*0.65,ov.k_rate*1.50);
      effectiveKRate=ov.k_rate*0.65+capped*0.35;
      recentBlendUsed=0.35;
    }
  }
  
  // ── 2. OPPONENT-ADJUSTED EXPECTED IP ──────────────────────────────────
  // Base IP from season avg. Adjust for opponent contact quality (high-OBP lineups
  // shorten outings) and park K-friendliness (more Ks = more outs per pitch = longer)
  const baseIP=ov.avgIP||L.p_avgIP;
  let oppOBPAvg=0,oppCount=0;
  oppLineup.forEach(b=>{
    const bObj=STATE.players[b.id];
    if(!bObj)return;
    const bOv=bObj.prev?.isPrevSeason?bObj.prev.overall:bObj.overall;
    const obp=bOv.obp;
    if(obp!=null){oppOBPAvg+=obp;oppCount++;}
  });
  oppOBPAvg=oppCount>0?oppOBPAvg/oppCount:L.b_obp;
  // Opponent OBP factor: league avg OBP=.320 → 1.00; .350 OBP → 0.93 (gets pulled earlier);
  // .290 OBP → 1.06 (pitches deeper)
  const oppIPMult=clamp(1-((oppOBPAvg-L.b_obp)/L.b_obp)*0.6,0.85,1.12);
  // Park K factor: more Ks = quicker innings → can pitch longer
  const parkKMult=park?.k?clamp(1+(park.k-1)*0.4,0.92,1.08):1.0;
  const expectedIP=clamp(baseIP*oppIPMult*parkKMult,3.5,7.5);
  
  // ── 3. TIMES-THROUGH-THE-ORDER PENALTY ────────────────────────────────
  // First TTO: K% × 1.04 (pitcher fresh, hitters guessing)
  // Second TTO: K% × 1.00 (baseline)
  // Third TTO: K% × 0.92 (familiarity penalty, well-documented in saber research)
  // Fourth+ TTO: × 0.85 (rare — only for elite starters going deep)
  function ttoMult(timeThrough){
    if(timeThrough<=1)return 1.04;
    if(timeThrough===2)return 1.00;
    if(timeThrough===3)return 0.92;
    return 0.85;
  }
  
  // ── 4. PA DISTRIBUTION ACROSS LINEUP ──────────────────────────────────
  // Expected total batters faced = IP × 4.2 (slightly inflated by baserunners but fine)
  const totalBF=expectedIP*4.2;
  // For each batter in the lineup, compute how many times they'll face the pitcher
  // PA[i] = totalBF * (lineup spot's share). With 9 hitters, leadoff sees more PAs.
  // Approx distribution: spots 1-2 get ~1.10 share, 3-5 ~1.04, 6-7 ~0.96, 8-9 ~0.86
  // Then split into TTO buckets: hitter sees pitcher 1x, 2x, 3x... based on TTO
  
  // ── 5. K RATE COMPUTATION PER BATTER PER TIME-THROUGH ────────────────
  let totalExpectedK=0,baselineK=0;
  let kComponentsForVariance=[];
  oppLineup.forEach(b=>{
    const bObj=STATE.players[b.id];
    const paF=paFactor(b.order);
    
    // Pitcher split vs batter hand
    const pSp=pitcherSplit(pitcher,b.bats);
    const pSplitKr=blendStat(pSp,ov,'k_rate',150)??ov.k_rate??L.p_k;
    // Apply recent-blend on top of split
    const pKr=effectiveKRate?(pSplitKr*0.7+effectiveKRate*0.3):pSplitKr;
    
    // Batter's K% vs pitcher hand (blended)
    let bKr=L.b_k;
    if(bObj){
      const bOv=bObj.prev?.isPrevSeason?bObj.prev.overall:bObj.overall;
      const bSp=batterSplit(bObj.prev?.isPrevSeason?bObj.prev:bObj,pHand);
      bKr=blendStat(bSp,bOv,'k_rate',80)??bOv.k_rate??L.b_k;
    }
    
    // Combined K rate using log5
    const baseCombined=combineRates(pKr,bKr,L.p_k);
    
    // PAs for this batter
    const pa=totalBF/9*paF;
    
    // Distribute across TTO: if pa=2.7, this batter sees pitcher 1x at TTO=1, 1x at TTO=2,
    // and 0.7x at TTO=3
    let remaining=pa;
    let tto=1;
    let kForBatter=0;
    while(remaining>0&&tto<=4){
      const slice=Math.min(remaining,1);
      const adjK=baseCombined*ttoMult(tto);
      // Apply park K factor: parks like Petco tend to inflate K rates by ~3%, Coors deflates
      const parkAdjK=park?.k?adjK*(1+(park.k-1)*0.5):adjK;
      kForBatter+=parkAdjK*slice;
      remaining-=slice;
      tto++;
    }
    
    totalExpectedK+=kForBatter;
    baselineK+=L.p_k*pa;
    kComponentsForVariance.push(kForBatter);
  });
  
  // ── 6. UNCERTAINTY RANGE ──────────────────────────────────────────────
  // Standard deviation: per-PA Bernoulli σ = sqrt(p(1-p)). Sum of independent PAs
  // gives total σ ≈ sqrt(Σ p_i(1-p_i)). For ~24 PAs with mean K rate 0.24, σ ≈ 2.1 Ks.
  let varianceSum=0;
  let totalPAcount=totalBF;
  // Use mean K rate to approximate variance (good enough for display)
  const meanRate=totalExpectedK/totalPAcount;
  varianceSum=totalPAcount*meanRate*(1-meanRate);
  const stdDev=Math.sqrt(varianceSum);
  // 1-sigma range. Roughly the "central 68%" of outcomes.
  const lowK=Math.max(0,totalExpectedK-stdDev);
  const highK=totalExpectedK+stdDev;
  
  // ── 7. GRADE ──────────────────────────────────────────────────────────
  // Grade vs typical baseline (a starter's "expected" K total at league rate)
  const avgBaseline=expectedIP*L.p_k*4.2;
  const grade=scale(totalExpectedK,avgBaseline*0.75,avgBaseline*1.4);
  
  return {
    expectedK:Math.round(totalExpectedK*10)/10,
    expectedIP:Math.round(expectedIP*10)/10,
    grade:Math.round(grade*10)/10,
    kRate:ov.k_rate,
    avgBaseline:Math.round(avgBaseline*10)/10,
    // Diagnostic / display fields
    lowK:Math.round(lowK*10)/10,
    highK:Math.round(highK*10)/10,
    stdDev:Math.round(stdDev*10)/10,
    recentBlendUsed,
    recentKRate:recentKRate!=null?Math.round(recentKRate*1000)/1000:null,
    seasonKRate:Math.round(ov.k_rate*1000)/1000,
    effectiveKRate:Math.round(effectiveKRate*1000)/1000,
    oppOBP:Math.round(oppOBPAvg*1000)/1000,
    oppIPMult:Math.round(oppIPMult*100)/100,
    parkKMult:Math.round(parkKMult*100)/100,
    parkK:park?.k||1.0
  };
}

// Log5 combine rates (Bill James) — ideal for combining a batter and pitcher rate
function combineRates(pRate,bRate,leagueRate){
  if(pRate==null||bRate==null||leagueRate==null||leagueRate===0)return (pRate||0+bRate||0)/2;
  // Log5: r = (p*b/l) / ((p*b/l) + (1-p)*(1-b)/(1-l))
  const num=(pRate*bRate/leagueRate);
  const den=num+((1-pRate)*(1-bRate)/(1-leagueRate));
  return den===0?leagueRate:num/den;
}

// === RUN TOTAL MODEL ===
// Estimates expected runs for each team, then combined total.
function estimateTeamRuns(lineup,opposingPitcher,pHand,park,wx,venue){
  if(!lineup||!lineup.length||!opposingPitcher)return null;
  const L=STATE.leagueAvg;
  const pOv=opposingPitcher.prev?.isPrevSeason?opposingPitcher.prev.overall:opposingPitcher.overall;
  const expectedIP=clamp(pOv.avgIP||L.p_avgIP,3.5,7.5);
  
  // Team offensive strength (wOBA weighted by lineup spot)
  let teamWOBA=0,weight=0;
  lineup.forEach(b=>{
    const bObj=STATE.players[b.id];
    if(!bObj)return;
    const bOv=bObj.prev?.isPrevSeason?bObj.prev.overall:bObj.overall;
    const bSp=batterSplit(bObj.prev?.isPrevSeason?bObj.prev:bObj,pHand);
    const wOBA=blendStat(bSp,bOv,'xwOBA',80)||blendStat(bSp,bOv,'wOBA',80)||bOv.xwOBA||bOv.ops*0.42||L.b_xwOBA;
    const paF=paFactor(b.order);
    teamWOBA+=wOBA*paF;
    weight+=paF;
  });
  teamWOBA=weight?teamWOBA/weight:L.b_xwOBA;
  
  // Pitcher run-suppression (FIP or xwOBA-based)
  const pXwOBA=pOv.xwOBA||(pOv.fip?pOv.fip/20:null)||L.p_xwOBA;
  
  // Blend team offense vs pitcher. wOBA scale: ~0.310 = 4.5 r/g, each 20 pts = ~0.7 r/g
  const effWOBA=(teamWOBA+pXwOBA)/2;
  const baseRuns=4.50+((effWOBA-(L.b_xwOBA+L.p_xwOBA)/2)*30);
  
  // Apply starter-only for expectedIP, assume bullpen ≈ league avg for remaining
  const starterFrac=expectedIP/9;
  const bullpenRuns=4.5*(1-starterFrac);
  const starterRuns=baseRuns*starterFrac;
  let teamRuns=starterRuns+bullpenRuns;
  
  // Park factor
  teamRuns*=(park?.r||1);
  
  // Weather
  if(wx&&!DOMED.has(venue)){
    teamRuns*=tempHRFactor(wx.temp); // temp affects carry + run scoring
    teamRuns*=precipRunFactor(wx);
  }
  
  return Math.round(teamRuns*10)/10;
}

function buildAllMatchups(){
  STATE.matchups=[];
  
  // Backfill b.bats from the person endpoint handedness we fetched during stats load,
  // and tag bats on stats object for switch-hitter logic
  STATE.games.forEach(g=>{
    [...g.hLineup,...g.aLineup].forEach(b=>{
      const p=STATE.players[b.id];
      // If lineup didn't carry handedness, use the person-endpoint value we fetched alongside stats
      if(!b.bats&&p?.batHand)b.bats=p.batHand;
      if(!b.bats)b.bats='R'; // absolute last resort
      if(p)p._bats=b.bats;
    });
  });
  
  STATE.games.forEach(g=>{
    const park=g.parkFactor;
    const wx=g.weather;
    const venue=g.venue;
    
    // Home batters face away SP
    g.hLineup.forEach(b=>{
      const p=STATE.players[b.id];
      const sp=STATE.pitchers[g.aSP?.id];
      if(!p)return;
      const pHand=g.aSPHand||'R';
      const hitGObj=batterHitGrade(p,pHand);
      const hrGObj=batterHRGrade(p,pHand,park,wx,venue);
      const tbGObj=batterTBGrade(p,pHand,park,wx,venue);
      const pitG=pitcherHitSuppressG(sp,b.bats);
      const pitHRSupG=pitcherHRSuppressG(sp,b.bats);
      const pitKProneG=pitcherKGenG(sp,b.bats);
      
      const hitScore=combineMatchup(hitGObj?.grade,pitG,b.order);
      const hrScore=combineMatchup(hrGObj?.grade,pitHRSupG,b.order);
      const tbScore=combineMatchup(tbGObj?.grade,(pitG*0.6+pitHRSupG*0.4),b.order);
      const expectedTB=batterExpectedTB(p,pHand,b.bats,b.order,park,wx,venue);
      const expectedBB=batterExpectedBB(p,pHand,b.bats,b.order,sp);
      const bbScore=computeBBScore(p,sp,pHand,b.bats,expectedBB);
      const batterExpectedKVal=batterExpectedK(p,pHand,b.bats,b.order,sp);
      const batterKScore=computeBatterKScore(p,sp,pHand,b.bats,batterExpectedKVal);
      
      STATE.matchups.push({
        kind:'batter',
        game:g,team:g.home,opp:g.away,park,wx,venue,
        batterId:b.id,batterName:b.name,bats:b.bats,order:b.order,unconfirmed:b.unconfirmed,
        pitcherId:g.aSP?.id,pitcherName:g.aSP?.name||'TBD',pHand,
        hitGrade:hitGObj,hrGrade:hrGObj,tbGrade:tbGObj,
        pitHitSup:pitG,pitHRSup:pitHRSupG,pitKGen:pitKProneG,
        hitScore,hrScore,tbScore,expectedTB,expectedBB,bbScore,batterKScore,batterExpectedK:batterExpectedKVal,
        partial:(p.prev?.isPrevSeason?(!p.prev.overall.pa||p.prev.overall.pa<Q.bPA):(!p.overall.pa||p.overall.pa<Q.bPA))
      });
    });
    
    // Away batters face home SP
    g.aLineup.forEach(b=>{
      const p=STATE.players[b.id];
      const sp=STATE.pitchers[g.hSP?.id];
      if(!p)return;
      const pHand=g.hSPHand||'R';
      const hitGObj=batterHitGrade(p,pHand);
      const hrGObj=batterHRGrade(p,pHand,park,wx,venue);
      const tbGObj=batterTBGrade(p,pHand,park,wx,venue);
      const pitG=pitcherHitSuppressG(sp,b.bats);
      const pitHRSupG=pitcherHRSuppressG(sp,b.bats);
      const pitKProneG=pitcherKGenG(sp,b.bats);
      
      const hitScore=combineMatchup(hitGObj?.grade,pitG,b.order);
      const hrScore=combineMatchup(hrGObj?.grade,pitHRSupG,b.order);
      const tbScore=combineMatchup(tbGObj?.grade,(pitG*0.6+pitHRSupG*0.4),b.order);
      const expectedTB=batterExpectedTB(p,pHand,b.bats,b.order,park,wx,venue);
      const expectedBB=batterExpectedBB(p,pHand,b.bats,b.order,sp);
      const bbScore=computeBBScore(p,sp,pHand,b.bats,expectedBB);
      const batterExpectedKVal=batterExpectedK(p,pHand,b.bats,b.order,sp);
      const batterKScore=computeBatterKScore(p,sp,pHand,b.bats,batterExpectedKVal);
      
      STATE.matchups.push({
        kind:'batter',
        game:g,team:g.away,opp:g.home,park,wx,venue,
        batterId:b.id,batterName:b.name,bats:b.bats,order:b.order,unconfirmed:b.unconfirmed,
        pitcherId:g.hSP?.id,pitcherName:g.hSP?.name||'TBD',pHand,
        hitGrade:hitGObj,hrGrade:hrGObj,tbGrade:tbGObj,
        pitHitSup:pitG,pitHRSup:pitHRSupG,pitKGen:pitKProneG,
        hitScore,hrScore,tbScore,expectedTB,expectedBB,bbScore,batterKScore,batterExpectedK:batterExpectedKVal,
        partial:(p.prev?.isPrevSeason?(!p.prev.overall.pa||p.prev.overall.pa<Q.bPA):(!p.overall.pa||p.overall.pa<Q.bPA))
      });
    });
    
    // Pitcher K matchups (both SPs)
    if(g.hSP?.id&&STATE.pitchers[g.hSP.id]){
      const k=pitcherKExpectation(STATE.pitchers[g.hSP.id],g.aLineup,g.hSPHand||'R',park,wx);
      const bb=pitcherBBExpectation(STATE.pitchers[g.hSP.id],g.aLineup,g.hSPHand||'R');
      if(k){
        STATE.matchups.push({
          kind:'pitcher',
          game:g,team:g.home,opp:g.away,park,wx,venue,
          pitcherId:g.hSP.id,pitcherName:g.hSP.name,pHand:g.hSPHand||'R',
          oppLineup:g.aLineup,
          expectedK:k.expectedK,expectedIP:k.expectedIP,kGrade:k.grade,
          kRate:k.kRate,avgBaseline:k.avgBaseline,
          lowK:k.lowK,highK:k.highK,stdDev:k.stdDev,
          recentBlendUsed:k.recentBlendUsed,recentKRate:k.recentKRate,seasonKRate:k.seasonKRate,
          effectiveKRate:k.effectiveKRate,oppOBP:k.oppOBP,oppIPMult:k.oppIPMult,
          parkKMult:k.parkKMult,parkK:k.parkK,
          expectedBB:bb?.expectedBB,bbGrade:bb?.grade,bbRate:bb?.bbRate
        });
      }
    }
    if(g.aSP?.id&&STATE.pitchers[g.aSP.id]){
      const k=pitcherKExpectation(STATE.pitchers[g.aSP.id],g.hLineup,g.aSPHand||'R',park,wx);
      const bb=pitcherBBExpectation(STATE.pitchers[g.aSP.id],g.hLineup,g.aSPHand||'R');
      if(k){
        STATE.matchups.push({
          kind:'pitcher',
          game:g,team:g.away,opp:g.home,park,wx,venue,
          pitcherId:g.aSP.id,pitcherName:g.aSP.name,pHand:g.aSPHand||'R',
          oppLineup:g.hLineup,
          expectedK:k.expectedK,expectedIP:k.expectedIP,kGrade:k.grade,
          kRate:k.kRate,avgBaseline:k.avgBaseline,
          lowK:k.lowK,highK:k.highK,stdDev:k.stdDev,
          recentBlendUsed:k.recentBlendUsed,recentKRate:k.recentKRate,seasonKRate:k.seasonKRate,
          effectiveKRate:k.effectiveKRate,oppOBP:k.oppOBP,oppIPMult:k.oppIPMult,
          parkKMult:k.parkKMult,parkK:k.parkK,
          expectedBB:bb?.expectedBB,bbGrade:bb?.grade,bbRate:bb?.bbRate
        });
      }
    }
  });
}

function buildRunTotals(){
  STATE.totals=[];
  STATE.games.forEach(g=>{
    const pk=g.parkFactor,wx=g.weather,venue=g.venue;
    const homeRuns=estimateTeamRuns(g.hLineup,STATE.pitchers[g.aSP?.id],g.aSPHand||'R',pk,wx,venue);
    const awayRuns=estimateTeamRuns(g.aLineup,STATE.pitchers[g.hSP?.id],g.hSPHand||'R',pk,wx,venue);
    const total=homeRuns!=null&&awayRuns!=null?Math.round((homeRuns+awayRuns)*10)/10:null;
    const hrExp=gameHRExpectation(g);
    // Derive single Over/Under 1.5 pick from the existing scores. Whichever side has higher confidence wins.
    const noScore=hrExp?.noHRScore;
    const multiScore=hrExp?.multiHRScore;
    let hrLinePick=null,hrLineScore=null;
    if(noScore!=null&&multiScore!=null){
      if(noScore>=multiScore){hrLinePick='Under';hrLineScore=noScore;}
      else{hrLinePick='Over';hrLineScore=multiScore;}
    }
    STATE.totals.push({
      game:g,homeRuns,awayRuns,total,
      park:pk,wx,
      totalHR:hrExp?.totalHR,
      noHRScore:noScore,
      multiHRScore:multiScore,
      hrLinePick,
      hrLineScore,
      hSPhr:hrExp?.hSPhr,aSPhr:hrExp?.aSPhr,
      hrEnvMult:hrExp?.envMult
    });
  });
}

// Expected total HRs in a game. Combines:
//   - Each batter's HR rate (HR per PA) blended log5-style against the opposing pitcher's HR rate
//   - Park HR factor, wind, temperature
//   - Bullpen HR rate (league avg) for the innings the starter doesn't cover
// Returns {totalHR, hSPhr, aSPhr, envMult, parkHR, windF, tempF}
function gameHRExpectation(g){
  if(!g)return null;
  const L=STATE.leagueAvg;
  const pk=g.parkFactor,wx=g.weather,venue=g.venue;
  const parkHR=pk?.hr||1.0;
  const windF=wx&&!DOMED.has(venue)?windHRFactor(venue,wx):1.0;
  const tempF=wx?(1+(wx.temp-70)*0.005):1.0;
  const envMult=parkHR*windF*tempF;
  
  const lgHR_PA=L?.hr_pa||0.030;  // league HR per PA (about 3.0%)
  const lgHR9=L?.hr9||1.2;        // league HR per 9 IP
  
  // For one side: take opposing lineup vs the starter, plus bullpen vs lineup average.
  // log5-style: pHR_PA = batterHR_PA × pitcherHR_per_BF / leagueHR_PA
  function sideHRExpectation(lineup,starter){
    if(!lineup||!lineup.length)return {total:0,starterContrib:0,bullpenContrib:0};
    
    // Bullpen vs full lineup at league avg
    let starterContrib=0,bullpenContrib=0;
    
    // Starter parameters
    const sp=starter;
    const spOv=sp?.prev?.isPrevSeason?sp.prev.overall:sp?.overall;
    const sIP=sp?clamp(spOv?.avgIP||L?.p_avgIP||5.5,3.5,7.0):0;
    const sBF_total=sp?clamp(spOv?.bf||sp.overall?.bf,40,1e6):0;
    const sHR=spOv?.hr||(sBF_total*lgHR_PA);
    // Pitcher's HR rate per BF (= HR/PA against them)
    const pHR_BF=sBF_total>0?sHR/sBF_total:lgHR_PA;
    const pHR_BF_clamped=clamp(pHR_BF,lgHR_PA*0.3,lgHR_PA*2.5); // sanity clamp
    
    // BF the starter is expected to face = sIP × 4.3 BF/IP
    const bfPerIP=4.3;
    const starterBF=sIP*bfPerIP;
    const bullpenIP=Math.max(9-sIP,2);
    const bullpenBF=bullpenIP*bfPerIP;
    
    // Distribute BFs across lineup positionally (top of order sees more PAs).
    // Each lineup spot gets roughly: starterBF/lineupSize, plus a small bias for higher spots.
    const lineupSize=Math.max(lineup.length,9);
    
    lineup.forEach((b,idx)=>{
      const player=STATE.players[b.id];
      if(!player)return;
      const ov=player.overall||{};
      const bPA=ov.pa||L?.b_pa||300;
      const bHR=ov.hr||0;
      const bHR_PA=bPA>0?bHR/bPA:lgHR_PA;
      const bHR_PA_clamped=clamp(bHR_PA,0,0.12); // 12% is theoretical max (~Bonds-era)
      
      // Position-adjusted share of plate appearances vs starter
      // Spot 1 sees ~12% more PAs than avg, spot 9 sees ~12% less
      const posMult=1+((4.5-idx)/18);
      const bStarterBF=(starterBF/lineupSize)*posMult;
      const bBullpenBF=(bullpenBF/lineupSize)*posMult;
      
      // log5 vs starter: combined HR rate per PA
      const pHRrate_starter=(bHR_PA_clamped*pHR_BF_clamped)/lgHR_PA;
      // vs bullpen, use league avg
      const pHRrate_bullpen=bHR_PA_clamped;
      
      // Apply env mult (park × wind × temp)
      starterContrib+=pHRrate_starter*bStarterBF*envMult;
      bullpenContrib+=pHRrate_bullpen*bBullpenBF*envMult;
    });
    
    return {total:starterContrib+bullpenContrib,starterContrib,bullpenContrib};
  }
  
  const homeSide=sideHRExpectation(g.hLineup,STATE.pitchers[g.aSP?.id]); // home batters vs away SP
  const awaySide=sideHRExpectation(g.aLineup,STATE.pitchers[g.hSP?.id]); // away batters vs home SP
  const totalHR=homeSide.total+awaySide.total;
  
  // Score scaling tuned to MLB reality: typical game projects ~2.4 total HRs.
  // We want most games in the muddy 1.5-2.5 range to score modestly (lean, not lock).
  // Strong Locks only when projection is well below 1.0 (Under) or well above 3.0 (Over).
  // Pick: whichever side of 1.5 we're on. Confidence: how far from 1.5 in that direction.
  let overConfidence,underConfidence;
  if(totalHR>=1.5){
    // Pick Over. Confidence builds slowly until 2.0, then ramps to lock at 3.0.
    // 1.5→50, 2.0→58, 2.5→68, 3.0→80, 3.5→90, 4.0→100
    overConfidence=clamp(50+(totalHR-1.5)*16,50,100);
    underConfidence=100-overConfidence;
  }else{
    // Pick Under. Below the league norm, so confidence builds faster.
    // 1.5→50, 1.2→62, 1.0→70, 0.8→80, 0.5→92, 0.2→100
    underConfidence=clamp(50+(1.5-totalHR)*40,50,100);
    overConfidence=100-underConfidence;
  }
  
  return {
    totalHR:Math.round(totalHR*100)/100,
    noHRScore:Math.round(underConfidence*10)/10,    // backward-compat field
    multiHRScore:Math.round(overConfidence*10)/10,  // backward-compat field
    parkHR,windF,tempF,envMult,
    hSPhr:Math.round(awaySide.total*100)/100, // contribution from home batters vs away SP (the "away SP HR allowed")
    aSPhr:Math.round(homeSide.total*100)/100  // contribution from away batters vs home SP
  };
}

// Pitcher "hittability" grade (0-100, higher = harder to hit against = worse for batter)
function pitcherHitSuppressG(pitcher,bHand){
  if(!pitcher||!pitcher.overall.ip)return 50;
  const L=STATE.leagueAvg;
  const ov=pitcher.prev?.isPrevSeason?pitcher.prev.overall:pitcher.overall;
  const sp=pitcherSplit(pitcher,bHand);
  
  const xBA=blendStat(sp,ov,'xBA',100)??ov.xBA;
  const avg=blendStat(sp,ov,'avg',80)??ov.avg;
  const xwOBA=blendStat(sp,ov,'xwOBA',100)??ov.xwOBA;
  const whip=ov.whip;
  const kr=blendStat(sp,ov,'k_rate',150)??ov.k_rate;
  
  // Higher = tougher
  const c1=100-scale(xBA,L.p_xBA,L.p_xBA*1.22); // lower xBA = tougher
  const c2=100-scale(avg,L.p_xBA,L.p_xBA*1.22);
  const c3=100-scale(xwOBA,L.p_xwOBA,L.p_xwOBA*1.22);
  const c4=whip!=null?100-scale(whip,L.p_whip,L.p_whip*1.3):50;
  const c5=scale(kr,L.p_k,L.p_k*1.35);
  
  const ip=ov.ip||0;
  const sampleW=clamp(ip/50,0.4,1);
  const raw=c1*0.30+c2*0.15+c3*0.25+c4*0.15+c5*0.15;
  return Math.round((50+(raw-50)*sampleW)*10)/10;
}
function pitcherHRSuppressG(pitcher,bHand){
  if(!pitcher||!pitcher.overall.ip)return 50;
  const L=STATE.leagueAvg;
  const ov=pitcher.prev?.isPrevSeason?pitcher.prev.overall:pitcher.overall;
  const sp=pitcherSplit(pitcher,bHand);
  
  const hrRate=blendStat(sp,ov,'hr_rate',200)??ov.hr_rate;
  const xSLG=blendStat(sp,ov,'xSLG',100)??ov.xSLG;
  const hr9=ov.hr9;
  const fip=ov.fip;
  const hardHit=ov.hardHit;
  
  const c1=100-scale(hrRate,L.p_hr,L.p_hr*1.8);
  const c2=100-scale(xSLG,L.p_xSLG,L.p_xSLG*1.3);
  const c3=hr9!=null?100-scale(hr9,1.2,2.0):50;
  const c4=fip!=null?100-scale(fip,L.p_fip,L.p_fip*1.3):50;
  const c5=hardHit!=null?100-scale(hardHit,L.p_hardHit||38,(L.p_hardHit||38)*1.25):50;
  
  const ip=ov.ip||0;
  const sampleW=clamp(ip/50,0.4,1);
  const raw=c1*0.30+c2*0.25+c3*0.15+c4*0.15+c5*0.15;
  return Math.round((50+(raw-50)*sampleW)*10)/10;
}
function pitcherKGenG(pitcher,bHand){
  if(!pitcher||!pitcher.overall.ip)return 50;
  const L=STATE.leagueAvg;
  const ov=pitcher.prev?.isPrevSeason?pitcher.prev.overall:pitcher.overall;
  const sp=pitcherSplit(pitcher,bHand);
  const kr=blendStat(sp,ov,'k_rate',150)??ov.k_rate;
  const k9=ov.k9;
  
  const c1=scale(kr,L.p_k,L.p_k*1.4);
  const c2=k9!=null?scale(k9,L.p_k9,L.p_k9*1.35):50;
  
  const ip=ov.ip||0;
  const sampleW=clamp(ip/50,0.4,1);
  const raw=c1*0.6+c2*0.4;
  return Math.round((50+(raw-50)*sampleW)*10)/10;
}

// Combine batter grade (higher=good for batter) with pitcher grade (higher=tougher)
// Final score 0-100 where higher = better bet FOR THE BATTER to succeed
function combineMatchup(batterG,pitcherG,order){
  if(batterG==null)return null;
  const pG=pitcherG??50;
  const paF=paFactor(order);
  const raw=50+(batterG-pG)/2;
  return Math.round(clamp(raw*paF/1.04+(paF-1)*10,0,100)*10)/10;
}

// Rating from score
function getRat(s,lockAt){
  const lk=lockAt??72;
  if(s==null)return{l:'—',c:'neutral'};
  if(s>=lk)return{l:'🔒 LOCK',c:'lock'};
  if(s>=62)return{l:'🔥 STRONG',c:'hot'};
  if(s>=52)return{l:'⚡ LEAN',c:'lean'};
  if(s<=32)return{l:'✗ FADE',c:'fade'};
  return{l:'—',c:'neutral'};
}

// Navigate to a prop tab and force hottest-first sort
function goToProp(prop){
  // Reset sort to score descending so user always lands on hottest plays
  if(prop==='hits')UI.hitsSort={c:'sc',d:-1};
  else if(prop==='hr')UI.hrSort={c:'sc',d:-1};
  else if(prop==='tb')UI.tbSort={c:'sc',d:-1};
  else if(prop==='k')UI.kSort={c:'sc',d:-1};
  else if(prop==='bb')UI.bbSort={c:'sc',d:-1};
  else if(prop==='pbb')UI.pbbSort={c:'sc',d:-1};
  else if(prop==='tot')UI.totSort={c:'total',d:-1};
  sw(prop);
}


function backBar(label,prop){
  // Kick off background fetch of historical results if a prop key was provided
  if(prop)setTimeout(()=>loadHistoryInBackground(prop),50);
  let histPart='';
  if(prop==='hrLine'){
    // Split HR O/U into two separate score badges so we track Over and Under independently
    histPart+=`<div class="back-hist">${renderHistoryBadge('hrOver','💥 Over 1.5')}</div>`;
    histPart+=`<div class="back-hist">${renderHistoryBadge('hrUnder','💥 Under 1.5')}</div>`;
  }else if(prop){
    histPart+=`<div class="back-hist">${renderHistoryBadge(prop)}</div>`;
    // Separate DK badge for props that have DK lines
    if(['tot','k','pbb','tb','bb','bbat'].includes(prop)){
      histPart+=`<div class="back-hist">${renderDKBadge(prop)}</div>`;
    }
  }
  return `<div class="back-bar"><button class="back-btn" onclick="sw('dash')">← Home</button><span class="back-sep">·</span><span class="back-cur">${label}</span></div>${histPart}`;
}

// Maps prop tab key to the FC renderer for that prop
function fcRendererFor(prop){
  if(prop==='hits')return ()=>renderFCBatters('hit');
  if(prop==='tb')return ()=>renderFCBatters('tb');
  if(prop==='hr')return ()=>renderFCBatters('hr');
  if(prop==='bb')return ()=>renderFCBatters('bb');
  if(prop==='bbat')return ()=>renderFCBatters('bbat');
  if(prop==='k')return renderFCPitchers;
  if(prop==='pbb')return renderFCPitcherBB;
  if(prop==='gnoHR'||prop==='gmultiHR'||prop==='hrLine')return ()=>renderFCHRLine();
  if(prop==='hrOver')return ()=>renderFCHRLine('Over');
  if(prop==='hrUnder')return ()=>renderFCHRLine('Under');
  if(prop==='tot')return renderFCTotals;
  return null;
}

// If the user has drilled into a past day from the history badge, render that day's
// FC body instead of today's predictions. Returns null if not drilled in.
function maybeRenderDrillView(label,prop){
  const drillDate=HISTORY.drillDate[prop];
  if(!drillDate)return null;
  
  // Loading state — RESULTS hasn't finished loading the past date yet
  if(RESULTS.loading||!RESULTS.loaded||RESULTS.date!==drillDate){
    setMain(`
      ${backBar(label,prop)}
      <div class="fc-drill-banner">
        <span style="color:var(--gd);font-weight:700">📊 ${new Date(drillDate+'T12:00:00').toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'})} · Past Results</span>
        <button class="btn bg" onclick="exitDrill('${prop}')" style="margin-left:auto">← Today</button>
      </div>
      <div class="empty"><b>Loading…</b><div class="spin"></div> Fetching final box scores from MLB API</div>
    `);
    return true;
  }
  
  if(RESULTS.error){
    setMain(`
      ${backBar(label,prop)}
      <div class="fc-drill-banner">
        <span style="color:var(--gd);font-weight:700">📊 ${new Date(drillDate+'T12:00:00').toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'})} · Past Results</span>
        <button class="btn bg" onclick="exitDrill('${prop}')" style="margin-left:auto">← Today</button>
      </div>
      <div class="empty"><b>Error</b>${RESULTS.error}</div>
    `);
    return true;
  }
  
  const renderer=fcRendererFor(prop);
  if(!renderer){
    setMain(`${backBar(label,prop)}<div class="empty">Drill view not available for this prop</div>`);
    return true;
  }
  
  const body=renderer();
  const dateStr=new Date(drillDate+'T12:00:00').toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}).toUpperCase();
  const finalStr=`${RESULTS.gameStatus?.final||0}/${RESULTS.gameStatus?.total||0} games final`;
  
  setMain(`
    ${backBar(label,prop)}
    <div class="fc-drill-banner">
      <div>
        <div style="color:var(--gd);font-weight:700;font-size:.72rem;letter-spacing:.1em">📊 PAST RESULTS · ${dateStr}</div>
        <div style="color:var(--mt2);font-size:.55rem;margin-top:1px">${finalStr}</div>
      </div>
      <button class="btn bg" onclick="exitDrill('${prop}')">← Today</button>
    </div>
    <div class="fc-container">${body}</div>
  `);
  return true;
}

function gamesStrip(){
  return `<details><summary>Today's Games (${STATE.games.length})</summary><div class="gg">${STATE.games.map(g=>{
    const venue=g.venue;
    const wx=g.weather;
    const wxStr=wx?`${Math.round(wx.temp||0)}°F · ${Math.round(wx.windSpeed||0)}mph · ${wx.precipProb||0}% precip`:'No weather';
    // Lineup status per side
    const aStatus=g.aLineup.length?(g.aLineupConfirmed?'<span style="color:var(--gn)">✓ confirmed</span>':`<span style="color:var(--gd)">⚠ ${g.aLineup[0]?.lineupAge||'?'}d old</span>`):'<span style="color:var(--rd)">✗ no lineup</span>';

/* ---------- TOTALS TAB ---------- */
function renderTotals(){
  if(maybeRenderDrillView('🎲 Run Totals','tot'))return;
  const data=[...STATE.totals].filter(t=>t.total!=null);
  if(!data.length){setMain(`<div class="empty">No run total estimates available</div>`);return;}
  
  const sk=UI.totSort.c;
  data.sort((a,b)=>{
    const av=sk==='total'?a.total:sk==='h'?a.homeRuns:a.awayRuns;
    const bv=sk==='total'?b.total:sk==='h'?b.homeRuns:b.awayRuns;
    return (bv-av)*UI.totSort.d;
  });
  
  const avg=data.reduce((s,t)=>s+t.total,0)/data.length;
  const high=data.filter(t=>t.total>=9).length;
  const low=data.filter(t=>t.total<=7).length;
  
  const cards=data.map(t=>{
    const g=t.game,park=t.park,wx=t.wx,venue=g.venue;
    const windF=wx?windHRFactor(venue,wx):1;
    const tempF=wx?tempHRFactor(wx.temp):1;
    const precipF=wx?precipRunFactor(wx):1;
    const isDome=DOMED.has(venue)&&!DOME_OPENS.has(venue);
    
    const wxStr=wx?`${Math.round(wx.temp||0)}°F · ${Math.round(wx.windSpeed||0)}mph · ${wx.humidity||0}%rh · ${wx.precipProb||0}% precip`:'No weather';
    
    return `<div class="rtc" onclick="openGameMo('${g.gamePk}')">
      <div class="rtc-h">
        <div>
          <div class="rtc-team">${g.away.abbr||g.away.name}</div>
          <div class="rtc-pit"><span style="color:${hc(g.aSPHand)}">${g.aSPHand||'?'}HP</span> ${g.aSP?.name||'TBD'}</div>
        </div>
        <div class="rtc-total">
          <div class="rtc-total-v">${Math.round(t.total)}</div>
          <div class="rtc-total-l">Proj Total</div>
        </div>
        <div style="text-align:right">
          <div class="rtc-team">${g.home.abbr||g.home.name}</div>
          <div class="rtc-pit"><span style="color:${hc(g.hSPHand)}">${g.hSPHand||'?'}HP</span> ${g.hSP?.name||'TBD'}</div>
        </div>
      </div>
      <div class="rtc-split">
        <div>
          <div class="rtc-split-v" style="color:var(--ac)">${t.awayRuns}</div>
          <div class="rtc-split-l">${g.away.abbr||g.away.name} Runs</div>
        </div>
        <div>
          <div class="rtc-split-v" style="color:var(--ac)">${t.homeRuns}</div>
          <div class="rtc-split-l">${g.home.abbr||g.home.name} Runs</div>
        </div>
      </div>
      <div class="rtc-factors">
        <div class="rtc-f">🏟️ <b>${venue.replace(/(Stadium|Park|Field)/i,'').trim()}</b></div>
        <div class="rtc-f">Park R: <b style="color:${park.r>1?'var(--gn)':'var(--rd)'}">${park.r.toFixed(2)}</b></div>
        <div class="rtc-f">HR: <b style="color:${park.hr>1?'var(--gn)':'var(--rd)'}">${park.hr.toFixed(2)}</b></div>
        ${isDome?'<div class="rtc-f">🏛️ Dome</div>':`
          <div class="rtc-f">🌡 <b>${wx?Math.round(wx.temp):'?'}°F</b></div>
          <div class="rtc-f">💨 <b style="color:${windF>1.03?'var(--gn)':windF<0.97?'var(--rd)':'var(--mt)'}">${wx?Math.round(wx.windSpeed):'?'}mph</b></div>
          <div class="rtc-f">🌧 <b style="color:${wx?.precipProb>=40?'var(--rd)':'var(--mt)'}">${wx?.precipProb||0}%</b></div>
        `}
      </div>
      ${(()=>{
        const odds=getOddsForGame(STATE.date,g.home.name,g.away.name);
        if(!odds)return '';
        const ourTotal=t.total;
        const dkLine=odds.total?.point;
        const totalEdgeNum=dkLine!=null?parseFloat((ourTotal-dkLine).toFixed(1)):null;
        const totalIsEdge=totalEdgeNum!=null&&Math.abs(totalEdgeNum)>=DK_LOCKS.tot;
        const totalEdgeColor=totalIsEdge?(totalEdgeNum>0?'var(--gn)':'var(--rd)'):'var(--ac)';
        const totalEdgeStr=totalEdgeNum!=null?` · <span style="color:${totalEdgeColor}">model ${totalEdgeNum>0?'+':''}${totalEdgeNum}</span>`:'';
        
        // Explicit O/U bet recommendation:
        // - Lock if model differs from DK line by ≥ DK_LOCKS.tot runs (strong edge)
        // - Lean if differs by half that (moderate edge)
        // - No bet if smaller (no edge)
        let betRec='';
        if(totalEdgeNum!=null){
          const absEdge=Math.abs(totalEdgeNum);
          if(absEdge>=DK_LOCKS.tot){
            const side=totalEdgeNum>0?'OVER':'UNDER';
            betRec=`<div style="background:rgba(46,213,115,.15);border:1.5px solid var(--gn);color:var(--gn);padding:4px 10px;border-radius:4px;font-size:.7rem;font-weight:700;letter-spacing:.5px;display:inline-block">🔒 BET ${side} ${dkLine}</div>`;
          }else if(absEdge>=DK_LOCKS.tot/2){
            const side=totalEdgeNum>0?'OVER':'UNDER';
            betRec=`<div style="background:rgba(255,184,0,.1);border:1px solid var(--gd);color:var(--gd);padding:3px 8px;border-radius:4px;font-size:.62rem;font-weight:600;display:inline-block">📊 LEAN ${side} ${dkLine}</div>`;
          }else{
            betRec=`<div style="color:var(--mt2);font-size:.55rem;font-style:italic;padding:3px 0">No edge — pass</div>`;
          }
        }
        
        // Moneyline pick from our model: whichever side has more projected runs
        const ourPick=t.homeRuns>t.awayRuns?'home':t.awayRuns>t.homeRuns?'away':null;
        const dkML=odds.moneyline;
        // DK favorite = lower (more negative) price. Disagreement = our pick != DK favorite.
        let mlEdgeColor='var(--ac)';
        if(ourPick&&dkML&&dkML.home!=null&&dkML.away!=null){
          const dkFav=dkML.home<dkML.away?'home':'away';
          if(dkFav!==ourPick)mlEdgeColor='var(--gn)';
        }
        const ourPickStr=ourPick?` · we like <b style="color:${mlEdgeColor}">${ourPick==='home'?g.home.abbr:g.away.abbr}</b>`:'';
        
        return `<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--bd)">
          ${betRec?`<div style="margin-bottom:6px">${betRec}</div>`:''}
          <div style="display:flex;flex-wrap:wrap;gap:6px;font-size:.55rem">
            ${odds.total?`<div class="rtc-f" style="background:rgba(0,212,255,.05);color:var(--ac)">📊 DK O/U <b>${dkLine}</b> (${fmtML(odds.total.over)}/${fmtML(odds.total.under)})${totalEdgeStr}</div>`:''}
            ${dkML?`<div class="rtc-f" style="background:rgba(0,212,255,.05);color:var(--ac)">💰 ML ${g.away.abbr} ${fmtML(dkML.away)} / ${g.home.abbr} ${fmtML(dkML.home)}${ourPickStr}</div>`:''}
            ${odds.spread?.point!=null?`<div class="rtc-f" style="background:rgba(0,212,255,.05);color:var(--ac)">📐 Spread ${odds.spread.point>0?'+':''}${odds.spread.point}</div>`:''}
          </div>
        </div>`;
      })()}
    </div>`;
  }).join('');
  
  setMain(`
    ${backBar('🎲 Run Totals','tot')}
    <div class="sum">
      <div class="pill"><span class="pn">${avg.toFixed(1)}</span>Avg Total</div>
      <div class="pill ht"><span class="pn">${high}</span>9+ Totals</div>
      <div class="pill ln"><span class="pn">${low}</span>≤7 Totals</div>
      <div class="pill"><span class="pn">${data.length}</span>Games</div>
    </div>
    <div class="info" style="font-size:.6rem;margin-bottom:10px">Projected runs = team offense (xwOBA-blended vs split) × pitcher suppression × park × weather. Model uses log5-style batter/pitcher combining.</div>
    ${cards}
  `);
}

  const lk=data.filter(t=>t.hrLineScore>=LOCKS.hrLine).length;
  const overCount=data.filter(t=>t.hrLinePick==='Over').length;
  const underCount=data.filter(t=>t.hrLinePick==='Under').length;
  
  const rows=data.map(t=>{
    const r=getRat(t.hrLineScore,LOCKS.hrLine);
    const rc=r.c==='lock'?'lr':r.c==='hot'?'hr2':r.c==='lean'?'lnr':'';
    const g=t.game;
    const pickColor=t.hrLinePick==='Over'?'var(--gn)':'var(--ac)';
    const lockTag=t.hrLineScore>=LOCKS.hrLine?'<span style="font-size:.55rem;color:var(--rd);margin-left:4px">🔒</span>':'';
    // DK total signal: only flag if DK's total strongly conflicts with our HR direction.
    // Picking Over HRs but DK has total ≤ 7.0 (low-scoring game expected) = real conflict.
    // Picking Under HRs but DK has total ≥ 9.5 (high-scoring game expected) = real conflict.
    // Anything else = neutral white display.
    const odds=getOddsForGame(STATE.date,g.home.name,g.away.name);
    let dkSignal='—';
    if(odds?.total?.point!=null){
      const pt=odds.total.point;
      const conflictsWithPick=(t.hrLinePick==='Over'&&pt<=7.0)||(t.hrLinePick==='Under'&&pt>=9.5);
      const sigColor=conflictsWithPick?'var(--rd)':'var(--ac)';
      const sigIcon=conflictsWithPick?' ⚠':'';
      const sigWeight=conflictsWithPick?'700':'400';
      dkSignal=`<span style="color:${sigColor};font-weight:${sigWeight}">${pt}${sigIcon}</span>`;
    }
    return `<tr class="${rc}" onclick="openHRLineMo('${g.gamePk}')">
      <td><strong style="color:${pickColor};font-size:1rem">${t.hrLinePick}</strong>${lockTag}</td>
      <td><strong style="color:var(--ac)">${t.totalHR.toFixed(1)}</strong></td>
      <td class="l"><strong>${g.away.abbr||g.away.name} @ ${g.home.abbr||g.home.name}</strong></td>
      <td style="color:var(--mt2)">${t.aSPhr?.toFixed(1)||'—'} / ${t.hSPhr?.toFixed(1)||'—'}</td>
      <td style="color:var(--mt2)">${t.park?.hr.toFixed(2)||'—'}</td>
      <td style="font-size:.6rem">${dkSignal}</td>
    </tr>`;
  }).join('');
  
  setMain(`
    ${backBar('💥 HR O/U 1.5 (Game)','hrLine')}
    <div class="info" style="font-size:.6rem;margin-bottom:8px">Bet column = model's call on Over or Under 1.5 total HRs. 🔒 = high-confidence (Lock). xHR = projected total HRs. DK Tot = DraftKings game run total (⚠ in red only when DK strongly disagrees with our HR direction).</div>

function srchP(q){
  const dd=document.getElementById('dd');if(!dd)return;
  if(q.length<2){dd.classList.remove('open');return;}
  const qL=q.toLowerCase();
  const res=[];const seenB=new Set(),seenP=new Set();
  
  STATE.matchups.filter(m=>m.kind==='batter'&&m.batterName.toLowerCase().includes(qL)).forEach(m=>{
    if(!seenB.has(m.batterId)){
      seenB.add(m.batterId);
      res.push({n:m.batterName,t:'Batter',meta:`${m.team.abbr||m.team.name} #${m.order}`,id:m.batterId,pid:m.pitcherId,isB:true});
    }
  });
  STATE.matchups.filter(m=>m.kind==='pitcher'&&m.pitcherName.toLowerCase().includes(qL)).forEach(m=>{
    if(!seenP.has(m.pitcherId)){
      seenP.add(m.pitcherId);
      res.push({n:m.pitcherName,t:'Pitcher',meta:`${m.team.abbr||m.team.name} vs ${m.opp.abbr||m.opp.name}`,id:m.pitcherId,isB:false});
    }
  });
  
  if(!res.length){dd.innerHTML='<div style="padding:9px 12px;color:var(--mt);font-size:.68rem">No results</div>';dd.classList.add('open');return;}
  dd.innerHTML=res.slice(0,12).map(r=>`<div class="ddi" onclick="selSrch('${r.id}',${r.isB},'${r.pid||''}')"><span class="din">${r.n}</span><span class="dim">${r.t} · ${r.meta}</span></div>`).join('');
  dd.classList.add('open');
}

function selSrch(id,isB,pid){
  document.getElementById('dd')?.classList.remove('open');
