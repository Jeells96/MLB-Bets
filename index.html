async function loadResults(date){
  if(RESULTS.loading)return;
  RESULTS.loading=true;
  RESULTS.date=date;
  RESULTS.error=null;
  RESULTS.batters=[];
  RESULTS.pitchers=[];
  RESULTS.loaded=false;
  // Kick off shared odds pull for this date so FC tables can show DK lines for past games.
  // Doesn't block rendering — it'll re-render when complete.
  if(FB.ready){
    pullSharedOdds(date);
    pullSharedProps(date);
  }
  const renderResultsOrTab=()=>{
    const drillActive=Object.keys(HISTORY.drillDate||{}).length>0&&UI.tab!=='res';
    if(drillActive)renderTab();else renderResults();
  };
  renderResultsOrTab();
  
  try{
    const pred=PRED.byDate[date];
    if(!pred){
      RESULTS.error='No saved predictions for '+date+'. Predictions are saved each time you load a slate — pick a date you previously loaded.';
      RESULTS.loading=false;
      RESULTS.loaded=true;
      renderResultsOrTab();
      return;
    }
    
    // Fetch all final boxscores for that date and build batter/pitcher result maps
    const sched=await fetchJSON(`${MLB}/api/v1/schedule?sportId=1&date=${date}`);
    const games=sched?.dates?.[0]?.games||[];
    const batterResults={},pitcherResults={},gameTotals={};
    let gameStatus={final:0,inProgress:0,scheduled:0,total:games.length};
    
    await batchFetch(games,async (g)=>{
      const status=g.status?.abstractGameCode;
      if(status==='F')gameStatus.final++;
      else if(status==='L')gameStatus.inProgress++;
      else gameStatus.scheduled++;
      if(status!=='F')return; // Only ingest finals — partial games can mislead
      const feed=await fetchGameFeed(g.gamePk);
      if(!feed)return;
      const teams=feed.liveData?.boxscore?.teams||{};
      // Capture final score for run-totals fact-check
      const homeRunsFinal=nn(feed.liveData?.linescore?.teams?.home?.runs);
      const awayRunsFinal=nn(feed.liveData?.linescore?.teams?.away?.runs);
      // Tally total HRs hit in the game
      let gameHRTotal=0;
      ['home','away'].forEach(side=>{
        const teamBat=teams[side]?.teamStats?.batting||{};
        gameHRTotal+=nn(teamBat.homeRuns);
      });
      gameTotals[String(g.gamePk)]={
        homeRuns:homeRunsFinal,
        awayRuns:awayRunsFinal,
        total:homeRunsFinal+awayRunsFinal,
        gameHR:gameHRTotal
      };
      ['home','away'].forEach(side=>{
        const players=teams[side]?.players||{};
        Object.values(players).forEach(p=>{
          const pid=String(p.person?.id||'');
          if(!pid)return;
          const bat=p.stats?.batting||{};
          const pit=p.stats?.pitching||{};
          if(bat.atBats!=null||bat.plateAppearances!=null){
            batterResults[pid]={
              ab:nn(bat.atBats),
              h:nn(bat.hits),
              hr:nn(bat.homeRuns),
              tb:nn(bat.totalBases),
              pa:nn(bat.plateAppearances),
              k:nn(bat.strikeOuts),
              bb:nn(bat.baseOnBalls)
            };
          }
          if(pit.inningsPitched!=null&&nn(pit.inningsPitched)>0){
            pitcherResults[pid]={
              ip:nn(pit.inningsPitched),
              k:nn(pit.strikeOuts),
              bb:nn(pit.baseOnBalls),
              h:nn(pit.hits),
              er:nn(pit.earnedRuns),
              bf:nn(pit.battersFaced)
            };
          }
        });
      });
    },4);
    
    // Merge predictions with results
    RESULTS.batters=pred.batters.map(b=>{
      const r=batterResults[b.id];
      return {
        ...b,
        played:!!r&&(r.ab>0||r.pa>0),
        actualAB:r?.ab??null,
        actualPA:r?.pa??null,
        actualHits:r?.h??null,
        actualHR:r?.hr??null,
        actualTB:r?.tb??null,
        actualBB:r?.bb??null,
        actualK:r?.k??null,
        gotHit:r?(r.h>0?true:(r.ab>0||r.pa>0?false:null)):null
      };
    });
    RESULTS.pitchers=pred.pitchers.map(p=>{
      const r=pitcherResults[p.id];
      return {
        ...p,
        played:!!r,
        actualKs:r?.k??null,
        actualIP:r?.ip??null,
        actualBF:r?.bf??null,
        actualBB:r?.bb??null
      };
    });
    RESULTS.totals=(pred.totals||[]).map(t=>{
      const r=gameTotals[t.gamePk];
      return {
        ...t,
        played:!!r,
        actualTotal:r?.total??null,
        actualHome:r?.homeRuns??null,
        actualAway:r?.awayRuns??null,
        actualGameHR:r?.gameHR??null
      };
    });
    
    RESULTS.gameStatus=gameStatus;
    RESULTS.loading=false;
    RESULTS.loaded=true;
    
    // Cache to HISTORY.byDate so the badge stats include this day immediately,
    // and so we can push to Firebase for shared-history users.
    HISTORY.byDate[date]={
      batters:batterResults,
      pitchers:pitcherResults,
      games:gameTotals
    };
    HISTORY.fetched[date]=true;
    
    // Push to Firebase (non-blocking)
    if(date<todayStr())pushSharedHistory(date);
    
    renderResultsOrTab();
    
  }catch(err){
    console.error(err);
    RESULTS.error=err.message;
    RESULTS.loading=false;
    RESULTS.loaded=true;
    renderResultsOrTab();
  }
}

// Compute lock-grade hit rate for each prop type (used by Overview + chooser screen)
// ─── HISTORICAL ACCURACY (14-day rolling, used by per-prop badges) ───
// Fetch and cache the boxscore for one date. Idempotent.
async function fetchHistoryForDate(date){
  if(HISTORY.fetched[date])return;
  HISTORY.fetched[date]=true; // mark immediately to prevent double-fetches
  // Pull shared DK odds for this date so historical accuracy can use them
  if(FB.ready){
    pullSharedOdds(date);
    pullSharedProps(date);
  }
  try{
    const sched=await fetchJSON(`${MLB}/api/v1/schedule?sportId=1&date=${date}`);
    const games=sched?.dates?.[0]?.games||[];
    const dayData={batters:{},pitchers:{},games:{}};
    for(const g of games){
      if(g.status?.abstractGameCode!=='F')continue;
      const feed=await fetchGameFeed(g.gamePk);
      if(!feed)continue;
      const teams=feed.liveData?.boxscore?.teams||{};
      const homeRuns=nn(feed.liveData?.linescore?.teams?.home?.runs);
      const awayRuns=nn(feed.liveData?.linescore?.teams?.away?.runs);
      // Tally total HRs hit in the game (for 0-1 HR / 2+ HR game bets)
      let gameHR=0;
      ['home','away'].forEach(side=>{
        const teamBat=teams[side]?.teamStats?.batting||{};
        gameHR+=nn(teamBat.homeRuns);
      });
      dayData.games[String(g.gamePk)]={homeRuns,awayRuns,total:homeRuns+awayRuns,gameHR};
      ['home','away'].forEach(side=>{
        const players=teams[side]?.players||{};
        Object.values(players).forEach(p=>{
          const pid=String(p.person?.id||'');
          if(!pid)return;
          const bat=p.stats?.batting||{};
          const pit=p.stats?.pitching||{};
          if(bat.atBats!=null||bat.plateAppearances!=null){
            dayData.batters[pid]={ab:nn(bat.atBats),h:nn(bat.hits),hr:nn(bat.homeRuns),tb:nn(bat.totalBases),pa:nn(bat.plateAppearances),k:nn(bat.strikeOuts),bb:nn(bat.baseOnBalls)};
          }
          if(pit.inningsPitched!=null&&nn(pit.inningsPitched)>0){
            dayData.pitchers[pid]={ip:nn(pit.inningsPitched),k:nn(pit.strikeOuts),bb:nn(pit.baseOnBalls),h:nn(pit.hits),er:nn(pit.earnedRuns),bf:nn(pit.battersFaced)};
          }
        });
      });
    }
    HISTORY.byDate[date]=dayData;
    // Share this day to Firebase so other users see it
    if(date<todayStr())pushSharedHistory(date);
  }catch(e){
    console.warn('[DIQ] history fetch failed for',date,e.message);
    HISTORY.fetched[date]=false; // allow retry
  }
}

// Kick off background fetch of the last 14 days' final boxscores (excluding today).
// Triggers UI re-render after completion.
function loadHistoryInBackground(propToRefresh){
  // Trigger a Firebase pull (throttled to once per minute) so other users' data shows up
  maybeAutoPull();
  // Also pull DK odds/props for the 14D window so historical DK stats can compute.
  // This is independent of HISTORY fetched state — DK data may have been pushed
  // after we cached the boxscore results.
  pullDKHistoryWindow();
  if(HISTORY.loading)return;
  const today=todayStr();
  const savedDates=Object.keys(PRED.byDate).filter(d=>d<today).sort().reverse().slice(0,14);
  // Re-fetch dates that are unfetched OR have stale cached data missing gameHR
  // (gameHR field added in v6.3 — older HISTORY caches don't have it, breaks HR O/U accuracy).
  const todoFetches=savedDates.filter(d=>{
    if(!HISTORY.fetched[d])return true;
    const cached=HISTORY.byDate[d];
    if(!cached)return true;
    const games=cached.games||{};
    const gamePks=Object.keys(games);
    if(gamePks.length===0)return false;
    // If ANY cached game lacks gameHR, treat the whole day as stale
    const hasStale=gamePks.some(pk=>games[pk]?.gameHR==null);
    if(hasStale){
      HISTORY.fetched[d]=false; // allow refetch
      return true;
    }
    return false;
  });
  if(!todoFetches.length)return;
  HISTORY.loading=true;
  Promise.all(todoFetches.map(fetchHistoryForDate)).then(()=>{
    HISTORY.loading=false;
    renderTab();
  });
}

// Compute per-day lock-grade outcomes for a prop across saved history.
// Returns: { days: [{date, hits, n, rate}], totalHits, totalN, totalRate }
// Top-2 Hits accuracy across saved history.
// For each saved day, look at the 2 highest-scored Hit picks and check if they got a hit.
// Returns same shape as historicalLockStats.
function historicalTop2HitsStats(){
  return historicalTopNStats('hits',2);
}

// Generalized top-N historical accuracy across saved 14 days for any prop.
// For each day, takes the top picks that meet lock threshold (capped at n).
// If only 1 lock exists, evaluates 1/1 — never pulls in non-lock picks to fill the slot.
function historicalTopNStats(prop,n){
  const today=todayStr();
  const dates=Object.keys(PRED.byDate).filter(d=>d<today).sort().reverse().slice(0,14);
  const days=[];
  let totalHits=0,totalN=0;
  for(const date of dates){
    const pred=PRED.byDate[date];
    const hist=HISTORY.byDate[date];
    if(!hist){
      days.push({date,hits:null,n:null,rate:null,pending:true});
      continue;
    }
    let topPicks=[],pickType='batter';
    if(prop==='hits'){
      topPicks=(pred.batters||[]).filter(b=>b.score!=null&&b.score>=LOCKS.hits).sort((a,b)=>b.score-a.score).slice(0,n);
    }else if(prop==='tb'){
      topPicks=(pred.batters||[]).filter(b=>b.tbScore!=null&&b.tbScore>=LOCKS.tb).sort((a,b)=>b.tbScore-a.tbScore).slice(0,n);
    }else if(prop==='hr'){
      topPicks=(pred.batters||[]).filter(b=>b.hrScore!=null&&b.hrScore>=LOCKS.hr).sort((a,b)=>b.hrScore-a.hrScore).slice(0,n);
    }else if(prop==='bb'){
      topPicks=(pred.batters||[]).filter(b=>b.bbScore!=null&&b.expectedBB!=null&&b.bbScore>=LOCKS.bb).sort((a,b)=>b.bbScore-a.bbScore).slice(0,n);
    }else if(prop==='k'){
      topPicks=(pred.pitchers||[]).filter(p=>p.grade!=null&&p.grade>=LOCKS.k).sort((a,b)=>b.grade-a.grade).slice(0,n);
      pickType='pitcher';
    }else if(prop==='pbb'){
      topPicks=(pred.pitchers||[]).filter(p=>p.bbGrade!=null&&p.expectedBB!=null&&p.bbGrade>=LOCKS.pbb).sort((a,b)=>b.bbGrade-a.bbGrade).slice(0,n);
      pickType='pitcher';
    }else if(prop==='tot'){
      // For totals, pick the top n games by predicted total — "top" doesn't mean much, skip
      days.push({date,hits:null,n:null,rate:null,outcomes:[],noTop:true});
      continue;
    }
    let hits=0,nPlayed=0,outcomes=[];
    topPicks.forEach(p=>{
      if(pickType==='batter'){
        const r=hist.batters[p.id];
        if(!r||(r.ab===0&&r.pa===0))return;
        nPlayed++;
        let got=false;
        if(prop==='hits')got=r.h>0;
        else if(prop==='tb')got=(r.tb||0)>=roundConservative(p.expectedTB||0);
        else if(prop==='hr')got=(r.hr||0)>0;
        else if(prop==='bb')got=(r.bb||0)>=roundConservative(p.expectedBB||0);
        if(got)hits++;outcomes.push(got);
      }else{
        const r=hist.pitchers[p.id];
        if(!r)return;
        nPlayed++;
        let got=false;
        if(prop==='k')got=r.k>=roundConservative(p.xK||0);
        else if(prop==='pbb')got=(r.bb||0)>=roundConservative(p.expectedBB||0);
        if(got)hits++;outcomes.push(got);
      }
    });
    days.push({date,hits,n:nPlayed,rate:nPlayed?Math.round(hits/nPlayed*100):null,outcomes});
    totalHits+=hits;totalN+=nPlayed;
  }
  return {days,totalHits,totalN,totalRate:totalN?Math.round(totalHits/totalN*100):null};
}

// Historical DK bet success rate. For each past date, compute the win/loss of every bet
// recommendation we made (based on |model - DK line| ≥ lean margin). Returns 14-day rolling stats.
function historicalDKBetStats(prop){
  const today=todayStr();
  const dates=Object.keys(PRED.byDate).filter(d=>d<today).sort().reverse().slice(0,14);
  const days=[];
  let totalWon=0,totalBets=0;
  
  // Per-prop config: market key, model field, lean margin, lock margin, outcome field
  const cfg={
    tot:{marketKey:'total',modelField:'total',leanMargin:DK_LOCKS.tot/2,getResult:(t,r)=>r?.total,gamesKeyed:true},
    k:{marketKey:'pitcher_strikeouts',modelField:'xK',leanMargin:DK_LOCKS.k/2,getResult:(p,r)=>r?.k},
    pbb:{marketKey:'pitcher_walks',modelField:'expectedBB',leanMargin:DK_LOCKS.pbb/2,getResult:(p,r)=>r?.bb},
    tb:{marketKey:'batter_total_bases',modelField:'expectedTB',leanMargin:DK_LOCKS.tb/2,getResult:(b,r)=>r?.tb},
    bb:{marketKey:'batter_walks',modelField:'expectedBB',leanMargin:DK_LOCKS.bb/2,getResult:(b,r)=>r?.bb},
    bbat:{marketKey:'batter_strikeouts',modelField:'batterExpectedK',leanMargin:DK_LOCKS.bbat/2,getResult:(b,r)=>r?.k}
  }[prop];
  if(!cfg)return {totalWon:0,totalBets:0,totalRate:null,days:[]};
  
  for(const date of dates){
    const pred=PRED.byDate[date];
    const hist=HISTORY.byDate[date];
    const oddsForDay=ODDS.data[date]?.games||[];
    const propsForDay=ODDS.props[date]?.events||{};
    if(!hist){days.push({date,won:null,bets:null,rate:null,pending:true});continue;}
    if(!oddsForDay.length&&!Object.keys(propsForDay).length){
      days.push({date,won:0,bets:0,rate:null,noOdds:true});continue;
    }
    
    let won=0,bets=0;
    
    if(prop==='tot'){
      (pred.totals||[]).forEach(t=>{
        if(t.total==null||!isFinite(t.total))return; // skip games with no projection
        const norm=s=>(s||'').toLowerCase().replace(/[^a-z]/g,'');
        const game=oddsForDay.find(g=>{
          const h=norm(g.home_team),a=norm(g.away_team);
          return (h.includes(norm(t.home))||norm(t.home).includes(h))&&(a.includes(norm(t.away))||norm(t.away).includes(a));
        });
        const dk=game?.bookmakers?.find(b=>b.key==='draftkings');
        const market=dk?.markets?.find(m=>m.key==='totals');
        const line=market?.outcomes?.find(o=>o.name==='Over')?.point;
        if(line==null)return;
        const edge=t.total-line;
        if(Math.abs(edge)<cfg.leanMargin)return;
        const recOver=edge>0;
        const actual=hist.games?.[t.gamePk]?.total;
        if(actual==null)return;
        const winBet=recOver?actual>line:actual<line;
        bets++;if(winBet)won++;
      });
    }else if(prop==='k'||prop==='pbb'){
      (pred.pitchers||[]).forEach(p=>{
        const propsLookup=lookupPlayerInProps(propsForDay,p.name);
        const market=propsLookup?.markets?.[cfg.marketKey];
        if(market?.line==null)return;
        const modelVal=p[cfg.modelField];
        if(modelVal==null)return;
        const edge=modelVal-market.line;
        if(Math.abs(edge)<cfg.leanMargin)return;
        const recOver=edge>0;
        const r=hist.pitchers?.[p.id];
        const actual=cfg.getResult(p,r);
        if(actual==null)return;
        const winBet=recOver?actual>market.line:actual<market.line;
        bets++;if(winBet)won++;
      });
    }else if(prop==='tb'||prop==='bb'||prop==='bbat'){
      (pred.batters||[]).forEach(b=>{
        const propsLookup=lookupPlayerInProps(propsForDay,b.name);
        const market=propsLookup?.markets?.[cfg.marketKey];
        if(market?.line==null)return;
        const modelVal=b[cfg.modelField];
        if(modelVal==null)return;
        const edge=modelVal-market.line;
        if(Math.abs(edge)<cfg.leanMargin)return;
        const recOver=edge>0;
        const r=hist.batters?.[b.id];
        if(!r||(r.ab===0&&r.pa===0))return;
        const actual=cfg.getResult(b,r);
        if(actual==null)return;
        const winBet=recOver?actual>market.line:actual<market.line;
        bets++;if(winBet)won++;
      });
    }
    
    days.push({date,won,bets,rate:bets?Math.round(won/bets*100):null});
    totalWon+=won;totalBets+=bets;
  }
  
  return {totalWon,totalBets,totalRate:totalBets?Math.round(totalWon/totalBets*100):null,days};
}

// Helper: look up a player by name across events in a props snapshot
function lookupPlayerInProps(eventsObj,playerName){
  const norm=s=>(s||'').toLowerCase().replace(/[^a-z]/g,'');
  const target=norm(playerName);
  for(const evId in eventsObj){
    const ev=eventsObj[evId];
    if(!ev.markets)continue;
    const matched={};
    for(const market of ev.markets){
      const playerOutcomes=(market.outcomes||[]).filter(o=>norm(o.description)===target);
      if(!playerOutcomes.length)continue;
      const over=playerOutcomes.find(o=>o.name==='Over');
      const under=playerOutcomes.find(o=>o.name==='Under');
      if(over||under){
        matched[market.key]={line:over?.point??under?.point,over:over?.price,under:under?.price};
      }
    }
    if(Object.keys(matched).length)return {markets:matched};
  }
  return null;
}

function historicalLockStats(prop){
  const today=todayStr();
  const dates=Object.keys(PRED.byDate).filter(d=>d<today).sort().reverse().slice(0,14);
  const days=[];
  let totalHits=0,totalN=0;
  for(const date of dates){
    const pred=PRED.byDate[date];
    const hist=HISTORY.byDate[date];
    if(!hist){
      days.push({date,hits:null,n:null,rate:null,pending:true});
      continue;
    }
    let hits=0,n=0,outcomes=[];
    if(prop==='hits'){
      const lockSet=(pred.batters||[]).filter(b=>b.score>=LOCKS.hits);
      lockSet.forEach(b=>{
        const r=hist.batters[b.id];
        if(!r||(r.ab===0&&r.pa===0))return;
        n++;const got=r.h>0;if(got)hits++;outcomes.push(got);
      });
    }else if(prop==='tb'){
      const lockSet=(pred.batters||[]).filter(b=>b.tbScore>=LOCKS.tb&&b.expectedTB!=null);
      lockSet.forEach(b=>{
        const r=hist.batters[b.id];
        if(!r||(r.ab===0&&r.pa===0))return;
        const predWhole=roundConservative(b.expectedTB);
        const got=(r.tb||0)>=predWhole;
        n++;if(got)hits++;outcomes.push(got);
      });
    }else if(prop==='hr'){
      const lockSet=(pred.batters||[]).filter(b=>b.hrScore>=LOCKS.hr);
      lockSet.forEach(b=>{
        const r=hist.batters[b.id];
        if(!r||(r.ab===0&&r.pa===0))return;
        const got=(r.hr||0)>0;
        n++;if(got)hits++;outcomes.push(got);
      });
    }else if(prop==='k'){
      const lockSet=(pred.pitchers||[]).filter(p=>p.grade>=LOCKS.k);
      lockSet.forEach(p=>{
        const r=hist.pitchers[p.id];
        if(!r)return;
        const predWhole=roundConservative(p.xK);
        const got=r.k>=predWhole;
        n++;if(got)hits++;outcomes.push(got);
      });
    }else if(prop==='bb'){
      // Batter walks: lock = bbScore >= 72; ✓ if actual BB >= rounded predicted
      const lockSet=(pred.batters||[]).filter(b=>b.bbScore>=LOCKS.bb&&b.expectedBB!=null);
      lockSet.forEach(b=>{
        const r=hist.batters[b.id];
        if(!r||(r.ab===0&&r.pa===0))return;
        const predWhole=roundConservative(b.expectedBB);
        const got=(r.bb||0)>=predWhole;
        n++;if(got)hits++;outcomes.push(got);
      });
    }else if(prop==='pbb'){
      // Pitcher walks allowed: lock = bbGrade >= 72; ✓ if actual BB allowed >= rounded predicted
      const lockSet=(pred.pitchers||[]).filter(p=>p.bbGrade>=LOCKS.pbb&&p.expectedBB!=null);
      lockSet.forEach(p=>{
        const r=hist.pitchers[p.id];
        if(!r)return;
        const predWhole=roundConservative(p.expectedBB);
        const got=(r.bb||0)>=predWhole;
        n++;if(got)hits++;outcomes.push(got);
      });
    }else if(prop==='bbat'){
      // Batter strikeouts: ✓ if actual K >= rounded predicted
      const lockSet=(pred.batters||[]).filter(b=>b.batterKScore>=LOCKS.bbat&&b.batterExpectedK!=null);
      lockSet.forEach(b=>{
        const r=hist.batters[b.id];
        if(!r||(r.ab===0&&r.pa===0))return;
        const predWhole=roundConservative(b.batterExpectedK);
        const got=(r.k||0)>=predWhole;
        n++;if(got)hits++;outcomes.push(got);
      });
    }else if(prop==='hrLine'||prop==='gnoHR'||prop==='gmultiHR'||prop==='hrOver'||prop==='hrUnder'){
      // HR Over/Under 1.5: ✓ if pick was correct
      // 'hrLine' counts all locks regardless of side.
      // 'hrOver' counts only Over picks (success = actual gameHR >= 2)
      // 'hrUnder' counts only Under picks (success = actual gameHR <= 1)
      // Backward compat: derive pick from old fields if missing
      const enriched=(pred.totals||[]).map(t=>{
        if(t.hrLinePick!=null&&t.hrLineScore!=null)return t;
        if(t.noHRScore!=null&&t.multiHRScore!=null){
          const pick=t.noHRScore>=t.multiHRScore?'Under':'Over';
          const score=Math.max(t.noHRScore,t.multiHRScore);
          return {...t,hrLinePick:pick,hrLineScore:score};
        }
        return t;
      });
      let lockSet=enriched.filter(t=>t.hrLineScore>=LOCKS.hrLine);
      if(prop==='hrOver')lockSet=lockSet.filter(t=>t.hrLinePick==='Over');
      else if(prop==='hrUnder')lockSet=lockSet.filter(t=>t.hrLinePick==='Under');
      lockSet.forEach(t=>{
        const r=hist.games[t.gamePk];
        if(!r||r.gameHR==null)return;
        const got=t.hrLinePick==='Over'?(r.gameHR>=2):(r.gameHR<=1);
        n++;if(got)hits++;outcomes.push(got);
      });
    }else if(prop==='tot'){
      // Run Totals: match rate within 0.4 of rounded predicted (no lock tier)
      (pred.totals||[]).forEach(t=>{
        const r=hist.games[t.gamePk];
        if(!r)return;
        const got=Math.abs(r.total-Math.round(t.total))<=0.4;
        n++;if(got)hits++;outcomes.push(got);
      });
    }
    days.push({date,hits,n,rate:n?Math.round(hits/n*100):null,outcomes});
    totalHits+=hits;totalN+=n;
  }
  return {days,totalHits,totalN,totalRate:totalN?Math.round(totalHits/totalN*100):null};
}

// Render the small historical badge that goes next to the prop tab title.
function renderHistoryBadge(prop,labelOverride){
  const stats=historicalLockStats(prop);
  const expanded=HISTORY.expanded[prop];
  // Run Totals has no lock tier, so call it "Success Rate" instead of "Lock Grade Success"
  let label=prop==='tot'?'14D Success Rate:':'14D Lock Grade Success:';
  if(labelOverride)label=`14D ${labelOverride}:`;
  const isLoading=HISTORY.loading&&stats.days.some(d=>d.pending);
  
  let mainTxt;
  if(stats.totalN===0){
    if(isLoading){
      mainTxt='<span style="color:var(--mt)">calculating…</span>';
    }else{
      // For new bet types added in v6.3, explain why there's no history yet
      const isNewBetType=['hrLine','gnoHR','gmultiHR','bbat','hrOver','hrUnder'].includes(prop);
      mainTxt=isNewBetType
        ?'<span style="color:var(--mt)">new — accumulates over time</span>'
        :'<span style="color:var(--mt)">no history</span>';
    }
  }else{
    const c=stats.totalRate>=70?'var(--gn)':stats.totalRate>=50?'var(--gd)':'var(--rd)';
    mainTxt=`<b style="color:${c}">${stats.totalRate}%</b> <span style="color:var(--mt2)">(${stats.totalHits}/${stats.totalN})</span>`;
  }
  
  const collapsed=`<button class="hist-badge" onclick="HISTORY.expanded['${prop}']=!HISTORY.expanded['${prop}'];renderTab()">
    <span class="hist-badge-l">${label}</span> ${mainTxt} <span class="hist-badge-arr">${expanded?'▴':'▾'}</span>
  </button>`;
  
  if(!expanded)return collapsed;
  
  // Expanded view: per-day breakdown. Each row tappable to drill into that day's results.
  // For Hits prop: pre-compute a date->top2 map so each row can show the top-2 fraction
  const t2ByDate={};
  if(prop==='hits'){
    const t2=historicalTop2HitsStats();
    t2.days.forEach(d=>{t2ByDate[d.date]=d;});
  }
  
  const rows=stats.days.map(d=>{
    const dateLabel=new Date(d.date+'T12:00:00').toLocaleDateString([],{month:'short',day:'numeric'});
    // For Hits, the table has 5 columns: Date | Rate% | Lock fraction | Top-2 fraction | ✓✗
    // For other props: 4 columns: Date | Rate% | Lock fraction | ✓✗
    const colspanLoading=prop==='hits'?4:3;
    if(d.pending){
      return `<tr><td style="color:var(--mt2);padding:5px 4px">${dateLabel}</td><td colspan="${colspanLoading}" style="color:var(--mt);font-style:italic;padding:5px 4px">loading…</td></tr>`;
    }
    if(d.n===0){
      return `<tr><td style="color:var(--mt2);padding:5px 4px">${dateLabel}</td><td colspan="${colspanLoading}" style="color:var(--mt);padding:5px 4px">no qualifying plays</td></tr>`;
    }
    const c=d.rate>=70?'var(--gn)':d.rate>=50?'var(--gd)':'var(--rd)';
    const marks=d.outcomes.slice(0,12).map(o=>`<span style="color:${o?'var(--gn)':'var(--rd)'};font-weight:700">${o?'✓':'✗'}</span>`).join('');
    
    // Top-2 cell (Hits only): green if all lock-level picks hit, red if any missed.
    // If only 1 lock pick existed, evaluates as 1/1 not 1/2 — never inflates the denominator.
    let top2Cell='';
    if(prop==='hits'){
      const t2d=t2ByDate[d.date];
      if(t2d&&t2d.n>0){
        const t2Color=t2d.hits===t2d.n?'var(--gn)':'var(--rd)';
        top2Cell=`<td style="font-size:.62rem;letter-spacing:.04em;padding:6px 4px;color:${t2Color};font-weight:700;text-align:center">${t2d.hits}/${t2d.n}</td>`;
      }else{
        top2Cell='<td style="padding:6px 4px;color:var(--mt);text-align:center">—</td>';
      }
    }
    
    return `<tr class="hist-day-row" onclick="drillIntoDay('${prop}','${d.date}')" style="cursor:pointer">
      <td style="color:var(--tx2);font-weight:600;padding:6px 4px">${dateLabel}</td>
      <td style="text-align:right;font-weight:700;padding:6px 4px;color:${c}">${d.rate}%</td>
      <td style="font-size:.62rem;letter-spacing:.04em;padding:6px 4px;color:var(--mt2)">${d.hits}/${d.n}</td>
      ${top2Cell}
      <td style="font-size:.7rem;letter-spacing:.06em;padding:6px 4px;text-align:right">${marks}${d.outcomes.length>12?` <span style="color:var(--mt);font-size:.55rem">+${d.outcomes.length-12}</span>`:''}</td>
    </tr>`;
  }).join('');
  
  // Total row colspan adjusts based on whether Hits added a column
  let totalLine='';
  if(stats.totalN>0){
    const totalColor=stats.totalRate>=70?'var(--gn)':stats.totalRate>=50?'var(--gd)':'var(--rd)';
    let top2TotalCell='';
    if(prop==='hits'){
      const t2=historicalTop2HitsStats();
      if(t2.totalN>0){
        const t2c=t2.totalRate>=70?'var(--gn)':t2.totalRate>=50?'var(--gd)':'var(--rd)';
        top2TotalCell=`<td style="padding-top:7px;text-align:center;font-weight:700;color:${t2c};font-size:.62rem">${t2.totalHits}/${t2.totalN}</td>`;
      }else{
        top2TotalCell='<td style="padding-top:7px;text-align:center;color:var(--mt)">—</td>';
      }
    }
    totalLine=`<tr style="border-top:1px solid var(--bdr2)">
      <td style="color:var(--tx);font-weight:700;padding-top:7px">14-day total</td>
      <td style="text-align:right;padding-top:7px;font-weight:700"><b style="color:${totalColor}">${stats.totalRate}%</b></td>
      <td style="padding-top:7px;color:var(--mt2);font-size:.62rem">${stats.totalHits}/${stats.totalN}</td>
      ${top2TotalCell}
      <td></td>
    </tr>`;
  }
  
  // For Hits only: also show the "Top 2 Locks" rate as a mini-section above the per-day table.
  // Only counts lock-level picks — if a day had only 1 lock, it counts as 1/1 not 1/2.
  let top2Section='';
  if(prop==='hits'){
    const t2=historicalTop2HitsStats();
    if(t2.totalN>0){
      const c=t2.totalRate>=70?'var(--gn)':t2.totalRate>=50?'var(--gd)':'var(--rd)';
      top2Section=`<div class="hist-top2">
        <span class="hist-top2-l">14D Top-2 Locks Hit Rate:</span>
        <b style="color:${c}">${t2.totalRate}%</b>
        <span style="color:var(--mt2);font-size:.55rem">(${t2.totalHits}/${t2.totalN})</span>
        <span class="hist-top2-note">— top 🔒 picks, all-or-nothing per day</span>
      </div>`;
    }else if(HISTORY.loading){
      top2Section=`<div class="hist-top2"><span class="hist-top2-l">14D Top-2 Locks Hit Rate:</span> <span style="color:var(--mt)">calculating…</span></div>`;
    }
  }
  
  // Count what's actually in the underlying data to show in empty state
  const today=todayStr();
  const predCount=Object.keys(PRED.byDate||{}).filter(d=>d<today).length;
  const histCount=Object.keys(HISTORY.byDate||{}).filter(d=>d<today).length;
  const emptyMsg=`<tr><td colspan="${prop==='hits'?5:4}" style="color:var(--mt);text-align:center;padding:8px 4px">
    No saved predictions yet for past dates<br>
    <span style="font-size:.5rem;color:var(--mt2)">Predictions saved: ${predCount} · Results cached: ${histCount}</span>
  </td></tr>`;
  
  return `${collapsed}
    <div class="hist-expanded">
      ${top2Section}
      <div style="font-size:.5rem;color:var(--mt);padding:0 4px 4px;letter-spacing:.06em;text-transform:uppercase">tap a day to view that day's results</div>
      <div style="font-size:.5rem;color:var(--mt2);padding:0 4px 4px;font-family:'DM Mono',monospace">
        Lock cutoff: ${(()=>{
          const m={hits:LOCKS.hits,tb:LOCKS.tb,hr:LOCKS.hr,bb:LOCKS.bb,k:LOCKS.k,pbb:LOCKS.pbb,bbat:LOCKS.bbat,hrLine:LOCKS.hrLine};
          return m[prop]??'?';
        })()} · Saved: ${predCount} pred · ${histCount} results
      </div>
      <table style="width:100%;font-size:.6rem;border-collapse:collapse">
        <tbody>${rows||emptyMsg}${totalLine}</tbody>
      </table>
    </div>`;
}

  const totalRow=dkStats.totalBets>0?`<tr style="border-top:1px solid var(--bd);font-weight:700">

    <td style="padding:5px 4px;text-align:right;color:${dkStats.totalRate>=55?'var(--gn)':dkStats.totalRate>=45?'var(--gd)':'var(--rd)'}">${dkStats.totalRate}%</td>
    <td style="padding:5px 4px;text-align:right;color:var(--mt2)">${dkStats.totalWon}/${dkStats.totalBets}</td>
  </tr>`:'';
  
  return `${collapsed}
    <div class="hist-expanded" style="border-left:2px solid var(--ac)">
      <div style="font-size:.5rem;color:var(--mt2);padding:0 4px 4px;line-height:1.4">
        Counts bets where |model − DK line| ≥ lean margin for this prop. ✓ when actual finished on our side of the line.
      </div>
      <table style="width:100%;font-size:.6rem;border-collapse:collapse">
        <tbody>${rows}${totalRow}</tbody>
      </table>
    </div>`;
}

// Drill into a specific past date for the current prop. Loads results if needed,
// then sets a state var that the prop's render function checks to show the FC view inline.
// Can be invoked from anywhere — switches to the prop tab if not already there.
async function drillIntoDay(prop,date){
  HISTORY.drillDate[prop]=date;
  HISTORY.expanded[prop]=false; // collapse the badge so the FC view has room
  // If we're not currently on this prop's tab, switch to it so the drill view renders.
  // The prop's render function checks HISTORY.drillDate[prop] and shows the FC body inline.
  if(UI.tab!==prop){
    UI.tab=prop;
    // Update the nav highlight if it's a top-level tab (rare — most props are under Home)
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    const tabEl=document.getElementById(`t-${prop}`);
    if(tabEl)tabEl.classList.add('active');
  }
  // Set up RESULTS for that date so the FC body renderers work
  RESULTS.prop=prop;
  if(RESULTS.date!==date||!RESULTS.loaded){
    await loadResults(date);
  }else{
    renderTab();
  }
}

// Exit the drill view — return to live betting predictions for the current prop
function exitDrill(prop){
  delete HISTORY.drillDate[prop];
  renderTab();
}

function fcLockStats(prop){
  if(prop==='hits'||prop==='tb'||prop==='hr'){
    const scoreKey=prop==='hits'?'score':prop==='tb'?'tbScore':'hrScore';
    const lockAt=prop==='hits'?LOCKS.hits:(prop==='tb'?LOCKS.tb:LOCKS.hr);
    const played=RESULTS.batters.filter(b=>b.played&&b[scoreKey]!=null);
    const lockSet=played.filter(b=>b[scoreKey]>=lockAt);
    let hits=0,n=0;
    lockSet.forEach(b=>{
      let h=null;
      if(prop==='hits'){h=b.actualHits>0;}
      else if(prop==='tb'){
        if(b.expectedTB==null)return;
        h=(b.actualTB||0)>=roundConservative(b.expectedTB);
      }
      else if(prop==='hr'){h=b.actualHR>0;}
      if(h===null)return;
      n++;if(h)hits++;
    });
    return {n,hits,rate:n?Math.round(hits/n*100):null,total:RESULTS.batters.length,lockAt};
  }
  if(prop==='bb'){
    const played=RESULTS.batters.filter(b=>b.played&&b.bbScore!=null&&b.expectedBB!=null);
    const lockSet=played.filter(b=>b.bbScore>=LOCKS.bb);
    const hits=lockSet.filter(b=>(b.actualBB||0)>=roundConservative(b.expectedBB)).length;
    return {n:lockSet.length,hits,rate:lockSet.length?Math.round(hits/lockSet.length*100):null,total:RESULTS.batters.length,lockAt:LOCKS.bb};
  }
  if(prop==='bbat'){
    // Batter strikeouts: ✓ if actual K >= rounded predicted
    const played=RESULTS.batters.filter(b=>b.played&&b.batterKScore!=null&&b.batterExpectedK!=null);
    const lockSet=played.filter(b=>b.batterKScore>=LOCKS.bbat);
    const hits=lockSet.filter(b=>(b.actualK||0)>=roundConservative(b.batterExpectedK)).length;
    return {n:lockSet.length,hits,rate:lockSet.length?Math.round(hits/lockSet.length*100):null,total:RESULTS.batters.length,lockAt:LOCKS.bbat};
  }
  if(prop==='k'){
    const played=RESULTS.pitchers.filter(p=>p.played);
    const lockSet=played.filter(p=>p.grade>=LOCKS.k);
    const hits=lockSet.filter(p=>p.actualKs>=roundConservative(p.xK)).length;
    return {n:lockSet.length,hits,rate:lockSet.length?Math.round(hits/lockSet.length*100):null,total:RESULTS.pitchers.length,lockAt:LOCKS.k};
  }
  if(prop==='pbb'){
    const played=RESULTS.pitchers.filter(p=>p.played&&p.bbGrade!=null&&p.expectedBB!=null);
    const lockSet=played.filter(p=>p.bbGrade>=LOCKS.pbb);
    const hits=lockSet.filter(p=>(p.actualBB||0)>=roundConservative(p.expectedBB)).length;
    return {n:lockSet.length,hits,rate:lockSet.length?Math.round(hits/lockSet.length*100):null,total:RESULTS.pitchers.length,lockAt:LOCKS.pbb};
  }
  if(prop==='hrLine'||prop==='gnoHR'||prop==='gmultiHR'){
    // HR Over/Under 1.5: ✓ if pick was correct (Over → ≥2 HR, Under → ≤1 HR)
    // Backward compat: if old data has noHRScore/multiHRScore but no hrLinePick, derive
    const enriched=RESULTS.totals.map(t=>{
      if(t.hrLinePick!=null)return t;
      if(t.noHRScore!=null&&t.multiHRScore!=null){
        const pick=t.noHRScore>=t.multiHRScore?'Under':'Over';
        const score=Math.max(t.noHRScore,t.multiHRScore);
        return {...t,hrLinePick:pick,hrLineScore:score};
      }
      return t;
    });
    const played=enriched.filter(t=>t.played&&t.actualGameHR!=null&&t.hrLineScore!=null);
    const lockSet=played.filter(t=>t.hrLineScore>=LOCKS.hrLine);
    const hits=lockSet.filter(t=>{
      if(t.hrLinePick==='Over')return t.actualGameHR>=2;
      return t.actualGameHR<=1;
    }).length;
    return {n:lockSet.length,hits,rate:lockSet.length?Math.round(hits/lockSet.length*100):null,total:RESULTS.totals.length,lockAt:LOCKS.hrLine};
  }
  if(prop==='tot'){
    const played=RESULTS.totals.filter(t=>t.played);
    const matches=played.filter(t=>Math.abs(t.actualTotal-Math.round(t.total))<=0.4).length;
    return {n:played.length,hits:matches,rate:played.length?Math.round(matches/played.length*100):null,total:RESULTS.totals.length,lockAt:null};
  }
  return {n:0,hits:0,rate:null,total:0,lockAt:null};
}

// ─── LOCKS TAB ───
// Shows every Lock-level pick for today across all prop types, plus the 14D
// success rate for each prop so the user can see how reliable each category has been.
// Three sections: Batter, Pitcher, Game. Each section pulls its locks live from STATE.
// ─── LOCKS SECTION (rendered inline on Home) ───
// Per user spec:
//   - Three collapsible categories: Batter / Pitcher / Game
//   - For each prop, show ONLY ONE lock type: DK if DK player props are loaded for today, else score fallback
//   - HR O/U is a SCORE lock (no DK game-HR-totals market available)
//   - Hits stays score lock (no DK hits market in our subscription)

// Builds a DK lock collector for a player-prop market.
function collectDKLocks(items,marketKey,modelField,lockMargin,nameField){
  return items.map(m=>{
    const playerName=m[nameField];
    const props=getPlayerProps(STATE.date,playerName);
    const market=props?.markets?.[marketKey];
    if(market?.line==null)return null;
    const modelVal=m[modelField];
    if(modelVal==null)return null;
    const edge=modelVal-market.line;
    if(Math.abs(edge)<lockMargin)return null;
    return {m,marketLine:market.line,edge,pick:edge>0?'OVER':'UNDER',modelVal};
  }).filter(x=>x).sort((a,b)=>Math.abs(b.edge)-Math.abs(a.edge));
}

// Picks the right rate badge for a sub-section.
// preferDK=true → show DK win rate. preferDK=false → show score lock rate.
// Badge is tappable to toggle a per-day breakdown.
function locksRateBadge(prop,preferDK){
  const key=`${prop}_${preferDK?'dk':'score'}`;
  const expanded=UI.locksRateExpanded[key];
  const arrow=`<span style="margin-left:4px;color:var(--mt2);font-size:.6rem">${expanded?'▴':'▾'}</span>`;
  if(preferDK){
    const dk=historicalDKBetStats(prop);
    if(dk&&dk.totalBets>0){
      const c=dk.totalRate>=55?'var(--gn)':dk.totalRate>=45?'var(--gd)':'var(--rd)';
      return `<button class="locks-rate-btn" onclick="UI.locksRateExpanded['${key}']=!UI.locksRateExpanded['${key}'];renderTab()">📊 <b style="color:${c}">${dk.totalRate}%</b> <span style="color:var(--mt2)">(${dk.totalWon}/${dk.totalBets})</span>${arrow}</button>`;
    }
    return '<span style="color:var(--mt);font-size:.55rem">📊 no 14D DK history</span>';
  }
  const lock=historicalLockStats(prop);
  if(lock.totalN>0){
    const c=lock.totalRate>=70?'var(--gn)':lock.totalRate>=50?'var(--gd)':'var(--rd)';
    return `<button class="locks-rate-btn" onclick="UI.locksRateExpanded['${key}']=!UI.locksRateExpanded['${key}'];renderTab()">🔒 <b style="color:${c}">${lock.totalRate}%</b> <span style="color:var(--mt2)">(${lock.totalHits}/${lock.totalN})</span>${arrow}</button>`;
  }
  return '<span style="color:var(--mt);font-size:.55rem">🔒 no 14D history</span>';
}

// Per-day breakdown table for the rate badge dropdown.
// preferDK chooses which stats source to use.
function locksRateBreakdown(prop,preferDK){
  const key=`${prop}_${preferDK?'dk':'score'}`;
  if(!UI.locksRateExpanded[key])return '';
  
  const stats=preferDK?historicalDKBetStats(prop):historicalLockStats(prop);
  const days=stats.days||[];
  if(!days.length){
    return `<div style="padding:6px 8px;font-size:.55rem;color:var(--mt);text-align:center;background:rgba(0,0,0,.15);border-radius:4px;margin-top:4px">No past day data yet</div>`;
  }
  
  const totalRate=preferDK?stats.totalRate:stats.totalRate;
  const totalNum=preferDK?stats.totalWon:stats.totalHits;
  const totalDen=preferDK?stats.totalBets:stats.totalN;
  const icon=preferDK?'📊':'🔒';
  
  let rows='';
  days.forEach(d=>{
    const dateLabel=d.date.slice(5).replace('-','/'); // MM/DD
    if(d.pending){
      rows+=`<tr><td style="color:var(--mt2);padding:3px 6px">${dateLabel}</td><td colspan="2" style="color:var(--mt);padding:3px 6px;font-size:.55rem">no results yet</td></tr>`;
    }else if(d.noOdds){
      rows+=`<tr><td style="color:var(--mt2);padding:3px 6px">${dateLabel}</td><td colspan="2" style="color:var(--mt);padding:3px 6px;font-size:.55rem">no DK lines saved</td></tr>`;
    }else if((d.bets??d.n)===0){
      rows+=`<tr><td style="color:var(--mt2);padding:3px 6px">${dateLabel}</td><td colspan="2" style="color:var(--mt);padding:3px 6px;font-size:.55rem">no qualifying ${preferDK?'bets':'locks'}</td></tr>`;
    }else{
      const num=preferDK?d.won:d.hits;
      const den=preferDK?d.bets:d.n;
      const rate=d.rate;
      const c=preferDK?(rate>=55?'var(--gn)':rate>=45?'var(--gd)':'var(--rd)'):(rate>=70?'var(--gn)':rate>=50?'var(--gd)':'var(--rd)');
      rows+=`<tr onclick="event.stopPropagation();drillIntoDay('${prop}','${d.date}')" style="cursor:pointer">
        <td style="color:var(--ac);padding:3px 6px;text-decoration:underline;text-decoration-style:dotted">${dateLabel}</td>
        <td style="color:${c};font-weight:700;padding:3px 6px;text-align:right">${rate}%</td>
        <td style="color:var(--mt2);padding:3px 6px;text-align:right">${num}/${den} →</td>
      </tr>`;
    }
  });
  
  const totalC=preferDK?(totalRate>=55?'var(--gn)':totalRate>=45?'var(--gd)':'var(--rd)'):(totalRate>=70?'var(--gn)':totalRate>=50?'var(--gd)':'var(--rd)');
  const totalRow=totalDen>0?`<tr style="border-top:1px solid var(--bd);font-weight:700">
    <td style="padding:4px 6px;color:var(--ac)">${icon} 14D</td>
    <td style="padding:4px 6px;text-align:right;color:${totalC}">${totalRate}%</td>
    <td style="padding:4px 6px;text-align:right;color:var(--mt2)">${totalNum}/${totalDen}</td>
  </tr>`:'';
  
  return `<div style="margin-top:6px;padding:6px 8px;background:rgba(0,0,0,.15);border-radius:4px;border-left:2px solid ${preferDK?'var(--ac)':'var(--rd)'}">
    <table style="width:100%;font-size:.6rem;border-collapse:collapse">
      <tbody>${rows}${totalRow}</tbody>
    </table>
  </div>`;
}

// One collapsible category
function renderLocksCategory(catKey,catLabel,subsections){
  const populated=subsections.filter(s=>s.rows&&s.rows.length>0);
  const totalPicks=populated.reduce((a,s)=>a+s.rows.length,0);
  const expanded=UI.locksExpanded[catKey];
  const header=`<button class="locks-cat-header" onclick="UI.locksExpanded.${catKey}=!UI.locksExpanded.${catKey};renderTab()">
    <span style="font-size:.72rem;font-weight:700;letter-spacing:.04em">${catLabel}</span>
    <span style="font-size:.6rem;color:var(--mt2);margin-left:8px">${totalPicks} lock${totalPicks===1?'':'s'}</span>
    <span style="margin-left:auto;color:var(--mt);font-size:.7rem">${expanded?'▴':'▾'}</span>
  </button>`;
  if(!expanded){
    return `<div class="locks-cat">${header}</div>`;
  }
  if(!populated.length){
    return `<div class="locks-cat">${header}<div style="padding:10px;font-size:.6rem;color:var(--mt);text-align:center">No locks in this category today</div></div>`;
  }
  const body=populated.map(s=>locksSubsection(s.label,s.rateProp,s.preferDK,
    `<table style="width:100%;font-size:.6rem;border-collapse:collapse">${s.rows.join('')}</table>`
  )).join('');
  return `<div class="locks-cat">${header}<div class="locks-cat-body">${body}</div></div>`;
}

// Builds the locks section HTML for embedding into renderDashboard.
// Returns '' when no slate is loaded.
function buildLocksSection(){
  if(!STATE.ready||!STATE.matchups.length)return '';
  // Background pull of past-date DK data so success rates can populate
  setTimeout(()=>pullDKHistoryWindow(),50);
  
  const batterMatchups=STATE.matchups.filter(m=>m.kind==='batter');
  const pitcherMatchups=STATE.matchups.filter(m=>m.kind==='pitcher');
  const totals=STATE.totals||[];
  const dkPropsLoaded=Object.keys(ODDS.props[STATE.date]?.events||{}).length>0;
  const dkOddsLoaded=Object.keys(ODDS.data[STATE.date]?.games||[]).length>0;
  
  // ── BATTER ──
  const batterSubsections=[];
  // Hits — score only (no DK market)
  const hitsScore=batterMatchups.filter(m=>m.hitScore>=LOCKS.hits).sort((a,b)=>b.hitScore-a.hitScore);
  batterSubsections.push({label:'🎯 Hits',rateProp:'hits',preferDK:false,
    rows:hitsScore.map(m=>batterScoreLockRow(m,m.hitScore,'hit'))});
  // HR (1+) — score only (no DK 1+HR market)
  const hrScore=batterMatchups.filter(m=>m.hrScore>=LOCKS.hr).sort((a,b)=>b.hrScore-a.hrScore);
  batterSubsections.push({label:'💥 Home Runs',rateProp:'hr',preferDK:false,
    rows:hrScore.map(m=>batterScoreLockRow(m,m.hrScore,'hr'))});
  // TB — DK ONLY. If DK props not loaded, skip entirely (per user spec).
  if(dkPropsLoaded){
    const tbDK=collectDKLocks(batterMatchups,'batter_total_bases','expectedTB',DK_LOCKS.tb,'batterName');
    batterSubsections.push({label:'🏟️ Total Bases · DK',rateProp:'tb',preferDK:true,rows:tbDK.map(dkPickRow)});
  }
  // Walks — DK ONLY
  if(dkPropsLoaded){
    const bbDK=collectDKLocks(batterMatchups,'batter_walks','expectedBB',DK_LOCKS.bb,'batterName');
    batterSubsections.push({label:'🚶 Walks · DK',rateProp:'bb',preferDK:true,rows:bbDK.map(dkPickRow)});
  }
  // Batter Ks — DK ONLY
  if(dkPropsLoaded){
    const bbatDK=collectDKLocks(batterMatchups,'batter_strikeouts','batterExpectedK',DK_LOCKS.bbat,'batterName');
    batterSubsections.push({label:'⚡ Strikeouts · DK',rateProp:'bbat',preferDK:true,rows:bbatDK.map(dkPickRow)});
  }
  
  // ── PITCHER — DK ONLY ──
  const pitcherSubsections=[];
  if(dkPropsLoaded){
    const pKDK=collectDKLocks(pitcherMatchups,'pitcher_strikeouts','expectedK',DK_LOCKS.k,'pitcherName');
    pitcherSubsections.push({label:'⚡ Strikeouts · DK',rateProp:'k',preferDK:true,rows:pKDK.map(dkPickRow)});
    const pBBDK=collectDKLocks(pitcherMatchups,'pitcher_walks','expectedBB',DK_LOCKS.pbb,'pitcherName');
    pitcherSubsections.push({label:'🚶 Walks Allowed · DK',rateProp:'pbb',preferDK:true,rows:pBBDK.map(dkPickRow)});
  }
  
  // ── GAME ──
  const gameSubsections=[];
  // Run Totals — DK only
  if(dkOddsLoaded){
    const runTotalDKLocks=[];
    totals.forEach(t=>{
      if(t.total==null||!isFinite(t.total))return; // skip games missing a projection
      const odds=getOddsForGame(STATE.date,t.game.home.name,t.game.away.name);
      if(!odds?.total?.point)return;
      const edge=t.total-odds.total.point;
      if(Math.abs(edge)<DK_LOCKS.tot)return;
      runTotalDKLocks.push({t,dkLine:odds.total.point,edge,pick:edge>0?'OVER':'UNDER'});
    });
    runTotalDKLocks.sort((a,b)=>Math.abs(b.edge)-Math.abs(a.edge));
    gameSubsections.push({label:'🎯 Run Totals · DK',rateProp:'tot',preferDK:true,rows:runTotalDKLocks.map(gameTotalRow)});
  }
  // HR O/U 1.5 — SCORE lock split into two separate bets so success rates track independently
  const hrLineLocks=totals.filter(t=>t.hrLineScore!=null&&t.hrLineScore>=LOCKS.hrLine);
  const hrOverLocks=hrLineLocks.filter(t=>t.hrLinePick==='Over').sort((a,b)=>b.hrLineScore-a.hrLineScore);
  const hrUnderLocks=hrLineLocks.filter(t=>t.hrLinePick==='Under').sort((a,b)=>b.hrLineScore-a.hrLineScore);
  gameSubsections.push({label:'💥 HR Over 1.5',rateProp:'hrOver',preferDK:false,
    rows:hrOverLocks.map(hrScoreLockRow)});
  gameSubsections.push({label:'💥 HR Under 1.5',rateProp:'hrUnder',preferDK:false,
    rows:hrUnderLocks.map(hrScoreLockRow)});
  
  // Banner when DK not loaded explaining why most categories are sparse
  const dkBanner=(!dkPropsLoaded||!dkOddsLoaded)?
    `<div style="padding:8px 12px;background:rgba(255,184,0,.08);border-bottom:1px solid var(--bdr2);font-size:.55rem;color:var(--gd);line-height:1.4">
      ⚠ DK ${!dkPropsLoaded&&!dkOddsLoaded?'odds and props':!dkPropsLoaded?'player props':'game odds'} not loaded
    </div>`:'';
  
  return `
    <div class="locks-section">
      <div class="locks-header">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:1.5px">🔒 TODAY'S LOCKS</span>
      </div>
      ${dkBanner}
      ${renderLocksCategory('batter','⚾ Batter',batterSubsections)}
      ${renderLocksCategory('pitcher','🎯 Pitcher',pitcherSubsections)}
      ${renderLocksCategory('game','🎲 Game',gameSubsections)}
    </div>
  `;
}

function renderResults(){
  const candidateDate=RESULTS.date||defaultResultsDate();
  const savedDates=Object.keys(PRED.byDate).sort().reverse();
  const minD=savedDates.length?savedDates[savedDates.length-1]:'';
  const maxD=savedDates.length?savedDates[0]:'';
  
  // Build a date input that only accepts saved dates. Validates on change.
  function dateInput(currentVal,onChangeJS){
    return `<input type="date" value="${currentVal}" min="${minD}" max="${maxD}" onchange="
      var saved=Object.keys(PRED.byDate);
      if(!saved.includes(this.value)){
        alert('No saved predictions for '+this.value+'. Pick a date you previously loaded on Home.');
        this.value='${currentVal}';
        return;
      }
      ${onChangeJS}
    ">`;
  }
  
  // Common banner builder
  function banner(){
    const d=RESULTS.date||candidateDate;
    const dateObj=new Date(d+'T12:00:00');
    const dateStr=dateObj.toLocaleDateString([],{month:'short',day:'numeric'}).toUpperCase();
    const finalStr=RESULTS.loaded?`${RESULTS.gameStatus?.final||0}/${RESULTS.gameStatus?.total||0} games final`:'Pick a date to load';
    return `<div class="fc-banner">
      <div class="fc-banner-l">
        <span class="fc-banner-icon">📊</span>
        <div>
          <div class="fc-banner-t">FACT CHECK · PAST RESULTS</div>
          <div class="fc-banner-d">${dateStr} · ${finalStr}</div>
        </div>
      </div>
      <div class="fc-banner-r">Not<br>Live</div>
    </div>`;
  }
  
  // ── LOADING STATE ──
  if(RESULTS.loading){
    setMain(`
      ${banner()}
      <div class="cb">
        ${dateInput(candidateDate,'loadResults(this.value)')}
        <span style="font-size:.62rem;color:var(--mt2)">${savedDates.length} day(s) saved</span>
      </div>
      <div class="empty"><b>Loading…</b><div class="spin"></div> Fetching final box scores from MLB API</div>
    `);
    return;
  }
  
  // ── ERROR STATE ──
  if(RESULTS.error){
    setMain(`
      ${banner()}
      <div class="cb">
        ${dateInput(RESULTS.date,'loadResults(this.value)')}
        <button class="btn bg" onclick="RESULTS.loaded=false;RESULTS.prop=null;renderResults()">↺ Reset</button>
      </div>
      <div class="empty"><b>Error</b>${RESULTS.error}</div>
    `);
    return;
  }
  
  // ── NOT YET LOADED — show date picker + load button ──
  if(!RESULTS.loaded){
    if(!savedDates.length){
      setMain(`
        ${banner()}
        <div class="empty">
          <b>No saved predictions yet</b>
          Predictions are saved each time you tap ▶ Reload on Home.<br>
          Once you've loaded at least one slate, come back here the next day to see if it was right.
        </div>
      `);
      return;
    }
    setMain(`
      ${banner()}
      <div class="cb">
        ${dateInput(candidateDate,'RESULTS.date=this.value;renderResults()')}
        <button class="btn bp" onclick="loadResults(RESULTS.date||'${candidateDate}')">▶ Load Results</button>
      </div>
      <div class="info" style="font-size:.6rem;margin-bottom:10px">Pick a date you previously ran predictions for, then tap Load. Only games that have ended (Final) get checked.</div>
      <div class="empty">
        <b>Tap Load Results</b>
        Compare predictions against actual outcomes for any saved date.
      </div>
    `);
    return;
  }
  
  // ── LOADED + NO PROP SELECTED — show chooser screen ──
  if(RESULTS.prop==null){
    // Build per-prop stat strings for the chooser cards
    const stats={
      hits:fcLockStats('hits'),
      tb:fcLockStats('tb'),
      hr:fcLockStats('hr'),
      bb:fcLockStats('bb'),
      bbat:fcLockStats('bbat'),
      k:fcLockStats('k'),
      pbb:fcLockStats('pbb'),
      gnoHR:fcLockStats('gnoHR'),
      gmultiHR:fcLockStats('gmultiHR'),
      hrLine:fcLockStats('hrLine'),
      tot:fcLockStats('tot')
    };
    // Compute 14-day historical stats too. Triggers background fetch if not cached.
    setTimeout(()=>loadHistoryInBackground('res'),50);
    const hist={
      hits:historicalLockStats('hits'),
      tb:historicalLockStats('tb'),
      hr:historicalLockStats('hr'),
      bb:historicalLockStats('bb'),
      bbat:historicalLockStats('bbat'),
      k:historicalLockStats('k'),
      pbb:historicalLockStats('pbb'),
      gnoHR:historicalLockStats('gnoHR'),
      gmultiHR:historicalLockStats('gmultiHR'),
      hrLine:historicalLockStats('hrLine'),
      tot:historicalLockStats('tot')
    };
    function statRow(todayStat,histStat,prop){
      // 14D row
      let histHTML;
      const isLoading=HISTORY.loading&&histStat.days.some(d=>d.pending);
      if(histStat.totalN===0){
        histHTML=`<div class="fcc-stat-row"><span class="fcc-stat-lbl">14D</span> <span class="fcc-stat-none">${isLoading?'…':'no history'}</span></div>`;
      }else{
        const c=histStat.totalRate>=70?'fcc-stat-g':histStat.totalRate>=50?'fcc-stat-y':'fcc-stat-r';
        histHTML=`<div class="fcc-stat-row"><span class="fcc-stat-lbl">14D</span> <span class="fcc-stat ${c}">${histStat.totalRate}%</span> <span class="fcc-stat-n">(${histStat.totalHits}/${histStat.totalN})</span></div>`;
      }
      // Top-N row (HR uses top-1 lock; others top-2 locks). Lock-filtered: never inflates by including non-locks.
      let topHTML='';
      if(prop&&prop!=='tot'){
        const n=prop==='hr'?1:2;
        const t=historicalTopNStats(prop,n);
        const lbl=`Top${n}🔒`;
        if(t.totalN===0){
          topHTML=`<div class="fcc-stat-row"><span class="fcc-stat-lbl">${lbl}</span> <span class="fcc-stat-none">${HISTORY.loading?'…':'—'}</span></div>`;
        }else{
          const c=t.totalRate>=70?'fcc-stat-g':t.totalRate>=50?'fcc-stat-y':'fcc-stat-r';
          topHTML=`<div class="fcc-stat-row"><span class="fcc-stat-lbl">${lbl}</span> <span class="fcc-stat ${c}">${t.totalRate}%</span> <span class="fcc-stat-n">(${t.totalHits}/${t.totalN})</span></div>`;
        }
      }
      return histHTML+topHTML;
    }
    
    setMain(`
      ${banner()}
      <div class="cb">
        ${dateInput(RESULTS.date,'RESULTS.loaded=false;RESULTS.prop=null;loadResults(this.value)')}
        <button class="btn bg" onclick="RESULTS.loaded=false;loadResults(RESULTS.date)">↻ Reload</button>
      </div>
      
      <div class="fcc-overview" onclick="RESULTS.prop='overview';renderResults()">
        <div class="fcc-ov-l">
          <div class="fcc-ov-icon">📊</div>
          <div>
            <div class="fcc-ov-t">OVERVIEW</div>
            <div class="fcc-ov-d">All categories at a glance</div>
          </div>
        </div>
        <div class="fcc-ov-arr">→</div>
      </div>
      
      <div class="fcc-section-h">Pick a category to fact-check</div>
      <div class="fcc-grid">
        <button class="fcc-card" onclick="RESULTS.prop='hits';renderResults()">
          <div class="fcc-icon">🎯</div>
          <div class="fcc-label">Hits</div>
          ${statRow(stats.hits,hist.hits,"hits")}
        </button>
        <button class="fcc-card" onclick="RESULTS.prop='tb';renderResults()">
          <div class="fcc-icon">🏟️</div>
          <div class="fcc-label">Total Bases</div>
          ${statRow(stats.tb,hist.tb,"tb")}
        </button>
        <button class="fcc-card" onclick="RESULTS.prop='hr';renderResults()">
          <div class="fcc-icon">💥</div>
          <div class="fcc-label">Home Runs</div>
          ${statRow(stats.hr,hist.hr,"hr")}
        </button>
        <button class="fcc-card" onclick="RESULTS.prop='bb';renderResults()">
          <div class="fcc-icon">🚶</div>
          <div class="fcc-label">Walks (BB)</div>
          ${statRow(stats.bb,hist.bb,"bb")}
        </button>
        <button class="fcc-card" onclick="RESULTS.prop='k';renderResults()">
          <div class="fcc-icon">⚡</div>
          <div class="fcc-label">Strikeouts</div>
          ${statRow(stats.k,hist.k,"k")}
        </button>
        <button class="fcc-card" onclick="RESULTS.prop='pbb';renderResults()">
          <div class="fcc-icon">🚶</div>
          <div class="fcc-label">Walks Allowed</div>
          ${statRow(stats.pbb,hist.pbb,"pbb")}
        </button>
        <button class="fcc-card" onclick="RESULTS.prop='bbat';renderResults()">
          <div class="fcc-icon">⚡</div>
          <div class="fcc-label">Batter Ks</div>
          ${statRow(stats.bbat,hist.bbat,"bbat")}
        </button>
        <button class="fcc-card" onclick="RESULTS.prop='hrLine';renderResults()">
          <div class="fcc-icon">💥</div>
          <div class="fcc-label">HR O/U 1.5</div>
          ${statRow(stats.hrLine,hist.hrLine,"hrLine")}
        </button>
        <button class="fcc-card" onclick="RESULTS.prop='tot';renderResults()">
          <div class="fcc-icon">🎲</div>
          <div class="fcc-label">Run Totals</div>
          ${statRow(stats.tot,hist.tot,"tot")}
        </button>
      </div>
      
      <div class="disc">Today = lock-grade hit rate for ${RESULTS.date||candidateDate} only. 14D = same metric across last 14 saved days.</div>
    `);
    return;
  }
  
  // ── OVERVIEW SCREEN — all categories side by side ──
  if(RESULTS.prop==='overview'){
    const cats=[
      {prop:'hits',icon:'🎯',name:'Hits',lockTxt:'Hit Score ≥ 79.5',metric:'Lock hit rate'},
      {prop:'tb',icon:'🏟️',name:'Total Bases',lockTxt:'TB Score ≥ 72',metric:'Lock hit rate'},
      {prop:'hr',icon:'💥',name:'Home Runs',lockTxt:'HR Score ≥ 72',metric:'Lock hit rate'},
      {prop:'bb',icon:'🚶',name:'Walks (BB)',lockTxt:'BB Score ≥ 72',metric:'Lock hit rate'},
      {prop:'k',icon:'⚡',name:'Strikeouts',lockTxt:'K Grade ≥ 72',metric:'Lock hit rate'},
      {prop:'pbb',icon:'🚶',name:'Walks Allowed',lockTxt:'BB Grade ≥ 72',metric:'Lock hit rate'},
      {prop:'bbat',icon:'⚡',name:'Batter Strikeouts',lockTxt:'K Score ≥ 72',metric:'Lock hit rate'},
      {prop:'hrLine',icon:'💥',name:'HR O/U 1.5 (Game)',lockTxt:`Score ≥ ${LOCKS.hrLine}`,metric:'Lock pick rate'},
      {prop:'tot',icon:'🎲',name:'Run Totals',lockTxt:'No grade — all games',metric:'Match rate (±0.4)'}
    ];
    
    const rows=cats.map(c=>{
      const s=fcLockStats(c.prop);
      const rateStr=s.rate==null?'<span style="color:var(--mt)">no data</span>':`<b style="color:${s.rate>=70?'var(--gn)':s.rate>=50?'var(--gd)':'var(--rd)'};font-size:1.4rem">${s.rate}%</b>`;
      return `<div class="fc-ov-row" onclick="RESULTS.prop='${c.prop}';renderResults()">
        <div class="fc-ov-row-l">
          <span class="fc-ov-row-icon">${c.icon}</span>
          <div>
            <div class="fc-ov-row-name">${c.name}</div>
            <div class="fc-ov-row-sub">${c.metric} · ${c.lockTxt}</div>
          </div>
        </div>
        <div class="fc-ov-row-r">
          ${rateStr}
          <div class="fc-ov-row-n">${s.rate==null?'—':s.hits+' of '+s.n}</div>
        </div>
      </div>`;
    }).join('');
    
    setMain(`
      ${banner()}
      <div class="cb">
        <button class="btn bg" onclick="RESULTS.prop=null;renderResults()">← Back to chooser</button>
      </div>
      <div class="fc-container">
        <div class="fc-ov-h">📊 ALL CATEGORIES</div>
        <div class="fc-ov-list">${rows}</div>
        <div class="info" style="font-size:.56rem;margin-top:10px">Tap any row to drill into that category's full per-bet breakdown. Percentages reflect only Lock-grade plays for batter/pitcher props (the highest-confidence tier). Run Totals don't use a grading system, so it shows match rate across all games.</div>
      </div>
      <div class="disc">📜 Predictions auto-saved on each load · 14 days kept on this device</div>
    `);
    return;
  }
  
  // ── INDIVIDUAL PROP SCREEN ──
  // Header strip with back button + reload
  const headerHTML=`
    <div class="cb">
      <button class="btn bg" onclick="RESULTS.prop=null;renderResults()">← Categories</button>
      ${dateInput(RESULTS.date,'RESULTS.loaded=false;RESULTS.prop=null;loadResults(this.value)')}
      <button class="btn bg" onclick="RESULTS.loaded=false;loadResults(RESULTS.date)">↻</button>
    </div>
  `;
  
  // Body changes per prop
  const body=renderFactCheckBody(RESULTS.prop);
  
  setMain(banner()+headerHTML+`<div class="fc-container">${body}</div>`+`<div class="disc">📜 Predictions auto-saved on each load · 14 days kept on this device</div>`);
}

function renderFactCheckBody(prop){
  if(prop==='hits')return renderFCBatters('hit');
  if(prop==='tb')return renderFCBatters('tb');
  if(prop==='hr')return renderFCBatters('hr');
  if(prop==='bb')return renderFCBatters('bb');
  if(prop==='bbat')return renderFCBatters('bbat');
  if(prop==='k')return renderFCPitchers();
  if(prop==='pbb')return renderFCPitcherBB();
  if(prop==='gnoHR'||prop==='gmultiHR'||prop==='hrLine')return renderFCHRLine();
  if(prop==='tot')return renderFCTotals();
  return '';
}

function renderFCBatters(type){
  const scoreKey=type==='hit'?'score':type==='tb'?'tbScore':type==='hr'?'hrScore':type==='bb'?'bbScore':'batterKScore';
  const lockAt=type==='hit'?LOCKS.hits:type==='tb'?LOCKS.tb:type==='hr'?LOCKS.hr:type==='bb'?LOCKS.bb:LOCKS.bbat;
  const propLabel=type==='hit'?'🎯 Hit Score':type==='tb'?'🏟️ TB Score':type==='hr'?'💥 HR Score':type==='bb'?'🚶 BB Score':'⚡ K Score';
  
  // DK-driven view applies to tb/bb/bbat when DK data was loaded for this date
  const dkMarketKey=type==='tb'?'batter_total_bases':type==='bb'?'batter_walks':type==='bbat'?'batter_strikeouts':null;
  const dkLockMargin=type==='tb'?DK_LOCKS.tb:type==='bb'?DK_LOCKS.bb:type==='bbat'?DK_LOCKS.bbat:null;
  const dkAvailable=dkMarketKey&&ODDS.props[RESULTS.date]?.events&&Object.keys(ODDS.props[RESULTS.date].events).length>0;
  
  const allSorted=[...RESULTS.batters]
    .filter(b=>b[scoreKey]!=null)
    .sort((a,b)=>b[scoreKey]-a[scoreKey]);
  
  // Never filter — show every prediction. Classify rows as lock/lean/pass/none when DK loaded.
  let sorted=allSorted;
  let isDKView=false;
  if(dkAvailable){
    isDKView=true;
    const modelField=type==='tb'?'expectedTB':type==='bb'?'expectedBB':'batterExpectedK';
    // Sort by DK edge magnitude (rows with no DK line fall to the bottom)
    sorted=[...allSorted].sort((a,b)=>{
      const ma=getPlayerProps(RESULTS.date,a.name)?.markets?.[dkMarketKey]?.line;
      const mb=getPlayerProps(RESULTS.date,b.name)?.markets?.[dkMarketKey]?.line;
      const ea=(ma!=null&&a[modelField]!=null)?Math.abs(a[modelField]-ma):-1;
      const eb=(mb!=null&&b[modelField]!=null)?Math.abs(b[modelField]-mb):-1;
      return eb-ea;
    });
  }
  
  const played=sorted.filter(b=>b.played);
  // Outcome logic per prop type
  function outcome(b){
    if(!b.played)return {icon:'—',col:'var(--mt)',txt:'Did not play',hit:null};
    // DK view: outcome is "did our bet recommendation win?" (only for lock/lean picks)
    if(isDKView){
      const modelField=type==='tb'?'expectedTB':type==='bb'?'expectedBB':'batterExpectedK';
      const actualField=type==='tb'?'actualTB':type==='bb'?'actualBB':'actualK';
      const actual=b[actualField]||0;
      const labelStat=type==='tb'?'TB':type==='bb'?'BB':'K';
      const props=getPlayerProps(RESULTS.date,b.name);
      const market=props?.markets?.[dkMarketKey];
      // No DK line: show actual stat but don't grade
      if(market?.line==null||b[modelField]==null){
        return {icon:'—',col:'var(--mt2)',txt:`${actual} ${labelStat} (no DK)`,hit:null};
      }
      const edge=b[modelField]-market.line;
      const absEdge=Math.abs(edge);
      if(absEdge<dkLockMargin/2){
        // Pass: untracked
        return {icon:'—',col:'var(--mt)',txt:`${actual} ${labelStat} (pass)`,hit:null};
      }
      const recOver=edge>0;
      const win=recOver?(actual>market.line):(actual<market.line);
      return {icon:win?'✓':'✗',col:win?'var(--gn)':'var(--rd)',txt:`${actual} ${labelStat} (${recOver?'O':'U'} ${market.line})`,hit:win};
    }
    if(type==='hit'){
      const hit=b.actualHits>0;
      return {icon:hit?'✓':'✗',col:hit?'var(--gn)':'var(--rd)',txt:`${b.actualHits}-for-${b.actualAB}`,hit};
    }
    if(type==='tb'){
      // Conservative round prediction (only rounds up at .7+), ✓ if actual ≥ predicted
      if(b.expectedTB==null)return {icon:'?',col:'var(--mt)',txt:`${b.actualTB||0} TB · no pred`,hit:null};
      const predWhole=roundConservative(b.expectedTB);
      const actual=b.actualTB||0;
      const hit=actual>=predWhole;
      return {icon:hit?'✓':'✗',col:hit?'var(--gn)':'var(--rd)',txt:`${actual} TB (pred ${predWhole})`,hit};
    }
    if(type==='hr'){
      const hit=b.actualHR>0;
      return {icon:hit?'✓':'✗',col:hit?'var(--gn)':'var(--rd)',txt:`${b.actualHR||0} HR`,hit};
    }
    if(type==='bb'){
      // Walks: round prediction conservatively, ✓ if actual ≥ predicted
      if(b.expectedBB==null)return {icon:'?',col:'var(--mt)',txt:`${b.actualBB||0} BB · no pred`,hit:null};
      const predWhole=roundConservative(b.expectedBB);
      const actual=b.actualBB||0;
      const hit=actual>=predWhole;
      return {icon:hit?'✓':'✗',col:hit?'var(--gn)':'var(--rd)',txt:`${actual} BB (pred ${predWhole})`,hit};
    }
    if(type==='bbat'){
      // Batter strikeouts: ✓ if actual K ≥ rounded predicted
      if(b.batterExpectedK==null)return {icon:'?',col:'var(--mt)',txt:`${b.actualK||0} K · no pred`,hit:null};
      const predWhole=roundConservative(b.batterExpectedK);
      const actual=b.actualK||0;
      const hit=actual>=predWhole;
      return {icon:hit?'✓':'✗',col:hit?'var(--gn)':'var(--rd)',txt:`${actual} K (pred ${predWhole})`,hit};
    }
  }
  
  // Compute top rate based on view
  let topRateLabel,topRateSubLabel,topRateVal,topRateDen;
  if(isDKView){
    const outcomes=played.map(outcome).filter(o=>o.hit!==null);
    const won=outcomes.filter(o=>o.hit).length;
    topRateLabel='📊 DK Bet Win Rate';
    topRateSubLabel=`lock+lean bets · n=${outcomes.length}`;
    topRateVal=outcomes.length?(won/outcomes.length*100).toFixed(0)+'%':'—';
    topRateDen=outcomes.length;
  }else{
    const lockSet=played.filter(b=>b[scoreKey]>=lockAt);
    const lockOutcomes=lockSet.map(outcome).filter(o=>o.hit!==null);
    const won=lockOutcomes.filter(o=>o.hit).length;
    topRateLabel='🔒 Lock hit rate';
    topRateSubLabel=`${propLabel.replace(/[^A-Za-z ]/g,'').trim()} ≥ ${lockAt} · n=${lockSet.length}`;
    topRateVal=lockOutcomes.length?(won/lockOutcomes.length*100).toFixed(0)+'%':'—';
    topRateDen=lockOutcomes.length;
  }
  
  // Lock/lean/pass count for DK view
  let lockCount=0,leanCount=0,passCount=0,noLineCount=0;
  if(isDKView){
    const modelField=type==='tb'?'expectedTB':type==='bb'?'expectedBB':'batterExpectedK';
    sorted.forEach(b=>{
      const market=getPlayerProps(RESULTS.date,b.name)?.markets?.[dkMarketKey];
      if(market?.line==null||b[modelField]==null){noLineCount++;return;}
      const absEdge=Math.abs(b[modelField]-market.line);
      if(absEdge>=dkLockMargin)lockCount++;
      else if(absEdge>=dkLockMargin/2)leanCount++;
      else passCount++;
    });
  }
  
  const rows=sorted.map(b=>{
    const r=getRat(b[scoreKey],lockAt);
    const rc=r.c==='lock'?'lr':r.c==='hot'?'hr2':r.c==='lean'?'lnr':'';
    const o=outcome(b);
    // DK line for the prop type (only for markets DK offers as props)
    let dkCell='';
    if(type==='tb'){
      dkCell=`<td style="font-size:.6rem">${dkCellFor(b.name,'batter_total_bases',b.expectedTB,DK_LOCKS.tb,DK_LOCKS.tb/2,RESULTS.date)}</td>`;
    }else if(type==='bb'){
      dkCell=`<td style="font-size:.6rem">${dkCellFor(b.name,'batter_walks',b.expectedBB,DK_LOCKS.bb,DK_LOCKS.bb/2,RESULTS.date)}</td>`;
    }else if(type==='bbat'){
      dkCell=`<td style="font-size:.6rem">${dkCellFor(b.name,'batter_strikeouts',b.batterExpectedK,DK_LOCKS.bbat,DK_LOCKS.bbat/2,RESULTS.date)}</td>`;
    }
    return `<tr class="${rc}" onclick="openHistoryRowMo('batter',RESULTS.date,'${b.id}','${type}')" style="cursor:pointer">
      <td>${sbar(b[scoreKey],lockAt)}</td>
      <td style="color:${o.col};font-weight:700;font-size:1rem">${o.icon}</td>
      <td style="color:${o.col};font-size:.62rem">${o.txt}</td>
      ${dkCell}
      <td class="l"><strong>${b.name}</strong></td>
      <td style="color:var(--mt2)">${b.team}</td>
      <td style="color:var(--mt2)">${b.order||''}</td>
      <td class="l" style="max-width:90px;overflow:hidden;text-overflow:ellipsis;color:var(--mt2)">${b.pitcherName||''}</td>
      <td>${bdg(r)}</td>
    </tr>`;
  }).join('');
  
  // Top-2 pill (Hits only): how many of the day's 2 highest-scored Hit picks got a hit
  let top2Pill='';
  if(type==='hit'){
    const top2=[...sorted].slice(0,2);
    const t2Played=top2.filter(b=>b.played);
    if(t2Played.length>0){
      const t2Hits=t2Played.filter(b=>b.actualHits>0).length;
      const t2Rate=Math.round(t2Hits/t2Played.length*100);
      top2Pill=`<div class="pill" style="border-color:var(--ac)"><span class="pn" style="color:var(--ac)">${t2Rate}%</span>🎯 Top-2 hit rate<br><span style="font-size:.5rem;color:var(--mt);font-weight:400">${t2Hits}/${t2Played.length} · highest 2 Hit Scores</span></div>`;
    }
  }
  
  const countPill=isDKView
    ?`<div class="pill"><span class="pn" style="font-size:.85rem">${lockCount}/${leanCount}/${passCount}${noLineCount?'/'+noLineCount:''}</span>🔒/lean/pass${noLineCount?'/none':''}</div>`
    :`<div class="pill"><span class="pn">${sorted.length}</span>Predicted</div>`;
  
  return `
    <div class="sum">
      <div class="pill lk"><span class="pn">${topRateVal}</span>${topRateLabel}<br><span style="font-size:.5rem;color:var(--mt);font-weight:400">${topRateSubLabel}</span></div>
      ${top2Pill}
      ${countPill}
    </div>

function renderFCPitchers(){
  const allSorted=[...RESULTS.pitchers].sort((a,b)=>b.xK-a.xK);
  const dkAvailable=ODDS.props[RESULTS.date]?.events&&Object.keys(ODDS.props[RESULTS.date].events).length>0;
  
  // Never filter out pitchers — show every prediction. When DK is loaded, classify each
  // pitcher as lock / lean / pass / none-of-the-above and sort with locks/leans first.
  let displayList=allSorted;
  let isDKView=false;
  if(dkAvailable){
    isDKView=true;
    // Sort: rows with DK lines first (locks → leans → pass), then rows without DK lines, then by score
    displayList=[...allSorted].sort((a,b)=>{
      const ma=getPlayerProps(RESULTS.date,a.name)?.markets?.pitcher_strikeouts?.line;
      const mb=getPlayerProps(RESULTS.date,b.name)?.markets?.pitcher_strikeouts?.line;
      const ea=ma!=null?Math.abs(a.xK-ma):-1;
      const eb=mb!=null?Math.abs(b.xK-mb):-1;
      return eb-ea;
    });
  }
  
  const played=displayList.filter(p=>p.played);
  const meanError=played.length?(played.reduce((s,p)=>s+Math.abs(p.actualKs-p.xK),0)/played.length).toFixed(2):'—';
  
  let topRateNum,topRateDen,topRateLabel,topRateSubLabel;
  if(isDKView){
    let won=0,bets=0;
    played.forEach(p=>{
      const market=getPlayerProps(RESULTS.date,p.name)?.markets?.pitcher_strikeouts;
      if(market?.line==null)return;
      const edge=p.xK-market.line;
      if(Math.abs(edge)<DK_LOCKS.k/2)return; // pass: doesn't count
      const recOver=edge>0;
      const win=recOver?(p.actualKs>market.line):(p.actualKs<market.line);
      bets++;if(win)won++;
    });
    topRateNum=won;topRateDen=bets;
    topRateLabel='📊 DK Bet Win Rate';
    topRateSubLabel=`lock+lean bets · n=${bets}`;
  }else{
    const lockSet=played.filter(p=>{const r=getRat(p.grade);return r.c==='lock';});
    const lockHits=lockSet.filter(p=>p.actualKs>=roundConservative(p.xK)).length;
    topRateNum=lockHits;topRateDen=lockSet.length;
    topRateLabel='🔒 Lock hit rate';
    topRateSubLabel=`K Grade ≥ 72 · n=${lockSet.length}`;
  }
  const topRate=topRateDen?(topRateNum/topRateDen*100).toFixed(0)+'%':'—';
  
  let lockCount=0,leanCount=0,passCount=0,noLineCount=0;
  if(isDKView){
    displayList.forEach(p=>{
      const market=getPlayerProps(RESULTS.date,p.name)?.markets?.pitcher_strikeouts;
      if(market?.line==null){noLineCount++;return;}
      const absEdge=Math.abs(p.xK-market.line);
      if(absEdge>=DK_LOCKS.k)lockCount++;
      else if(absEdge>=DK_LOCKS.k/2)leanCount++;
      else passCount++;
    });
  }
  
  const rows=displayList.map(p=>{
    const r=getRat(p.grade);
    const rc=r.c==='lock'?'lr':r.c==='hot'?'hr2':r.c==='lean'?'lnr':'';
    let icon='—',col='var(--mt)',txt='No final stats',diffStr='',predWhole=null;
    if(p.played){
      if(isDKView){
        const market=getPlayerProps(RESULTS.date,p.name)?.markets?.pitcher_strikeouts;
        if(market?.line!=null){
          const edge=p.xK-market.line;
          const absEdge=Math.abs(edge);
          if(absEdge>=DK_LOCKS.k/2){
            // Lock or lean: scored as a bet
            const recOver=edge>0;
            const win=recOver?(p.actualKs>market.line):(p.actualKs<market.line);
            icon=win?'✓':'✗';
            col=win?'var(--gn)':'var(--rd)';
            txt=`${p.actualKs} K · ${p.actualIP} IP`;
            diffStr=(p.actualKs-market.line>=0?'+':'')+(p.actualKs-market.line).toFixed(1);
          }else{
            // Pass: untracked
            icon='—';
            col='var(--mt)';
            txt=`${p.actualKs} K · ${p.actualIP} IP`;
            diffStr='pass';
          }
        }else{
          // No DK line saved for this pitcher — fall back to score-based ✓/✗
          predWhole=roundConservative(p.xK);
          const ok=p.actualKs>=predWhole;
          icon=ok?'✓':'✗';
          col=ok?'var(--mt2)':'var(--mt2)'; // dimmed so it doesn't distract
          txt=`${p.actualKs} K · ${p.actualIP} IP`;
          diffStr='no DK';
        }
      }else{
        predWhole=roundConservative(p.xK);
        const diff=p.actualKs-p.xK;
        const ok=p.actualKs>=predWhole;
        icon=ok?'✓':'✗';
        col=ok?'var(--gn)':'var(--rd)';
        txt=`${p.actualKs} K · ${p.actualIP} IP`;
        diffStr=(diff>=0?'+':'')+diff.toFixed(1);
      }
    }
    const dkCell=dkCellFor(p.name,'pitcher_strikeouts',p.xK,DK_LOCKS.k,DK_LOCKS.k/2,RESULTS.date);
    return `<tr class="${rc}" onclick="openHistoryRowMo('pitcher',RESULTS.date,'${p.id}','k')" style="cursor:pointer">
      <td>${sbar(p.grade,LOCKS.k)}</td>
      <td><strong style="color:var(--ac)">${predWhole!=null?predWhole:p.xK}</strong></td>
      <td style="color:${col};font-weight:700;font-size:1rem">${icon}</td>
      <td style="color:${col};font-size:.62rem">${txt}</td>
      <td style="color:${col};font-size:.62rem;font-weight:700">${diffStr}</td>
      <td style="font-size:.6rem">${dkCell}</td>
      <td class="l"><strong>${p.name}</strong></td>
      <td><span style="color:${hc(p.pHand)}">${p.pHand}HP</span></td>
      <td class="l" style="color:var(--mt2)">${p.opp}</td>
      <td>${bdg(r)}</td>
    </tr>`;
  }).join('');
  
  const countPill=isDKView
    ?`<div class="pill"><span class="pn" style="font-size:.85rem">${lockCount}/${leanCount}/${passCount}${noLineCount?'/'+noLineCount:''}</span>🔒/lean/pass${noLineCount?'/none':''}</div>`

  return `
    <div class="sum">
      <div class="pill lk"><span class="pn">${topRate}</span>${topRateLabel}<br><span style="font-size:.5rem;color:var(--mt);font-weight:400">${topRateSubLabel}</span></div>
      <div class="pill ln"><span class="pn">${meanError}</span>Avg K error</div>

    <div class="info" style="font-size:.58rem;margin-bottom:8px">${isDKView?`Sorted by DK edge magnitude (no-DK rows at bottom). Locks (≥${DK_LOCKS.k}) and leans (≥${DK_LOCKS.k/2}) count toward win rate.`:'Sorted by predicted xK. ✓ = actual ≥ predicted · ✗ = below.'}</div>
    <div class="tbl-wrap"><table>
      <thead><tr>

      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  `;
}

// Game HR fact-check renderer for both 0-1 HR (gnoHR) and 2+ HR (gmultiHR) bets
function renderFCHRLine(sideFilter){
  // Backward compat: if old saved data has only noHRScore/multiHRScore (no hrLinePick), derive on the fly
  const sorted=[...RESULTS.totals].map(t=>{
    if(t.hrLinePick!=null&&t.hrLineScore!=null)return t;
    if(t.noHRScore!=null&&t.multiHRScore!=null){
      const pick=t.noHRScore>=t.multiHRScore?'Under':'Over';
      const score=Math.max(t.noHRScore,t.multiHRScore);
      return {...t,hrLinePick:pick,hrLineScore:score};
    }
    return t;
  }).filter(t=>{
    if(t.hrLineScore==null)return false;
    if(sideFilter&&t.hrLinePick!==sideFilter)return false;
    return true;
  }).sort((a,b)=>b.hrLineScore-a.hrLineScore);
  
  const played=sorted.filter(t=>t.played&&t.actualGameHR!=null);
  const lockSet=played.filter(t=>t.hrLineScore>=LOCKS.hrLine);
  const lockHits=lockSet.filter(t=>{
    if(t.hrLinePick==='Over')return t.actualGameHR>=2;
    return t.actualGameHR<=1;
  }).length;
  const lockRate=lockSet.length?Math.round(lockHits/lockSet.length*100)+'%':'—';
  
  const rows=sorted.map(t=>{
    const r=getRat(t.hrLineScore,LOCKS.hrLine);
    const rc=r.c==='lock'?'lr':r.c==='hot'?'hr2':r.c==='lean'?'lnr':'';
    const pickColor=t.hrLinePick==='Over'?'var(--gn)':'var(--ac)';
    const lockTag=t.hrLineScore>=LOCKS.hrLine?'<span style="font-size:.55rem;color:var(--rd);margin-left:4px">🔒</span>':'';
    let icon='—',col='var(--mt)',txt='No final stats';
    if(t.played&&t.actualGameHR!=null){
      const win=t.hrLinePick==='Over'?(t.actualGameHR>=2):(t.actualGameHR<=1);
      icon=win?'✓':'✗';
      col=win?'var(--gn)':'var(--rd)';
      txt=`${t.actualGameHR} HR`;
    }
    return `<tr class="${rc}" onclick="openHRLineMo('${t.gamePk}',{fromHistory:true,date:RESULTS.date})" style="cursor:pointer">
      <td><strong style="color:${pickColor}">${t.hrLinePick}</strong>${lockTag}</td>
      <td><strong style="color:var(--ac)">${t.totalHR?.toFixed(1)||'—'}</strong></td>
      <td style="color:${col};font-weight:700;font-size:1rem">${icon}</td>
      <td style="color:${col};font-size:.62rem">${txt}</td>
      <td class="l"><strong>${t.away} @ ${t.home}</strong></td>
    </tr>`;
  }).join('');
  
  return `
    <div class="sum">
      <div class="pill lk"><span class="pn">${lockRate}</span>🔒 Lock hit rate<br><span style="font-size:.5rem;color:var(--mt);font-weight:400">HR Score ≥ ${LOCKS.hrLine} · n=${lockSet.length}</span></div>
      <div class="pill"><span class="pn">${sorted.length}</span>Games</div>
    </div>
    <div class="info" style="font-size:.58rem;margin-bottom:8px">Bet column = model's call. ✓ = pick was correct (Over → ≥2 HR, Under → ≤1 HR). 🔒 = high-confidence (Lock).</div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>Bet</th><th>xHR</th><th></th><th>Actual</th><th class="l">Game</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  `;
}

// sv(label, displayVal, raw, avgVal, goodDir, isPitcher)
function sv(lbl,val,raw,avgVal,goodDir='high',isPitcher=false){
  let cls='',outline=false;
  if(raw!=null&&avgVal!=null&&avgVal!==0){
    const pctDiff=goodDir==='high'?(raw-avgVal)/(avgVal*0.25):(avgVal-raw)/(avgVal*0.25);
    const eff=isPitcher?-pctDiff:pctDiff;
    if(eff>=0.6){cls='e';outline=true;}      // elite hittable / elite batter
    else if(eff>=0.15){cls='g';}              // green
    else if(eff<=-0.15){cls='b';}             // red (good pitcher / bad batter)
  }
  return `<div class="sc2${outline?' sc2-elite':''}"><div class="sc2-l">${lbl}</div><div class="sc2-v ${cls}">${val}</div></div>`;
}

function pb(lbl,score,rat){
  const c=rat.c==='lock'?'var(--rd)':rat.c==='hot'?'var(--gd)':rat.c==='lean'?'var(--ac)':'var(--mt)';
  return `<div class="pred-b"><div class="pred-l">${lbl}</div><div class="pred-v" style="color:${c}">${score??'—'}</div><div class="pred-s">${bdg(rat)}</div></div>`;
}

// Verdict from a 0-100 component score
function verd(sc){
  if(sc==null||isNaN(sc))return {cls:'neu',lbl:'—',col:'var(--mt)',sym:''};
  if(sc>=78)return {cls:'pos',lbl:'Elite',col:'var(--gn)',sym:'▲▲'};
  if(sc>=62)return {cls:'pos',lbl:'Good',col:'var(--gn)',sym:'▲'};
  if(sc>=48)return {cls:'neu',lbl:'Avg',col:'var(--mt2)',sym:'•'};
  if(sc>=32)return {cls:'neg',lbl:'Below',col:'var(--gd)',sym:'▼'};
  return {cls:'neg',lbl:'Poor',col:'var(--rd)',sym:'▼▼'};
}

// Render a single component row
