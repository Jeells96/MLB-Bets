}

// Unified component builder — reads batter side from grade object's .components
// and derives pitcher-side + modifiers from matchup context.
function batterComponents(m,type){
  const p=STATE.players[m.batterId];
  if(!p)return null;
  const L=STATE.leagueAvg;
  
  // Grade object holds the batter-side components with all the fields we need
  const gradeObj=type==='hit'?m.hitGrade:type==='hr'?m.hrGrade:m.tbGrade;
  if(!gradeObj||!gradeObj.components)return null;
  
  // Map grade object's components to compRow's expected shape
  const batter=gradeObj.components.map(c=>{
    const valDisp=c.raw==null?'—':(
      c.fmt==='3'?fmt(c.raw,3)
      :c.fmt==='2'?fmt(c.raw,2)
      :c.fmt==='%'?pct(c.raw,1)
      :c.fmt==='1%'?(c.raw.toFixed(1)+'%')
      :String(c.raw)
    );
    const avgDisp=c.avg==null?'—':(
      c.fmt==='3'?fmt(c.avg,3)
      :c.fmt==='2'?fmt(c.avg,2)
      :c.fmt==='%'?pct(c.avg,1)
      :c.fmt==='1%'?c.avg.toFixed(1)+'%'
      :String(c.avg)
    );
    return {
      label:c.label+(c.note?' · '+c.note:''),
      val:valDisp,
      avg:avgDisp,
      score:c.scaled??50,
      weight:Math.round((c.weight||0)*100)
    };
  });
  
  // Pitcher side — derive from the pitcher suppression context for this prop type
  let pitcher=[];
  if(m.pitcherId&&STATE.pitchers[m.pitcherId]){
    const pit=STATE.pitchers[m.pitcherId];
    const pOv=pit.prev?.isPrevSeason?pit.prev.overall:pit.overall;
    const pSp=pitcherSplit(pit,m.bats);
    
    if(type==='hit'){
      const pxBA=blendStat(pSp,pOv,'xBA',100)??pOv.xBA;
      const pxwOBA=blendStat(pSp,pOv,'xwOBA',100)??pOv.xwOBA;
      const pWhip=pOv.whip;
      const pKr=blendStat(pSp,pOv,'k_rate',150)??pOv.k_rate;
      const pAvg=blendStat(pSp,pOv,'avg',80)??pOv.avg;
      pitcher=[
        {label:'Pitcher xBA allowed',val:fmt(pxBA,3),avg:fmt(L.p_xBA,3),score:100-scale(pxBA,L.p_xBA,L.p_xBA*1.22),weight:30},
        {label:'Pitcher xwOBA allowed',val:fmt(pxwOBA,3),avg:fmt(L.p_xwOBA,3),score:100-scale(pxwOBA,L.p_xwOBA,L.p_xwOBA*1.22),weight:25},
        {label:'Pitcher K% (inverse)',val:pct(pKr,1),avg:pct(L.p_k,1),score:scale(pKr,L.p_k,L.p_k*1.35),weight:15},
        {label:'Pitcher WHIP',val:fmt(pWhip,2),avg:fmt(L.p_whip,2),score:pWhip!=null?100-scale(pWhip,L.p_whip,L.p_whip*1.3):50,weight:15},
        {label:'Pitcher AVG allowed',val:fmt(pAvg,3),avg:fmt(L.p_xBA,3),score:100-scale(pAvg,L.p_xBA,L.p_xBA*1.22),weight:15}
      ];
    }else if(type==='hr'){
      const pHrRate=blendStat(pSp,pOv,'hr_rate',200)??pOv.hr_rate;
      const pxSLG=blendStat(pSp,pOv,'xSLG',100)??pOv.xSLG;
      pitcher=[
        {label:'Pitcher HR rate allowed',val:pHrRate!=null?(pHrRate*100).toFixed(2)+'%':'—',avg:(L.p_hr*100).toFixed(2)+'%',score:100-scale(pHrRate,L.p_hr,L.p_hr*1.8),weight:30},
        {label:'Pitcher xSLG allowed',val:fmt(pxSLG,3),avg:fmt(L.p_xSLG,3),score:100-scale(pxSLG,L.p_xSLG,L.p_xSLG*1.3),weight:25},
        {label:'Pitcher HR/9',val:fmt(pOv.hr9,2),avg:'1.25',score:pOv.hr9!=null?100-scale(pOv.hr9,1.2,2.0):50,weight:15},
        {label:'Pitcher FIP',val:fmt(pOv.fip,2),avg:fmt(L.p_fip,2),score:pOv.fip!=null?100-scale(pOv.fip,L.p_fip,L.p_fip*1.3):50,weight:15},
        {label:'Pitcher HardHit% allowed',val:pOv.hardHit!=null?pOv.hardHit.toFixed(1)+'%':'—',avg:(L.p_hardHit||38).toFixed(0)+'%',score:pOv.hardHit!=null?100-scale(pOv.hardHit,L.p_hardHit,L.p_hardHit*1.25):50,weight:15}
      ];
    }else if(type==='tb'){
      // Total bases pitcher side — hybrid of hit + HR suppression
      const pxBA=blendStat(pSp,pOv,'xBA',100)??pOv.xBA;
      const pxSLG=blendStat(pSp,pOv,'xSLG',100)??pOv.xSLG;
      const pxwOBA=blendStat(pSp,pOv,'xwOBA',100)??pOv.xwOBA;
      const pHrRate=blendStat(pSp,pOv,'hr_rate',200)??pOv.hr_rate;
      pitcher=[
        {label:'Pitcher xSLG allowed',val:fmt(pxSLG,3),avg:fmt(L.p_xSLG,3),score:100-scale(pxSLG,L.p_xSLG,L.p_xSLG*1.3),weight:28},
        {label:'Pitcher xBA allowed',val:fmt(pxBA,3),avg:fmt(L.p_xBA,3),score:100-scale(pxBA,L.p_xBA,L.p_xBA*1.22),weight:22},
        {label:'Pitcher xwOBA allowed',val:fmt(pxwOBA,3),avg:fmt(L.p_xwOBA,3),score:100-scale(pxwOBA,L.p_xwOBA,L.p_xwOBA*1.22),weight:20},
        {label:'Pitcher HR rate',val:pHrRate!=null?(pHrRate*100).toFixed(2)+'%':'—',avg:(L.p_hr*100).toFixed(2)+'%',score:100-scale(pHrRate,L.p_hr,L.p_hr*1.8),weight:15},
        {label:'Pitcher HardHit% allowed',val:pOv.hardHit!=null?pOv.hardHit.toFixed(1)+'%':'—',avg:(L.p_hardHit||38).toFixed(0)+'%',score:pOv.hardHit!=null?100-scale(pOv.hardHit,L.p_hardHit,L.p_hardHit*1.25):50,weight:15}
      ];
    }
  }
  
  // External factors (park/weather) — for HR and TB only
  const modifiers=[];
  if((type==='hr'||type==='tb')&&m.park){
    const parkVal=type==='hr'?m.park.hr:(m.park.hr*0.6+m.park.h*0.4);
    modifiers.push({label:type==='hr'?'Park HR factor':'Park combined (HR × hits)',venue:m.venue,factor:parkVal,note:parkVal>1.05?'🚀 Hitter-friendly':parkVal<0.95?'🧊 Pitcher-friendly':'Neutral'});
  }
  if((type==='hr'||type==='tb')&&m.wx&&!DOMED.has(m.venue)){
    const wf=windHRFactor(m.venue,m.wx);
    const tf=tempHRFactor(m.wx.temp);
    modifiers.push({label:'Wind',venue:`${Math.round(m.wx.windSpeed||0)}mph`,factor:wf,note:wf>1.03?'🍃 Blowing out':wf<0.97?'💨 Blowing in':'Crosswind'});
    modifiers.push({label:'Temperature',venue:`${Math.round(m.wx.temp||0)}°F`,factor:tf,note:tf>1.02?'🔥 Ball carries':tf<0.98?'🧊 Dead air':'Mild'});
  }
  
  return {batter,pitcher,modifiers,gradeObj};
}

// Backward-compat shims so old callers keep working if anything still references them
function hitComponents(m){return batterComponents(m,'hit');}
function hrComponents(m){return batterComponents(m,'hr');}
function tbComponents(m){return batterComponents(m,'tb');}
function renderExplain(m,type){
  const comps=batterComponents(m,type);
  if(!comps)return '';
  const score=type==='hit'?m.hitScore:type==='hr'?m.hrScore:m.tbScore;
  // Grade objects now — extract .grade
  const gradeObj=type==='hit'?m.hitGrade:type==='hr'?m.hrGrade:m.tbGrade;
  const bG=gradeObj?.grade;
  const pG=type==='hit'?m.pitHitSup:type==='hr'?m.pitHRSup:(m.pitHitSup*0.6+m.pitHRSup*0.4);
  const paF=paFactor(m.order);
  const rat=getRat(score,type==='hit'?79.5:undefined);
  const ratC=rat.c==='lock'?'var(--rd)':rat.c==='hot'?'var(--gd)':rat.c==='lean'?'var(--ac)':'var(--mt)';
  
  // Top positives + negatives from combined list, ignore zero-weight components
  const all=[...comps.batter.filter(c=>c.weight>0),...comps.pitcher.map(c=>({...c,isPit:true}))];
  const sorted=[...all].sort((a,b)=>b.score-a.score);
  const pos=sorted.filter(c=>c.score>=58).slice(0,5);
  const neg=[...sorted].reverse().filter(c=>c.score<=42).slice(0,4);
  
  const bGrd=bG??50;
  const pGrd=pG??50;
  const label=type==='hit'?'Hit Score':type==='hr'?'HR Score':'TB Score';
  const emoji=type==='hit'?'🎯':type==='hr'?'💥':'🏟️';
  
  // Modifiers section (HR only)
  let modHTML='';
  if(comps.modifiers&&comps.modifiers.length){
    const totalMod=comps.modifiers.reduce((a,c)=>a*c.factor,1);
    modHTML=`<div class="why-section">
      <div class="why-section-h">🏟️ Park & Weather Modifiers</div>
      ${comps.modifiers.map(mod=>{
        const up=mod.factor>1.01;
        const dn=mod.factor<0.99;
        const col=up?'var(--gn)':dn?'var(--rd)':'var(--mt2)';
        return `<div class="why-mod">
          <div><span style="color:var(--tx2)">${mod.label}</span> <span style="color:var(--mt);font-size:.58rem">${mod.venue}</span> <span style="color:var(--mt2);font-size:.58rem">— ${mod.note}</span></div>
          <div class="why-mod-x" style="color:${col}">×${mod.factor.toFixed(3)}</div>
        </div>`;
      }).join('')}
      <div class="why-math-eq" style="border-top:1px dashed var(--bdr2);margin-top:5px;padding-top:5px">Combined multiplier on score delta: <b style="color:${totalMod>1?'var(--gn)':'var(--rd)'}">×${totalMod.toFixed(3)}</b></div>
    </div>`;
  }
  
  return `<div class="why-box">
    <div class="why-title">${emoji} Why this ${label}?</div>
    
    <div class="why-math">
      <div class="why-math-row">
        <span class="why-math-lbl">🏏 Batter Grade</span>
        <div class="why-math-bar"><div class="why-math-fill" style="width:${bGrd}%;background:var(--ac)"></div></div>
        <span class="why-math-val" style="color:var(--ac)">${bGrd.toFixed(1)}</span>
      </div>
      <div class="why-math-row">
        <span class="why-math-lbl">⚾ Pitcher Grade</span>
        <div class="why-math-bar"><div class="why-math-fill" style="width:${pGrd}%;background:var(--rd)"></div></div>
        <span class="why-math-val" style="color:var(--rd)">${pGrd.toFixed(1)}</span>
      </div>
      <div class="why-math-row">
        <span class="why-math-lbl">📊 PA factor (order #${m.order||'?'})</span>
        <span style="flex:1"></span>
        <span class="why-math-val" style="color:var(--tx2)">×${paF.toFixed(2)}</span>
      </div>
      <div class="why-math-eq">
        50 + (${bGrd.toFixed(1)} − ${pGrd.toFixed(1)}) ÷ 2 × ${paF.toFixed(2)}${comps.modifiers?.length?' × mods':''} &nbsp;=&nbsp; <b style="color:${ratC}">${score??'—'} ${label}</b>
      </div>
    </div>
    
    ${pos.length?`<div class="why-section">
      <div class="why-section-h">▲ Top Positive Drivers</div>
      ${pos.map(c=>compRow(c.label,c.val,c.avg,c.score,c.weight)).join('')}
    </div>`:''}
    
    ${neg.length?`<div class="why-section">
      <div class="why-section-h">▼ Hurting the Score</div>
      ${neg.map(c=>compRow(c.label,c.val,c.avg,c.score,c.weight)).join('')}
    </div>`:''}
    
    ${modHTML}
    
    <details style="margin-top:9px;margin-bottom:0">
      <summary style="font-size:.58rem">View all ${comps.batter.length+comps.pitcher.length} component scores</summary>
      <div class="why-section" style="margin-top:6px">
        <div class="why-section-h">🏏 Batter Components</div>
        ${comps.batter.filter(c=>c.weight>0).map(c=>compRow(c.label,c.val,c.avg,c.score,c.weight)).join('')}
      </div>
      ${comps.pitcher.length?`<div class="why-section">
        <div class="why-section-h">⚾ Pitcher Components (batter perspective)</div>
        ${comps.pitcher.map(c=>compRow(c.label,c.val,c.avg,c.score,c.weight)).join('')}
      </div>`:''}
    </details>
  </div>`;
}

// Render the Walks (BB) breakdown — uses plate-discipline stats only, NOT power/contact stats
function renderExplainBB(m){
  const p=STATE.players[m.batterId];
  const pit=STATE.pitchers[m.pitcherId];
  if(!p)return '';
  const L=STATE.leagueAvg;
  const ov=p.prev?.isPrevSeason?p.prev.overall:p.overall;
  const sp=batterSplit(p.prev?.isPrevSeason?p.prev:p,m.pHand,m.bats);
  const rec=p.recent||{};
  
  const score=m.bbScore;
  const xBB=m.expectedBB;
  const xBBWhole=xBB!=null?roundConservative(xBB):null;
  const rat=getRat(score);
  const ratC=rat.c==='lock'?'var(--rd)':rat.c==='hot'?'var(--gd)':rat.c==='lean'?'var(--ac)':'var(--mt)';
  
  // Batter walk components
  const seasonBB=ov.bb_rate;
  const splitBB=blendStat(sp,ov,'bb_rate',80);
  const recBB=rec.pa>=30?rec.bb_rate:null;
  // K%/BB ratio — proxy for plate discipline (lower = more disciplined)
  const kbbRatio=(ov.k_rate&&ov.bb_rate)?ov.k_rate/ov.bb_rate:null;
  
  // Pitcher walk components
  let pitSeasonBB=null,pitSplitBB=null,pitWHIP=null;
  if(pit){
    const pOv=pit.prev?.isPrevSeason?pit.prev.overall:pit.overall;
    const pSp=pitcherSplit(pit,m.bats);
    pitSeasonBB=pOv.bb_rate;
    pitSplitBB=blendStat(pSp,pOv,'bb_rate',150);
    pitWHIP=pOv.whip;
  }
  
  // Build component rows for the explainer
  const bComps=[
    {label:`Season BB%`,val:pct(seasonBB,1),avg:pct(L.b_bb,1),score:scale(seasonBB,L.b_bb*0.6,L.b_bb*1.7),weight:30,note:''},
    {label:`BB% vs ${m.pHand}HP`,val:pct(splitBB,1),avg:pct(L.b_bb,1),score:scale(splitBB,L.b_bb*0.6,L.b_bb*1.7),weight:30,note:'split'},
    {label:`Recent BB% (last 15G)`,val:recBB!=null?pct(recBB,1):'—',avg:pct(L.b_bb,1),score:recBB!=null?scale(recBB,L.b_bb*0.6,L.b_bb*1.7):50,weight:15,note:rec.pa?rec.pa+' PA':'small sample'},
    {label:`K%/BB% ratio (lower=disciplined)`,val:fmt(kbbRatio,2),avg:'~2.6',score:kbbRatio!=null?100-scale(kbbRatio,1.5,4.5):50,weight:5,note:''}
  ];
  const pComps=pit?[
    {label:`Pitcher BB% allowed`,val:pct(pitSeasonBB,1),avg:pct(L.p_bb,1),score:scale(pitSeasonBB,L.p_bb*0.5,L.p_bb*1.8),weight:20,note:''},
    {label:`Pitcher BB% vs ${m.bats}HB`,val:pct(pitSplitBB,1),avg:pct(L.p_bb,1),score:scale(pitSplitBB,L.p_bb*0.5,L.p_bb*1.8),weight:15,note:'split'},
    {label:`Pitcher WHIP (context)`,val:fmt(pitWHIP,2),avg:fmt(L.p_whip,2),score:pitWHIP!=null?scale(pitWHIP,L.p_whip*0.7,L.p_whip*1.3):50,weight:'—',note:'context'}
  ]:[];
  
  // Math summary
  const o=parseInt(m.order)||5;
  const expectedPA=o<=2?4.55:o<=5?4.20:o<=7?3.85:3.55;
  
  return `<div class="why-box">
    <div class="why-title">🚶 Why this Walks projection?</div>
    
    <div class="why-math">
      <div class="why-math-row">
        <span class="why-math-lbl">Batter BB% (blended)</span>
        <div class="why-math-bar"><div class="why-math-fill" style="width:${Math.min(100,nn(splitBB||seasonBB)*500)}%;background:var(--ac)"></div></div>
        <span class="why-math-val" style="color:var(--ac)">${pct(splitBB||seasonBB,1)}</span>
      </div>
      <div class="why-math-row">
        <span class="why-math-lbl">Pitcher BB% allowed</span>
        <div class="why-math-bar"><div class="why-math-fill" style="width:${Math.min(100,nn(pitSplitBB||pitSeasonBB||L.p_bb)*500)}%;background:var(--gd)"></div></div>
        <span class="why-math-val" style="color:var(--gd)">${pct(pitSplitBB||pitSeasonBB||L.p_bb,1)}</span>
      </div>
      <div class="why-math-row">
        <span class="why-math-lbl">Expected PA (lineup spot ${m.order})</span>
        <span style="flex:1"></span>
        <span class="why-math-val" style="color:var(--tx2)">${expectedPA}</span>
      </div>
      <div class="why-math-eq">
        log5(batter BB%, pitcher BB%) × ${expectedPA} PA = <b style="color:${ratC}">${xBB!=null?xBB.toFixed(2):'—'} xBB</b>
        ${xBBWhole!=null?` → rounds to <b style="color:var(--tx)">${xBBWhole}</b>`:''}
      </div>
      ${score>=LOCKS.bb&&xBBWhole!=null&&xBBWhole<1?'<div style="font-size:.55rem;color:var(--rd);padding:4px 0">⚠ Lock floor enforced: a true lock would round to ≥1. This was demoted.</div>':''}
    </div>
    
    <div class="why-section">
      <div class="why-section-h">🎯 Batter Plate Discipline</div>
      ${bComps.map(c=>compRow(c.label,c.val,c.avg,c.score,c.weight,c.note)).join('')}
    </div>
    
    ${pit?`<div class="why-section">
      <div class="why-section-h">⚾ Pitcher Walk Tendency</div>
      ${pComps.map(c=>compRow(c.label,c.val,c.avg,c.score,c.weight,c.note)).join('')}
    </div>`:''}
    
    <div style="font-size:.54rem;color:var(--mt);margin-top:6px;line-height:1.4">
      Walks are about plate discipline, not power. This view ignores SLG/wOBA/HR — they don't predict walks. Score combines batter BB% (65% weight, blended split + season + recent) with pitcher BB% allowed (35%). A "Lock" requires xBB ≥ 0.7 so the rounded prediction is ≥1.
    </div>
  </div>`;
}

// Render the K expectation breakdown
function renderExplainK(m){
  const pit=STATE.pitchers[m.pitcherId];
  if(!pit)return '';
  const L=STATE.leagueAvg;
  const pOv=pit.prev?.isPrevSeason?pit.prev.overall:pit.overall;
  const rec=pit.recent||{};
  const rat=getRat(m.kGrade,LOCKS.k);
  const ratC=rat.c==='lock'?'var(--rd)':rat.c==='hot'?'var(--gd)':rat.c==='lean'?'var(--ac)':'var(--mt)';
  
  // Recreate the model's per-batter math with TTO + park K mult
  const expectedIP=m.expectedIP;
  const totalBF=expectedIP*4.2;
  const parkK=m.parkK||1.0;
  const effectiveKRate=m.effectiveKRate||pOv.k_rate;
  
  function ttoMult(t){return t<=1?1.04:t===2?1.00:t===3?0.92:0.85;}
  
  const rows=m.oppLineup.map(b=>{
    const bObj=STATE.players[b.id];
    const paF=paFactor(b.order);
    const pSp=pitcherSplit(pit,b.bats);
    const pSplitKr=blendStat(pSp,pOv,'k_rate',150)??pOv.k_rate??L.p_k;
    // Apply recent-blend on top of split (same as model)
    const pKr=effectiveKRate?(pSplitKr*0.7+effectiveKRate*0.3):pSplitKr;
    let bKr=L.b_k,bPa=0;
    if(bObj){
      const bOv=bObj.prev?.isPrevSeason?bObj.prev.overall:bObj.overall;
      const bSp=batterSplit(bObj.prev?.isPrevSeason?bObj.prev:bObj,m.pHand,b.bats);
      bKr=blendStat(bSp,bOv,'k_rate',80)??bOv.k_rate??L.b_k;
      bPa=bOv.pa||0;
    }
    const baseCombined=combineRates(pKr,bKr,L.p_k);
    const pa=totalBF/9*paF;
    // Distribute across TTO buckets
    let remaining=pa,tto=1,xK=0;
    while(remaining>0&&tto<=4){
      const slice=Math.min(remaining,1);
      const adjK=baseCombined*ttoMult(tto);
      const parkAdjK=parkK?adjK*(1+(parkK-1)*0.5):adjK;
      xK+=parkAdjK*slice;
      remaining-=slice;
      tto++;
    }
    return {order:b.order,name:b.name,bats:b.bats,bKr,combined:baseCombined,pa,xK,bPa};
  });
  const totalK=rows.reduce((s,r)=>s+r.xK,0);
  
  // Pitcher components
  const components=[
    {label:'Season K%',val:pct(pOv.k_rate,1),avg:pct(L.p_k,1),score:scale(pOv.k_rate,L.p_k*0.85,L.p_k*1.4),weight:30},
    {label:'K/9',val:fmt(pOv.k9,2),avg:fmt(L.p_k9,2),score:pOv.k9!=null?scale(pOv.k9,L.p_k9*0.85,L.p_k9*1.35):50,weight:20},
    {label:'BB% (inverted)',val:pct(pOv.bb_rate,1),avg:pct(L.p_bb,1),score:100-scale(pOv.bb_rate,L.p_bb*0.7,L.p_bb*1.5),weight:15},
    {label:'xBA allowed (inverted)',val:fmt(pOv.xBA,3),avg:fmt(L.p_xBA,3),score:100-scale(pOv.xBA,L.p_xBA*0.8,L.p_xBA*1.2),weight:15},
    {label:'Avg IP per start',val:fmt(pOv.avgIP,1),avg:fmt(L.p_avgIP,1),score:pOv.avgIP!=null?scale(pOv.avgIP,L.p_avgIP*0.7,L.p_avgIP*1.2):50,weight:10},
    {label:'FIP (lower=better)',val:fmt(pOv.fip,2),avg:fmt(L.p_fip,2),score:pOv.fip!=null?100-scale(pOv.fip,L.p_fip*0.8,L.p_fip*1.3):50,weight:10}
  ];
  const avgOppK=rows.length?rows.reduce((s,r)=>s+r.bKr,0)/rows.length:L.b_k;
  const oppContext={label:'Opposing lineup K%',val:pct(avgOppK,1),avg:pct(L.b_k,1),score:scale(avgOppK,L.b_k*0.85,L.b_k*1.35),weight:'—'};
  
  // Adjustments box: each modifier the model applied
  const recentDelta=m.recentBlendUsed&&m.recentKRate!=null?
    `Season K% <b>${pct(m.seasonKRate,1)}</b> blended 65/35 with recent K% <b>${pct(m.recentKRate,1)}</b> → effective <b style="color:var(--ac)">${pct(m.effectiveKRate,1)}</b>`:
    `<span style="color:var(--mt)">No recent blend (need 3+ starts, 10+ IP)</span>`;
  const parkColor=parkK>1.02?'var(--gn)':parkK<0.98?'var(--rd)':'var(--mt2)';
  const oppOBPColor=m.oppOBP>L.b_obp+0.015?'var(--rd)':m.oppOBP<L.b_obp-0.015?'var(--gn)':'var(--mt2)';
  
  return `<div class="why-box">
    <div class="why-title">🔍 Why this K projection?</div>
    
    <div class="why-math">
      <div class="why-math-row">
        <span class="why-math-lbl">Pitcher K rate (effective)</span>
        <div class="why-math-bar"><div class="why-math-fill" style="width:${Math.min(100,nn(effectiveKRate)*300)}%;background:var(--ac)"></div></div>
        <span class="why-math-val" style="color:var(--ac)">${pct(effectiveKRate,1)}</span>
      </div>
      <div class="why-math-row">
        <span class="why-math-lbl">Opp lineup K%</span>
        <div class="why-math-bar"><div class="why-math-fill" style="width:${Math.min(100,avgOppK*300)}%;background:var(--gd)"></div></div>
        <span class="why-math-val" style="color:var(--gd)">${pct(avgOppK,1)}</span>
      </div>
      <div class="why-math-row">
        <span class="why-math-lbl">Expected IP (opp + park adjusted)</span>
        <span style="flex:1"></span>
        <span class="why-math-val" style="color:var(--tx2)">${expectedIP} IP</span>
      </div>
      <div class="why-math-eq">
        Σ (per-batter log5 × TTO penalty × park K) = <b style="color:${ratC}">${totalK.toFixed(1)} xK</b><br>
        <span style="font-size:.55rem;color:var(--mt)">Range ±1σ: <b style="color:var(--tx2)">${m.lowK?.toFixed(1)}–${m.highK?.toFixed(1)}</b> · SP baseline ≈ ${m.avgBaseline?.toFixed(1)}</span>
      </div>
    </div>
    
    <div class="why-section" style="margin-top:6px">
      <div class="why-section-h">🔧 Adjustments Applied</div>
      <div style="font-size:.6rem;line-height:1.7;color:var(--mt2);padding:5px 0">
        <div>📊 <b style="color:var(--tx2)">Recent form:</b> ${recentDelta}</div>
        <div>🏟️ <b style="color:var(--tx2)">Park K factor:</b> <span style="color:${parkColor}">${parkK.toFixed(2)}×</span>${parkK>1.02?' (more Ks here)':parkK<0.98?' (fewer Ks here)':' (neutral)'}</div>
        <div>👥 <b style="color:var(--tx2)">Opp OBP:</b> <span style="color:${oppOBPColor}">${m.oppOBP?.toFixed(3)||'—'}</span> → IP multiplier <b>${m.oppIPMult?.toFixed(2)||'—'}×</b>${m.oppIPMult>1.02?' (pitches deeper)':m.oppIPMult<0.98?' (gets pulled earlier)':' (neutral)'}</div>
        <div>🔁 <b style="color:var(--tx2)">Times-thru-order:</b> 1st PA × 1.04, 2nd × 1.00, 3rd × 0.92 (familiarity penalty)</div>
      </div>
    </div>
    
    <div class="why-section">
      <div class="why-section-h">⚾ Pitcher Components</div>
      ${components.map(c=>compRow(c.label,c.val,c.avg,c.score,c.weight)).join('')}
      ${compRow(oppContext.label,oppContext.val,oppContext.avg,oppContext.score,oppContext.weight)}
    </div>
    
    <div class="why-section">
      <div class="why-section-h">🎯 Per-Batter K Projection (log5 + TTO + park)</div>
      <div style="overflow-x:auto"><table class="why-k-table">
        <thead><tr>
          <th>#</th><th class="l">Batter</th><th>B</th><th>K%/H</th><th>Combined</th><th>xPA</th><th>xK</th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td style="color:var(--mt2)">${r.order}</td>
            <td class="l">${r.name}</td>
            <td style="color:${hc(r.bats)}">${r.bats}</td>
            <td>${pct(r.bKr,1)}</td>
            <td style="color:var(--ac)">${pct(r.combined,1)}</td>
            <td style="color:var(--mt2)">${r.pa.toFixed(1)}</td>
            <td style="color:var(--tx2)"><strong>${r.xK.toFixed(2)}</strong></td>
          </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="6" class="l" style="color:var(--mt2)">Total Expected Ks</td>
          <td style="color:${ratC};font-size:.95rem">${totalK.toFixed(1)}</td>
        </tr></tfoot>
      </table></div>
      <div style="font-size:.54rem;color:var(--mt);margin-top:5px;line-height:1.4">Log5 combines pitcher × batter K rate against league baseline (${pct(L.p_k,1)}). Each PA gets a TTO penalty (1st time × 1.04, 3rd × 0.92) and a park K bump. Sum across the lineup = total xK.</div>
    </div>
  </div>`;
}


function renderBatterCard(batterId,pitcherId,propType){
  const bid=String(batterId),pid=String(pitcherId);
  const p=STATE.players[bid]||STATE.players[batterId];
  if(!p)return '<div class="empty">Batter not found</div>';
  
  // Find relevant matchup (string-safe ID compare)
  const m=STATE.matchups.find(mm=>mm.kind==='batter'&&String(mm.batterId)===bid&&String(mm.pitcherId)===pid)
        ||STATE.matchups.find(mm=>mm.kind==='batter'&&String(mm.batterId)===bid);
  if(!m)return '<div class="empty">No matchup for this batter</div>';
  
  const pit=STATE.pitchers[m.pitcherId];
  const L=STATE.leagueAvg;
  const ov=p.overall;
  const sp=batterSplit(p,m.pHand);
  const pOv=pit?.overall||{};
  const pSp=pit?pitcherSplit(pit,m.bats||'R'):{};
  
  const conf=Math.round(clamp(
    (ov.pa>=Q.bPA?40:20)
    +(sp?.pa>=Q.bSp?25:10)
    +(pOv.ip>=Q.pIP?25:10)
    +(p.recent?.g>=10?10:0),0,100));
  
  return `<div class="pcard">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px">
      <div>
        <div class="pcn">${m.batterName}</div>
        <div class="pcm">${m.bats==='L'?'LHB':m.bats==='S'?'SHB':'RHB'} · #${m.order||'?'} · ${m.team.abbr||m.team.name} @ ${m.venue.replace(/(Stadium|Park|Field)/i,'').trim()} · vs <span style="color:${hc(m.pHand)}">${m.pHand}HP</span> ${m.pitcherName}</div>
      </div>
      ${bdg(getRat(Math.max(m.hitScore||0,m.hrScore||0,m.tbScore||0)))}
    </div>
    <div class="pred-g">
      ${pb('🎯 Hit',m.hitScore,getRat(m.hitScore,LOCKS.hits))}
      ${pb('💥 HR',m.hrScore,getRat(m.hrScore,LOCKS.hr))}
      ${pb('🏟️ Total Bases',m.tbScore,getRat(m.tbScore,LOCKS.tb))}
      ${pb('🚶 Walks',m.bbScore,getRat(m.bbScore,LOCKS.bb))}
    </div>
    
    ${(()=>{
      if(propType==='bb')return renderExplainBB(m);
      const order=propType==='hr'?['hr','hit','tb']:propType==='tb'?['tb','hit','hr']:['hit','tb','hr'];
      return order.map(t=>renderExplain(m,t)).join('');
    })()}
    <div class="conf-bar">
      <div class="conf-top"><span>Data Confidence</span><span>${conf}%</span></div>

function renderPitcherCard(pitcherId){
  const p=STATE.pitchers[pitcherId];
  if(!p)return '<div class="empty">Pitcher not found</div>';
  
  const m=STATE.matchups.find(mm=>mm.kind==='pitcher'&&mm.pitcherId===pitcherId);
  if(!m)return '<div class="empty">No K matchup</div>';
  
  const L=STATE.leagueAvg;
  const ov=p.overall;
  
  const conf=Math.round(clamp(
    (ov.ip>=Q.pIP?50:20)
    +(m.oppLineup.length>=8?30:m.oppLineup.length*3)
    +(p.recent?.g>=3?20:0),0,100));
  
  const lineupRows=m.oppLineup.map(b=>{
    const bp=STATE.players[b.id];
    const bOv=bp?.overall||{};
    const bSp=bp?batterSplit(bp,m.pHand):{};
    return `<tr>
      <td style="color:var(--mt2)">${b.order}</td>
      <td class="l"><strong>${b.name}</strong>${b.unconfirmed?'<span class="unc"> ⚠</span>':''}</td>
      <td style="color:${hc(b.bats)}">${b.bats}</td>
      <td>${pct(bSp?.k_rate??bOv.k_rate,1)}</td>
      <td>${fmt(bSp?.xwOBA??bOv.xwOBA,3)}</td>
      <td>${fmt(bOv.xBA,3)}</td>
      <td style="color:var(--mt2)">${bOv.pa||'—'}</td>
    </tr>`;
  }).join('');
  
  return `<div class="pcard">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px">
      <div>
        <div class="pcn">${m.pitcherName}</div>
        <div class="pcm"><span style="color:${hc(m.pHand)}">${m.pHand}HP</span> · ${m.team.abbr||m.team.name} vs ${m.opp.abbr||m.opp.name} · ${m.venue.replace(/(Stadium|Park|Field)/i,'').trim()}</div>
      </div>
      ${bdg(getRat(m.kGrade,LOCKS.k))}
    </div>
    <div class="pred-g" style="grid-template-columns:repeat(3,1fr)">
      ${pb('K Grade',m.kGrade,getRat(m.kGrade,LOCKS.k))}
      <div class="pred-b"><div class="pred-l">Expected K</div><div class="pred-v" style="color:var(--ac)">${m.expectedK}</div><div class="pred-s">over ${m.expectedIP} IP</div></div>
      <div class="pred-b"><div class="pred-l">Baseline</div><div class="pred-v" style="color:var(--mt)">${m.avgBaseline}</div><div class="pred-s">league avg SP</div></div>
    </div>
    
    ${renderExplainK(m)}
    <div class="conf-bar">
      <div class="conf-top"><span>Data Confidence</span><span>${conf}%</span></div>
      <div class="conf-track"><div class="conf-fill" style="width:${conf}%;background:${conf>=70?'var(--gn)':conf>=50?'var(--gd)':'var(--rd)'}"></div></div>
    </div>
    ${p.prev?.isPrevSeason?`<div style="font-size:.58rem;color:var(--gd);margin-bottom:6px">⚠ Using ${PREV_SEASON} stats — ${SEASON} sample too small</div>`:''}
    
    <div class="slbl">Season Stats</div>
    <div class="sg">
      ${sv('K%',pct(ov.k_rate,1),ov.k_rate,L.p_k,'high')}
      ${sv('BB%',pct(ov.bb_rate,1),ov.bb_rate,L.p_bb,'low')}
      ${sv('K/9',fmt(ov.k9,2),ov.k9,L.p_k9,'high')}
      ${sv('BB/9',fmt(ov.bb9,2),ov.bb9,3.1,'low')}
      ${sv('ERA',fmt(ov.era,2),ov.era,L.p_era,'low')}
      ${sv('FIP',fmt(ov.fip,2),ov.fip,L.p_fip,'low')}
      ${sv('WHIP',fmt(ov.whip,2),ov.whip,L.p_whip,'low')}
      ${sv('xBA',fmt(ov.xBA,3),ov.xBA,L.p_xBA,'low')}
      ${sv('xwOBA',fmt(ov.xwOBA,3),ov.xwOBA,L.p_xwOBA,'low')}
      ${sv('HR/9',fmt(ov.hr9,2),ov.hr9,1.4,'low')}
      ${sv('AVG IP',fmt(ov.avgIP,1),ov.avgIP,L.p_avgIP,'high')}
      ${sv('IP',fmt(ov.ip,1))}
    </div>
    
    <div class="slbl" style="margin-top:10px">Opposing Lineup (${m.oppLineup.length})</div>
    ${lineupRows?`<div class="tbl-wrap"><table>
      <thead><tr><th>#</th><th class="l">Batter</th><th>B</th><th>K%/H</th><th>xwOBA/H</th><th>xBA</th><th>PA</th></tr></thead>
      <tbody>${lineupRows}</tbody>
    </table></div>`:'<div class="info">No lineup data</div>'}
  </div>`;
}

function openGameMo(gamePk){
  const g=STATE.games.find(g=>String(g.gamePk)===String(gamePk));

  const mh=document.getElementById('mh');

  const wx=g.weather;
  const pk=g.parkFactor;
  const venue=g.venue;
  const isDome=DOMED.has(venue)&&!DOME_OPENS.has(venue);
  
  const windF=wx?windHRFactor(venue,wx):1;
  const tempF=wx?tempHRFactor(wx?.temp):1;
  
  // Top batters this game
  const gameBatters=STATE.matchups.filter(m=>m.kind==='batter'&&m.game.gamePk===g.gamePk);
  const topHit=[...gameBatters].sort((a,b)=>(b.hitScore??0)-(a.hitScore??0)).slice(0,5);
  const topHR=[...gameBatters].sort((a,b)=>(b.hrScore??0)-(a.hrScore??0)).slice(0,3);
  const topTB=[...gameBatters].sort((a,b)=>(b.tbScore??0)-(a.tbScore??0)).slice(0,5);

  mh.innerHTML=`<div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px">${g.away.abbr||g.away.name} @ ${g.home.abbr||g.home.name}</div>

      <div><span style="color:${hc(g.aSPHand)}">${g.aSPHand||'?'}HP</span> <strong>${g.aSP?.name||'TBD'}</strong> (${g.away.abbr||g.away.name})</div>

    </div>
    
    <div class="slbl">Park · Weather</div>
    <div class="sg">
      ${sv('Park R',fmt(pk.r,2),pk.r,1.0,'high')}
      ${sv('Park HR',fmt(pk.hr,2),pk.hr,1.0,'high')}

      ${sv('Park K',fmt(pk.k,2),pk.k,1.0,'high')}
      ${isDome?sv('Dome','Yes'):''}
      ${!isDome&&wx?sv('Temp',Math.round(wx.temp)+'°F',wx.temp,70,'high'):''}
      ${!isDome&&wx?sv('Wind',Math.round(wx.windSpeed)+'mph'):''}
      ${!isDome&&wx?sv('Wind→HR',windF.toFixed(2),windF,1,'high'):''}
      ${!isDome&&wx?sv('Temp→HR',tempF.toFixed(2),tempF,1,'high'):''}

      ${!isDome&&wx?sv('Precip',(wx.precipProb||0)+'%',wx.precipProb,30,'low'):''}
    </div>
    
    <div class="slbl" style="margin-top:10px">🎯 Top Hit Plays</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Score</th><th class="l">Batter</th><th>Team</th><th>#</th><th class="l">Pitcher</th></tr></thead>

          <td>${sbar(m.hitScore,LOCKS.hits)}</td>
          <td class="l"><strong>${m.batterName}</strong></td>
          <td style="color:var(--mt2)">${m.team.abbr||''}</td>
          <td style="color:var(--mt2)">${m.order}</td>

// Lightweight history modal for FC drill-down. Shows the saved prediction fields
// + actual outcome. Less detailed than live matchup modal (we don't save splits/recent form
// in the snapshot), but enough to verify what the model picked and what happened.
function openHistoryRowMo(type,date,id,extra){
  const pred=PRED.byDate[date];
  const hist=HISTORY.byDate[date];
  if(!pred){closeMo();return;}
  
  const mh=document.getElementById('mh');
  const mb=document.getElementById('mb');
  let head='',body='';
  
  if(type==='batter'){
    const propType=extra; // 'hit'|'tb'|'hr'|'bb'|'bbat'
    const b=(pred.batters||[]).find(x=>String(x.id)===String(id));
    if(!b){closeMo();return;}
    const r=hist?.batters?.[b.id];
    const played=!!r&&(r.ab>0||r.pa>0);
    const lockMap={hit:LOCKS.hits,tb:LOCKS.tb,hr:LOCKS.hr,bb:LOCKS.bb,bbat:LOCKS.bbat};
    const scoreMap={hit:b.score,tb:b.tbScore,hr:b.hrScore,bb:b.bbScore,bbat:b.batterKScore};
    const labelMap={hit:'🎯 Hits',tb:'🏟️ Total Bases',hr:'💥 Home Runs',bb:'🚶 Walks',bbat:'⚡ Strikeouts'};
    const score=scoreMap[propType];
    const lockAt=lockMap[propType];
    const isLock=score!=null&&score>=lockAt;
    
    let actualLine='Did not play',outcome=null,outcomeColor='var(--mt)';
    if(played){
      if(propType==='hit'){
        outcome=r.h>0;
        actualLine=`${r.h} H · ${r.ab} AB · ${r.bb||0} BB${r.hr?' · '+r.hr+' HR':''}`;
      }else if(propType==='tb'){
        const pred_=roundConservative(b.expectedTB||0);
        outcome=(r.tb||0)>=pred_;
        actualLine=`${r.tb||0} TB (predicted ${pred_})`;
      }else if(propType==='hr'){
        outcome=(r.hr||0)>0;
        actualLine=`${r.hr||0} HR · ${r.ab} AB`;
      }else if(propType==='bb'){
        const pred_=roundConservative(b.expectedBB||0);
        outcome=(r.bb||0)>=pred_;
        actualLine=`${r.bb||0} BB (predicted ${pred_})`;
      }else if(propType==='bbat'){
        const pred_=roundConservative(b.batterExpectedK||0);
        outcome=(r.k||0)>=pred_;
        actualLine=`${r.k||0} K (predicted ${pred_})`;
      }
      outcomeColor=outcome?'var(--gn)':'var(--rd)';
    }
    
    head=`<div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px">${b.name}</div>
      <div style="font-size:.58rem;color:var(--mt2);margin-top:2px">${b.bats==='L'?'LHB':b.bats==='S'?'SHB':'RHB'} · #${b.order} · ${b.team} vs <span style="color:${hc(b.pHand)}">${b.pHand}HP</span> ${b.pitcherName}</div>
      <div style="font-size:.55rem;color:var(--mt);margin-top:2px">${date}</div>
    </div>
    <button class="mc" onclick="closeMo()">✕</button>`;
    
    body=`<div style="text-align:center;margin-bottom:14px">
      <div style="font-size:.55rem;color:var(--mt);letter-spacing:.08em;text-transform:uppercase">${labelMap[propType]}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--ac);line-height:1;margin-top:2px">${score!=null?score.toFixed(1):'—'}${isLock?' 🔒':''}</div>
      <div style="font-size:.6rem;color:var(--mt2)">Lock at ${lockAt}+</div>
    </div>
    
    <div class="slbl">📊 Prediction Details</div>
    <div style="background:var(--bg2);padding:8px;border-radius:6px;margin-bottom:10px">
      <table style="width:100%;font-size:.62rem;border-collapse:collapse">
        ${propType==='tb'&&b.expectedTB!=null?`<tr><td style="color:var(--mt2);padding:3px 0">Expected TB</td><td style="text-align:right;font-family:'DM Mono',monospace">${b.expectedTB.toFixed(2)}</td></tr>`:''}
        ${propType==='bb'&&b.expectedBB!=null?`<tr><td style="color:var(--mt2);padding:3px 0">Expected BB</td><td style="text-align:right;font-family:'DM Mono',monospace">${b.expectedBB.toFixed(2)}</td></tr>`:''}
        ${propType==='bbat'&&b.batterExpectedK!=null?`<tr><td style="color:var(--mt2);padding:3px 0">Expected K</td><td style="text-align:right;font-family:'DM Mono',monospace">${b.batterExpectedK.toFixed(2)}</td></tr>`:''}
        <tr><td style="color:var(--mt2);padding:3px 0">All scores</td><td style="text-align:right;font-family:'DM Mono',monospace;font-size:.55rem">Hit ${b.score?.toFixed(0)||'—'} · TB ${b.tbScore?.toFixed(0)||'—'} · HR ${b.hrScore?.toFixed(0)||'—'}</td></tr>
        ${b.bbScore!=null||b.batterKScore!=null?`<tr><td></td><td style="text-align:right;font-family:'DM Mono',monospace;font-size:.55rem">BB ${b.bbScore?.toFixed(0)||'—'} · K ${b.batterKScore?.toFixed(0)||'—'}</td></tr>`:''}
      </table>
    </div>
    
    <div class="slbl">⚾ Outcome</div>
    <div style="background:var(--bg2);padding:10px;border-radius:6px;border:${outcome!=null?`2px solid ${outcomeColor}`:'1px solid var(--bd)'}">
      ${outcome!=null?`<div style="font-size:.7rem;color:${outcomeColor};font-weight:700;margin-bottom:4px">${outcome?'✓ Pick won':'✗ Pick lost'}</div>`:''}
      <div style="font-size:.62rem;color:var(--mt2)">${actualLine}</div>
    </div>
    
    <div style="font-size:.5rem;color:var(--mt);text-align:center;margin-top:14px;line-height:1.5">
      Past predictions show summary only.<br>For full split-vs-RHP/LHP math, view today's slate in the betting tab.
    </div>`;
  }
  else if(type==='pitcher'){
    const propType=extra; // 'k' or 'pbb'
    const p=(pred.pitchers||[]).find(x=>String(x.id)===String(id));
    if(!p){closeMo();return;}
    const r=hist?.pitchers?.[p.id];
    const played=!!r;
    const lockAt=propType==='k'?LOCKS.k:LOCKS.pbb;
    const score=propType==='k'?p.grade:p.bbGrade;
    const isLock=score!=null&&score>=lockAt;
    
    let actualLine='Did not pitch',outcome=null,outcomeColor='var(--mt)';
    if(played){
      if(propType==='k'){
        const pred_=roundConservative(p.xK||0);
        outcome=r.k>=pred_;
        actualLine=`${r.k} K · ${r.ip} IP · ${r.bf||'—'} BF (predicted ${pred_} K)`;
      }else{
        const pred_=roundConservative(p.expectedBB||0);
        outcome=(r.bb||0)>=pred_;
        actualLine=`${r.bb||0} BB · ${r.ip} IP (predicted ${pred_})`;
      }
      outcomeColor=outcome?'var(--gn)':'var(--rd)';
    }
    
    head=`<div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px">${p.name}</div>
      <div style="font-size:.58rem;color:var(--mt2);margin-top:2px"><span style="color:${hc(p.pHand)}">${p.pHand}HP</span> · ${p.team} vs ${p.opp}</div>
      <div style="font-size:.55rem;color:var(--mt);margin-top:2px">${date}</div>
    </div>
    <button class="mc" onclick="closeMo()">✕</button>`;
    
    body=`<div style="text-align:center;margin-bottom:14px">
      <div style="font-size:.55rem;color:var(--mt);letter-spacing:.08em;text-transform:uppercase">${propType==='k'?'⚡ Strikeouts':'🚶 Walks Allowed'}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--ac);line-height:1;margin-top:2px">${score!=null?score.toFixed(1):'—'}${isLock?' 🔒':''}</div>
      <div style="font-size:.6rem;color:var(--mt2)">Lock at ${lockAt}+</div>
    </div>
    
    <div class="slbl">📊 Prediction Details</div>
    <div style="background:var(--bg2);padding:8px;border-radius:6px;margin-bottom:10px">
      <table style="width:100%;font-size:.62rem;border-collapse:collapse">
        ${propType==='k'?`
          <tr><td style="color:var(--mt2);padding:3px 0">Expected K</td><td style="text-align:right;font-family:'DM Mono',monospace">${p.xK?.toFixed(2)||'—'}</td></tr>
          ${p.lowK!=null?`<tr><td style="color:var(--mt2);padding:3px 0">K Range (±1σ)</td><td style="text-align:right;font-family:'DM Mono',monospace">${p.lowK.toFixed(1)} – ${p.highK.toFixed(1)}</td></tr>`:''}
        `:`
          <tr><td style="color:var(--mt2);padding:3px 0">Expected BB</td><td style="text-align:right;font-family:'DM Mono',monospace">${p.expectedBB?.toFixed(2)||'—'}</td></tr>
        `}
        <tr><td style="color:var(--mt2);padding:3px 0">All grades</td><td style="text-align:right;font-family:'DM Mono',monospace;font-size:.55rem">K ${p.grade?.toFixed(0)||'—'} · BB ${p.bbGrade?.toFixed(0)||'—'}</td></tr>
      </table>
    </div>
    
    <div class="slbl">⚾ Outcome</div>
    <div style="background:var(--bg2);padding:10px;border-radius:6px;border:${outcome!=null?`2px solid ${outcomeColor}`:'1px solid var(--bd)'}">
      ${outcome!=null?`<div style="font-size:.7rem;color:${outcomeColor};font-weight:700;margin-bottom:4px">${outcome?'✓ Pick won':'✗ Pick lost'}</div>`:''}
      <div style="font-size:.62rem;color:var(--mt2)">${actualLine}</div>
    </div>
    
    <div style="font-size:.5rem;color:var(--mt);text-align:center;margin-top:14px;line-height:1.5">
      Past predictions show summary only.<br>For full TTO penalty + opp lineup math, view today's slate in the betting tab.
    </div>`;
  }
  else if(type==='total'){
    const t=(pred.totals||[]).find(x=>String(x.gamePk)===String(id));
    if(!t){closeMo();return;}
    const r=hist?.games?.[t.gamePk];
    const played=!!r&&r.total!=null;
    let outcome=null,outcomeColor='var(--mt)',actualLine='No final score';
    if(played){
      const predRound=Math.round(t.total);
      outcome=Math.abs(r.total-predRound)<=0.4;
      outcomeColor=outcome?'var(--gn)':'var(--rd)';
      actualLine=`${r.awayRuns}–${r.homeRuns} (final ${r.total}, predicted ${t.total.toFixed(1)})`;
    }
    head=`<div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px">🎲 ${t.away} @ ${t.home}</div>
      <div style="font-size:.58rem;color:var(--mt2);margin-top:2px">${t.venue} · ${date}</div>
    </div>
    <button class="mc" onclick="closeMo()">✕</button>`;
    body=`<div style="text-align:center;margin-bottom:14px">
      <div style="font-size:.55rem;color:var(--mt);letter-spacing:.08em;text-transform:uppercase">Run Total</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--ac);line-height:1;margin-top:2px">${t.total.toFixed(1)}</div>
      <div style="font-size:.6rem;color:var(--mt2)">Predicted ${t.awayRuns}–${t.homeRuns}</div>
    </div>
    <div class="slbl">⚾ Outcome</div>
    <div style="background:var(--bg2);padding:10px;border-radius:6px;border:${outcome!=null?`2px solid ${outcomeColor}`:'1px solid var(--bd)'}">
      ${outcome!=null?`<div style="font-size:.7rem;color:${outcomeColor};font-weight:700;margin-bottom:4px">${outcome?'✓ Within 0.4 of predicted':'✗ Off by more than 0.4'}</div>`:''}
      <div style="font-size:.62rem;color:var(--mt2)">${actualLine}</div>
    </div>`;
  }
  
  mh.innerHTML=head;
  mb.innerHTML=body;
  document.getElementById('mo').classList.add('open');
  document.body.style.overflow='hidden';
}

// Detailed HR Over/Under math breakdown shown when user taps a row in the HR O/U tab.
// Walks through every input feeding the projection so the user can see why the model
// picked Over or Under instead of just trusting a black-box pick.
function openHRLineMo(gamePk,opts={}){
  // Works for both live STATE (today) and saved snapshots (past dates).
  // If `opts.fromHistory` is true, reads from PRED.byDate[opts.date] instead of STATE.
  const fromHistory=!!opts.fromHistory;
  let entry=null,gameLabel='',venue='',homeAbbr='',awayAbbr='';
  let parkHR=null,windSpeed=null,temp=null,isDome=false;
  let aSPName='TBD',hSPName='TBD',aSPhr9=null,hSPhr9=null,aSPip=null,hSPip=null;
  let aSPhr=null,hSPhr=null,totalHR=null,envMult=null;
  
  if(fromHistory){
    const pred=PRED.byDate[opts.date];
    if(!pred)return closeMo();
    entry=(pred.totals||[]).find(t=>String(t.gamePk)===String(gamePk));
    if(!entry||entry.totalHR==null){closeMo();return;}
    venue=entry.venue||'';
    homeAbbr=entry.home; awayAbbr=entry.away;
    parkHR=entry.parkHR; envMult=entry.hrEnvMult;
    isDome=!!entry.isDome; windSpeed=entry.windSpeed; temp=entry.temp;
    aSPName=entry.aSPInputs?.name||'Unknown SP';
    hSPName=entry.hSPInputs?.name||'Unknown SP';
    aSPhr9=entry.aSPInputs?.hr9; aSPip=entry.aSPInputs?.sIP;
    hSPhr9=entry.hSPInputs?.hr9; hSPip=entry.hSPInputs?.sIP;
    aSPhr=entry.aSPhr; hSPhr=entry.hSPhr;
    totalHR=entry.totalHR;
  }else{
    const g=STATE.games.find(g=>String(g.gamePk)===String(gamePk));
    if(!g)return;
    const t=STATE.totals.find(t=>String(t.game.gamePk)===String(gamePk));
    if(!t||t.totalHR==null){closeMo();return;}
    venue=g.venue;
    homeAbbr=g.home.abbr||g.home.name;
    awayAbbr=g.away.abbr||g.away.name;
    isDome=DOMED.has(venue)&&!DOME_OPENS.has(venue);
    parkHR=g.parkFactor?.hr||1.0;
    if(g.weather){windSpeed=g.weather.windSpeed; temp=g.weather.temp;}
    const windF=g.weather&&!isDome?windHRFactor(venue,g.weather):1.0;
    const tempF=g.weather&&!isDome?(1+(g.weather.temp-70)*0.005):1.0;
    envMult=parkHR*windF*tempF;
    const hSP=STATE.pitchers[g.hSP?.id];
    const aSP=STATE.pitchers[g.aSP?.id];
    aSPName=g.aSP?.name||'TBD'; hSPName=g.hSP?.name||'TBD';
    if(aSP&&aSP.overall.ip){
      const ov=aSP.prev?.isPrevSeason?aSP.prev.overall:aSP.overall;
      aSPhr9=ov.hr9; aSPip=ov.avgIP;
    }
    if(hSP&&hSP.overall.ip){
      const ov=hSP.prev?.isPrevSeason?hSP.prev.overall:hSP.overall;
      hSPhr9=ov.hr9; hSPip=ov.avgIP;
    }
    aSPhr=t.aSPhr; hSPhr=t.hSPhr;
    totalHR=t.totalHR;
  }
  
  const lgHR9=1.2;
  const windF=isDome||windSpeed==null?1.0:(envMult&&parkHR&&temp!=null?envMult/(parkHR*(1+(temp-70)*0.005)):1.0);
  const tempF=isDome||temp==null?1.0:(1+(temp-70)*0.005);
  
  // Per-team breakdown for display
  function teamCard(label,spName,hr9,sIP,sideHR){
    if(hr9==null||sIP==null){
      return `<div style="background:var(--bg2);padding:8px;border-radius:6px;margin-bottom:8px">
        <div style="font-size:.65rem;font-weight:600;color:var(--ac);margin-bottom:4px">${label}</div>
        <div style="font-size:.58rem;color:var(--mt2)">${spName} — pitcher data unavailable</div>
        <div style="font-size:.58rem;color:var(--mt);margin-top:4px">Used league avg HR/9 (${lgHR9}) over the full 9 IP for this side.</div>
        ${sideHR!=null?`<div style="font-size:.6rem;margin-top:6px;color:var(--gd)">→ ${sideHR.toFixed(2)} expected HRs allowed</div>`:''}
      </div>`;
    }
    const sIPClamped=Math.max(3.5,Math.min(7.0,sIP));
    const bpIP=Math.max(9-sIPClamped,2);
    const sHR=hr9*sIPClamped*envMult/9;
    const bpHR=lgHR9*bpIP*envMult/9;
    return `<div style="background:var(--bg2);padding:8px;border-radius:6px;margin-bottom:8px">
      <div style="font-size:.65rem;font-weight:600;color:var(--ac);margin-bottom:4px">${label}</div>
      <div style="font-size:.58rem;color:var(--mt2);margin-bottom:6px">SP: ${spName}</div>
      <table style="width:100%;font-size:.58rem;border-collapse:collapse">
        <tr><td style="color:var(--mt2);padding:2px 0">Starter HR/9</td><td style="text-align:right;font-family:'DM Mono',monospace">${hr9.toFixed(2)}</td></tr>
        <tr><td style="color:var(--mt2);padding:2px 0">Starter IP (typical)</td><td style="text-align:right;font-family:'DM Mono',monospace">${sIPClamped.toFixed(1)}</td></tr>
        <tr><td style="color:var(--mt2);padding:2px 0">→ Starter HRs allowed</td><td style="text-align:right;font-family:'DM Mono',monospace;color:var(--ac)"><strong>${sHR.toFixed(2)}</strong></td></tr>
        <tr><td style="color:var(--mt2);padding:2px 0">Bullpen IP (9 − ${sIPClamped.toFixed(1)})</td><td style="text-align:right;font-family:'DM Mono',monospace">${bpIP.toFixed(1)}</td></tr>
        <tr><td style="color:var(--mt2);padding:2px 0">→ Bullpen HRs (lg avg ${lgHR9} HR/9)</td><td style="text-align:right;font-family:'DM Mono',monospace;color:var(--ac)"><strong>${bpHR.toFixed(2)}</strong></td></tr>
        <tr style="border-top:1px solid var(--bd)"><td style="color:var(--gd);padding:4px 0;font-weight:600">Side total</td><td style="text-align:right;font-family:'DM Mono',monospace;color:var(--gd);font-weight:700">${(sHR+bpHR).toFixed(2)}</td></tr>
      </table>
    </div>`;
  }
  
  // Confidence (matches gameHRExpectation)
  let pickColor,pickLabel,pickMath,confidence;
  if(totalHR>=1.5){
    confidence=Math.max(50,Math.min(100,50+(totalHR-1.5)*16));
    pickLabel='Over'; pickColor='var(--gn)';
    pickMath=`50 + (${totalHR.toFixed(2)} − 1.5) × 16 = <strong>${confidence.toFixed(0)}</strong>`;
  }else{
    confidence=Math.max(50,Math.min(100,50+(1.5-totalHR)*40));
    pickLabel='Under'; pickColor='var(--ac)';
    pickMath=`50 + (1.5 − ${totalHR.toFixed(2)}) × 40 = <strong>${confidence.toFixed(0)}</strong>`;
  }
  const isLock=confidence>=LOCKS.hrLine;
  
  const mh=document.getElementById('mh');
  const mb=document.getElementById('mb');
  
  mh.innerHTML=`<div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px">💥 HR O/U 1.5</div>
    <div style="font-size:.6rem;color:var(--mt2);margin-top:2px">${awayAbbr} @ ${homeAbbr} · ${venue}${fromHistory?` · ${opts.date}`:''}</div>
  </div>
  <button class="mc" onclick="closeMo()">✕</button>`;
  
  mb.innerHTML=`
    <div style="text-align:center;margin-bottom:14px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:${pickColor};line-height:1">${pickLabel}${isLock?' 🔒':''}</div>
      <div style="font-size:.6rem;color:var(--mt);letter-spacing:.08em;text-transform:uppercase;margin-top:2px">Bet · Line is 1.5 HRs</div>
      <div style="margin-top:6px"><span style="color:var(--mt2);font-size:.62rem">Projected total: </span><strong style="color:var(--ac);font-size:.85rem">${totalHR.toFixed(2)} HRs</strong></div>
    </div>
    
    <div class="slbl">⚙️ Environment Multiplier</div>
    <div style="background:var(--bg2);padding:8px;border-radius:6px;margin-bottom:10px">
      <table style="width:100%;font-size:.6rem;border-collapse:collapse">
        <tr><td style="color:var(--mt2);padding:2px 0">Park HR factor</td><td style="text-align:right;font-family:'DM Mono',monospace">${parkHR?parkHR.toFixed(2):'—'}</td></tr>
        ${isDome?'<tr><td style="color:var(--mt2);padding:2px 0">Dome</td><td style="text-align:right;color:var(--gd)">closed roof — no weather</td></tr>':''}
        ${!isDome&&windSpeed!=null?`<tr><td style="color:var(--mt2);padding:2px 0">Wind → HR (${Math.round(windSpeed)}mph)</td><td style="text-align:right;font-family:'DM Mono',monospace">${windF.toFixed(2)}</td></tr>`:''}
        ${!isDome&&temp!=null?`<tr><td style="color:var(--mt2);padding:2px 0">Temp → HR (${Math.round(temp)}°F)</td><td style="text-align:right;font-family:'DM Mono',monospace">${tempF.toFixed(2)}</td></tr>`:''}
        <tr style="border-top:1px solid var(--bd)"><td style="color:var(--gd);padding:4px 0;font-weight:600">Combined envMult</td><td style="text-align:right;font-family:'DM Mono',monospace;color:var(--gd);font-weight:700">${envMult?envMult.toFixed(3):'—'}</td></tr>
      </table>
      <div style="font-size:.52rem;color:var(--mt);margin-top:4px">Applied to every IP — multiplies the league baseline.</div>
    </div>
    
    <div class="slbl">⚾ Per-Side Math</div>
    ${teamCard('Away pitching',aSPName,aSPhr9,aSPip,aSPhr)}
    ${teamCard('Home pitching',hSPName,hSPhr9,hSPip,hSPhr)}
    
    <div style="background:var(--bg2);padding:10px;border-radius:6px;margin-bottom:10px;border:1px solid var(--bd)">
      <div style="font-size:.62rem;color:var(--gd);font-weight:600;margin-bottom:4px">📊 Game Total</div>
      <div style="font-size:.58rem;color:var(--mt2);font-family:'DM Mono',monospace">${aSPhr!=null?aSPhr.toFixed(2):'—'} (away) + ${hSPhr!=null?hSPhr.toFixed(2):'—'} (home) = <strong style="color:var(--ac)">${totalHR.toFixed(2)} HRs</strong></div>
    </div>
    
    <div class="slbl">🎯 Confidence Score</div>
    <div style="background:var(--bg2);padding:10px;border-radius:6px;margin-bottom:10px">
      <div style="font-size:.6rem;color:var(--mt2);margin-bottom:6px">Pick is ${pickLabel} because projected (${totalHR.toFixed(2)}) is ${totalHR>=1.5?'above':'below'} the 1.5 line.</div>
      <div style="font-size:.62rem;font-family:'DM Mono',monospace;color:var(--ac)">${pickMath}</div>
      <div style="font-size:.55rem;color:var(--mt);margin-top:6px">Lock threshold: ${LOCKS.hrLine} · ${isLock?'<span style="color:var(--rd);font-weight:700">🔒 Lock-level confidence</span>':'Below lock threshold (lean only)'}</div>
    </div>
    
    ${fromHistory&&entry?(()=>{
      const r=(HISTORY.byDate[opts.date]?.games||{})[gamePk];
      if(!r||r.gameHR==null)return '';
      const win=pickLabel==='Over'?(r.gameHR>=2):(r.gameHR<=1);
      return `<div style="background:var(--bg2);padding:10px;border-radius:6px;margin-bottom:10px;border:2px solid ${win?'var(--gn)':'var(--rd)'}">
        <div style="font-size:.62rem;color:${win?'var(--gn)':'var(--rd)'};font-weight:700;margin-bottom:4px">${win?'✓ Pick won':'✗ Pick lost'}</div>
        <div style="font-size:.58rem;color:var(--mt2)">Game ended with <strong style="color:var(--ac)">${r.gameHR} total HRs</strong> · Pick was ${pickLabel}</div>
      </div>`;
    })():''}
    
    <div style="font-size:.52rem;color:var(--mt);text-align:center;margin-top:10px;line-height:1.5">
      Over scaling: 1.5 → 50, 2.5 → 66, 3.0 → 74, 4.5 → 98<br>
      Under scaling: 1.5 → 50, 1.0 → 70, 0.7 → 82, 0.3 → 98
    </div>
  `;
  
  document.getElementById('mo').classList.add('open');
  document.body.style.overflow='hidden';
}

/* ===================================================================
   INIT
   =================================================================== */
(function init(){
  document.getElementById('dp').value=todayStr();
  predLoad();
  // Keyboard: Escape closes modal
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMo();});
})();

</script>

</body>
